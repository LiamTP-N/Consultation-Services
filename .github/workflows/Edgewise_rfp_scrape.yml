name: Daily RFP Scrape

on:
  schedule:
    - cron: '30 10 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python edgewise/Edgewise_rfp_scrape.py

      - name: Commit and push updated rfps.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add edgewise/Edgewise_rfps.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily RFP scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done
          echo "Push failed after 5 attempts."
          exit 1
