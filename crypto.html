<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTZ since trade</title>
    <link id="favicon" rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { height: 100%; overflow: hidden; overflow-x: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000 radial-gradient(ellipse at top, rgba(45, 212, 191, 0.20) 0%, rgba(30, 41, 59, 0.15) 40%, transparent 75%) no-repeat;
            font-variant-numeric: tabular-nums;
        }
        @media (max-width: 767px) {
            html, body { height: auto; min-height: 100%; overflow-y: auto; overflow-x: hidden; max-width: 100%; }
            body { width: 100%; padding: 4px; }
            #mainSplit { flex-direction: column; }
            #chartCard { flex: 0 0 auto; min-height: 0; padding: 4px 6px; }
            #chartCard > div.flex-1 { height: 38vh; max-height: 360px; min-height: 220px; flex: 0 0 auto; }
            #chartLegendRow { font-size: 9px; gap: 4px; margin-bottom: 2px; }
            #chartLegendRow .legend-title { font-size: 9px; }
            #walletCard { font-size: 11px; padding: 6px 8px; flex: 0 0 auto; }
            #walletCard .wallet-balance-xtz { font-size: 20px; }
            #walletCard .wallet-balance-fiat { font-size: 11px; }
        }
        @media (min-width: 768px) {
            #mainSplit { flex-direction: row; }
            #chartCard { flex: 0 0 60%; }
            #walletCard { flex: 0 0 calc(40% - 8px); }
        }
        .glass-card {
            background: #000; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.12); border-radius: 12px;
        }
        .xtz-gradient { background: linear-gradient(to right, #1e3a8a, #2dd4bf); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
        .live-dot.stale { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        .live-dot.error { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .stale-dim { opacity: 0.5; transition: opacity 0.3s ease; }
        .privacy-overlay { position: fixed; inset: 0; background: #020617; z-index: 9998; transition: opacity 0.15s ease; }
        body.revealed .privacy-overlay { opacity: 0; pointer-events: none; }
        .privacy-toggle {
            position: fixed; bottom: 6px; right: 6px; width: 10px; height: 10px;
            border-radius: 50%; background: rgba(100, 116, 139, 0.25); border: none;
            cursor: pointer; z-index: 9999; padding: 0; transition: background 0.2s ease, transform 0.2s ease;
        }
        .privacy-toggle:hover { background: rgba(148, 163, 184, 0.6); transform: scale(1.3); }
        body.revealed .privacy-toggle { background: rgba(34, 211, 238, 0.4); }
        @media (hover: none) and (pointer: coarse) { .privacy-overlay, .privacy-toggle { display: none; } }

        /* Wallet card */
        #walletCard { display: flex; flex-direction: column; gap: 6px; }
        .wallet-label { color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 9px; }
        .wallet-value { color: #e2e8f0; font-weight: 600; }
        .wallet-sub { color: #94a3b8; font-size: 11px; }
        .wallet-divider { color: #334155; }

        .addr-row {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 8px; background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.12); border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
            color: #cbd5e1;
        }
        .addr-row code { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .icon-btn {
            background: transparent; border: none; cursor: pointer;
            color: #94a3b8; padding: 2px 4px; border-radius: 4px;
            display: inline-flex; align-items: center; justify-content: center;
            transition: color 0.15s ease, background 0.15s ease;
        }
        .icon-btn:hover { color: #2dd4bf; background: rgba(45, 212, 191, 0.08); }
        .icon-btn svg { width: 14px; height: 14px; }

        .wallet-balance-xtz { font-size: 24px; font-weight: 700; color: #2dd4bf; line-height: 1.1; }
        .wallet-balance-fiat { color: #94a3b8; font-size: 12px; }

        .reward-table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
        .reward-table th { text-align: left; color: #64748b; font-weight: 600; padding: 2px 4px; border-bottom: 1px solid rgba(148, 163, 184, 0.12); text-transform: uppercase; letter-spacing: 0.05em; font-size: 9px; }
        .reward-table th.num { text-align: right; }
        .reward-table td { padding: 2.5px 4px; color: #cbd5e1; }
        .reward-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
        .reward-table tr.pending td { color: #fbbf24; font-style: italic; }
        .reward-table tr.realised td.amount { color: #34d399; }

        .toast {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95); color: #e2e8f0;
            padding: 6px 14px; border-radius: 6px; font-size: 12px;
            border: 1px solid rgba(45, 212, 191, 0.4);
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
            z-index: 10000;
        }
        .toast.visible { opacity: 1; }

        /* Reward sparkline */
        #rewardSparkWrap { height: 32px; position: relative; }
    </style>
</head>
<body class="text-slate-100 p-1 md:p-3 flex flex-col">
    <div class="max-w-screen-2xl mx-auto w-full flex-1 flex flex-col gap-1 md:gap-2 min-h-0">

        <!-- HEADER -->
        <header class="relative flex-none pr-16">
            <div class="text-sm md:text-base font-semibold tracking-tight leading-tight flex flex-col gap-y-0.5">
                <div class="flex items-baseline gap-x-1.5">
                    <span class="text-lg md:text-2xl font-bold xtz-gradient">XTZ</span>
                    <span class="text-slate-500 text-xs font-normal">since trade</span>
                </div>
                <div class="flex flex-wrap items-baseline gap-x-3 gap-y-0">
                    <span class="flex items-baseline gap-x-1.5">
                        <span class="xtz-gradient font-bold">XTZ:</span>
                        <span id="xtzPct_trade" class="font-bold">-</span>
                    </span>
                    <span id="xtzPrice" class="text-slate-300 font-normal text-xs">-</span>
                </div>
                <div class="flex flex-wrap items-baseline gap-x-3 gap-y-0">
                    <span class="flex items-baseline gap-x-1.5">
                        <span class="font-bold" style="color:#fb923c;">BTC:</span>
                        <span id="btcPct_trade" class="font-bold" style="color:#fb923c;">-</span>
                    </span>
                    <span id="btcPrice" class="text-slate-300 font-normal text-xs">-</span>
                </div>
            </div>
            <div class="absolute right-0 top-1/2 -translate-y-1/2 flex items-center gap-2 md:gap-3 text-xs">
                <div class="flex items-center gap-1.5">
                    <span id="liveDot" class="live-dot"></span>
                    <span id="liveStatus" class="text-slate-400">Live</span>
                    <span id="errCount" class="hidden text-[10px] text-rose-400 font-semibold"></span>
                </div>
            </div>
        </header>

        <!-- MAIN SPLIT: chart 60% | wallet 40% (desktop), stacked (mobile) -->
        <div id="mainSplit" class="flex gap-1 md:gap-2 flex-1 min-h-0">

            <!-- LEFT: CHART -->
            <section id="chartCard" class="glass-card p-1 md:p-1.5 flex flex-col min-h-0">
                <div id="chartLegendRow" class="flex items-center mb-0.5 flex-none text-xs font-semibold gap-2 flex-nowrap">
                    <div class="flex items-center gap-2 md:gap-3 text-[10px] flex-nowrap whitespace-nowrap">
                        <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#2dd4bf;"></span><span class="xtz-gradient">XTZ</span></span>
                        <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#fb923c;"></span><span style="color:#fb923c;">BTC</span></span>
                    </div>
                </div>
                <div class="flex-1 min-h-0 relative"><canvas id="chartTrade"></canvas></div>
            </section>

            <!-- RIGHT: WALLET CARD -->
            <section id="walletCard" class="glass-card p-2 md:p-2.5">

                <!-- Address -->
                <div class="addr-row">
                    <code id="walletAddrShort">-</code>
                    <button class="icon-btn" id="walletCopyBtn" title="Copy address" aria-label="Copy address">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                    <a class="icon-btn" id="walletExtLink" href="#" target="_blank" rel="noopener" title="Open on TzKT" aria-label="Open on TzKT">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                </div>

                <!-- Total balance -->
                <div>
                    <div class="wallet-label">Total balance</div>
                    <div class="wallet-balance-xtz" id="walletBalance">-</div>
                    <div class="wallet-balance-fiat" id="walletFiat">-</div>
                </div>

                <!-- Breakdown -->
                <div class="flex flex-wrap gap-x-3 gap-y-1 text-[11px]">
                    <span><span class="wallet-label">Spendable</span> <span class="wallet-value" id="walletSpendable">-</span></span>
                    <span><span class="wallet-label">Staked</span> <span class="wallet-value" id="walletStaked">-</span></span>
                    <span id="walletUnstakeWrap" class="hidden"><span class="wallet-label">Unstaking</span> <span class="wallet-value" id="walletUnstaking">-</span></span>
                </div>

                <!-- Baker -->
                <div class="text-[11px]">
                    <span class="wallet-label">Baker</span>
                    <a id="walletBakerLink" href="#" target="_blank" rel="noopener" class="wallet-value hover:text-teal-300 transition-colors" style="text-decoration: none;">-</a>
                </div>

                <!-- Next reward -->
                <div class="border-t border-slate-700/40 pt-1.5">
                    <div class="flex items-baseline justify-between gap-2">
                        <span class="wallet-label">Next reward · cycle <span id="rewardCycle">-</span></span>
                        <span id="rewardStatus" class="text-[9px] font-semibold uppercase tracking-wider">-</span>
                    </div>
                    <div class="flex items-baseline gap-2 mt-0.5">
                        <span id="rewardAmount" class="text-sm font-bold text-amber-400">-</span>
                        <span id="rewardFiat" class="wallet-sub">-</span>
                    </div>
                </div>

                <!-- History sparkline -->
                <div>
                    <div class="wallet-label mb-1">Last 5 cycles</div>
                    <div id="rewardSparkWrap"><canvas id="rewardSpark"></canvas></div>
                </div>

                <!-- History table -->
                <table class="reward-table">
                    <thead>
                        <tr>
                            <th>Cycle</th>
                            <th>Date</th>
                            <th class="num">XTZ</th>
                            <th class="num">Value</th>
                        </tr>
                    </thead>
                    <tbody id="rewardHistoryBody">
                        <tr><td colspan="4" class="text-center text-slate-500 italic">Loading...</td></tr>
                    </tbody>
                </table>

            </section>

        </div>

    </div>

    <!-- Privacy overlay -->
    <div id="privacyOverlay" class="privacy-overlay"></div>
    <button id="privacyToggle" class="privacy-toggle" title="Click to reveal for 3 min" aria-label="Toggle visibility"></button>

    <!-- Copy toast -->
    <div id="copyToast" class="toast">Address copied</div>

    <script>
        // ==============================================================
        // CRYPTO.HTML - Trade-baseline + wallet view.
        // Split layout: 60% chart on left, 40% wallet card on right.
        // Wallet: address + balance + staking + reward history (TzKT).
        //
        // REWARD CALCULATION (post-Paris staking model):
        //   Two pools per cycle, each with its own share basis:
        //
        //   1. Delegation pool (your portion of liquid delegated tez)
        //      - Your slice: delegatedBalance / baker.externalDelegatedBalance
        //      - Reward fields: *RewardsDelegated  (legacy: *Rewards minus *StakedOwn/Edge/Shared)
        //
        //   2. Staking pool (your portion of external stake)
        //      - Your slice: stakedPseudotokens / baker.issuedPseudotokens
        //      - Reward fields: *RewardsStakedShared (post baker commission/edge)
        //
        //   Total expected payout = delegationSlice + stakingSlice
        //   For a pure staker (delegatedBalance = 0) only the staking slice applies.
        //   For a pure delegator (stakedPseudotokens = 0) only the delegation slice applies.
        //
        //   The /v1/rewards/delegators/{addr} endpoint reports baker TOTALS;
        //   to get baker pool sizes we hit /v1/rewards/bakers/{baker}?cycle... once,
        //   keyed by cycle to match reward records.
        // ==============================================================

        // --- CONFIG ---
        const TRADE_DATE_UTC_MS = Date.UTC(2026, 4, 3, 20, 57, 57);
        const TRADE_KLINE_INTERVAL = '15m';
        const TRADE_KLINE_LIMIT = 1000;

        // Tezos wallet (TzKT)
        const TEZOS_ADDRESS = 'tz1cg93LEsvZ7Uy64SkXpwAL7NUMZCwgZPxp';
        const TZKT_BASE = 'https://api.tzkt.io/v1';
        const TZKT_REFRESH_MS = 60 * 1000;
        const REWARD_HISTORY_COUNT = 6; // 1 pending + 5 realised
        let lastTzktFetchTs = 0;
        let walletBalanceXtz = null;
        let walletSpendableXtz = null;
        let latestRewardXtz = null;
        let rewardHistory = []; // [{cycle, xtz, dateMs, isFuture}, ...]

        let lastSuccessTs = 0;
        const STALE_MS = 5000;
        let consecutiveErrors = 0;

        // FX rates
        let usdToGbp = null;
        let usdToCad = null;
        const FX_REFRESH_MS = 10 * 60 * 1000;
        let lastFxFetchTs = 0;

        // Network detection
        const WORK_IPS = ['193.63.36.242'];
        let detectedIp = null;
        let isWorkNetwork = false;

        // --- HELPERS ---
        const fmt = (n, d = 2) => Number(n).toLocaleString('en-GB', { minimumFractionDigits: d, maximumFractionDigits: d });
        const fmtPct = (n) => (n >= 0 ? '+' : '') + fmt(n, 1) + '%';

        function fmtMultiCcy(usd, gbpRate, cadRate) {
            if (!isFinite(usd) || usd <= 0) return '-';
            const sub1 = usd < 1;
            const dollarsD = sub1 ? 4 : (usd >= 1000 ? 0 : 2);
            const poundsD  = sub1 ? 4 : (usd >= 1000 ? 0 : 2);
            const cadD     = sub1 ? 4 : (usd >= 1000 ? 0 : 2);
            const usdStr = "$" + fmt(usd, dollarsD);
            const gbp = (gbpRate && isFinite(gbpRate)) ? "£" + fmt(usd * gbpRate, poundsD) : null;
            const cad = (cadRate && isFinite(cadRate)) ? "C$" + fmt(usd * cadRate, cadD) : null;
            return [usdStr, gbp, cad].filter(Boolean).join(' · ');
        }

        function fmtDate(ms) {
            if (!ms || !isFinite(ms)) return '-';
            return new Date(ms).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        function valueColour(val, scale) {
            const t = Math.min(Math.abs(val) / scale, 1);
            const o = [251, 146,  60];
            const g = [ 52, 211, 153];
            const r = [248, 113, 113];
            const to = val >= 0 ? g : r;
            return `rgb(${Math.round(o[0]+(to[0]-o[0])*t)},${Math.round(o[1]+(to[1]-o[1])*t)},${Math.round(o[2]+(to[2]-o[2])*t)})`;
        }
        function writePct(elId, pct, scale = 3) {
            const el = document.getElementById(elId);
            if (!el) return;
            el.textContent = fmtPct(pct);
            el.style.color = valueColour(pct, scale);
        }
        function findBaselineIdx(klines, targetMs) {
            if (targetMs === null) return 0;
            let best = 0;
            let bestDiff = Infinity;
            klines.forEach((k, i) => {
                const diff = Math.abs(k[0] - targetMs);
                if (diff < bestDiff) { bestDiff = diff; best = i; }
            });
            return best;
        }

        function num(v) { return (typeof v === 'number' && isFinite(v)) ? v : 0; }
        function sumFields(obj, fields) {
            let t = 0;
            for (const f of fields) t += num(obj[f]);
            return t;
        }

        // --- PRIVACY ---
        function hidePrivacy() { if (detectedIp !== null && !isWorkNetwork) return; document.body.classList.remove('revealed'); }
        function revealPrivacy() { document.body.classList.add('revealed'); }

        const TIMED_REVEAL_MS = 180000;
        const DOUBLE_TAP_WINDOW_MS = 400;
        let timedRevealTimer = null;
        let lastVTapTime = 0;
        function clearTimedReveal() { if (timedRevealTimer !== null) { clearTimeout(timedRevealTimer); timedRevealTimer = null; } }
        function startTimedReveal() { clearTimedReveal(); revealPrivacy(); timedRevealTimer = setTimeout(() => { timedRevealTimer = null; hidePrivacy(); }, TIMED_REVEAL_MS); }

        document.getElementById('privacyToggle').addEventListener('click', () => {
            if (document.body.classList.contains('revealed')) { clearTimedReveal(); hidePrivacy(); }
            else startTimedReveal();
        });
        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if ((e.key === 'v' || e.key === 'V') && !e.repeat) {
                e.preventDefault();
                if (timedRevealTimer !== null) { clearTimedReveal(); hidePrivacy(); lastVTapTime = 0; return; }
                const now = Date.now();
                if (now - lastVTapTime <= DOUBLE_TAP_WINDOW_MS) { startTimedReveal(); lastVTapTime = 0; }
                else { revealPrivacy(); lastVTapTime = now; }
            }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'v' || e.key === 'V') { e.preventDefault(); if (timedRevealTimer === null) hidePrivacy(); }
        });
        document.addEventListener('visibilitychange', () => { if (document.hidden) { clearTimedReveal(); hidePrivacy(); } });
        window.addEventListener('blur', () => { clearTimedReveal(); hidePrivacy(); });
        hidePrivacy();

        async function detectNetwork() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const data = await r.json();
                detectedIp = data.ip;
                isWorkNetwork = WORK_IPS.some(ip => detectedIp === ip || detectedIp.startsWith(ip + '.'));
                console.log('[Network] IP:', detectedIp, '| Work:', isWorkNetwork);
                if (!isWorkNetwork) {
                    document.body.classList.add('revealed'); clearTimedReveal();
                    const ov = document.getElementById('privacyOverlay');
                    const tg = document.getElementById('privacyToggle');
                    if (ov) ov.style.display = 'none';
                    if (tg) tg.style.display = 'none';
                }
            } catch (e) { console.warn('[Network] IP detection failed', e); }
        }
        detectNetwork();

        // --- FAVICON ---
        const faviconEl = document.getElementById('favicon');
        const favCanvas = document.createElement('canvas');
        favCanvas.width = 32; favCanvas.height = 32;
        let lastFavColour = null;
        function setFavicon(profitable) {
            const colour = profitable ? '#2dd4bf' : '#fb923c';
            if (colour === lastFavColour) return;
            lastFavColour = colour;
            const ctx = favCanvas.getContext('2d');
            ctx.clearRect(0, 0, 32, 32);
            ctx.fillStyle = colour;
            ctx.beginPath(); ctx.arc(16, 16, 13, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();
            faviconEl.href = favCanvas.toDataURL('image/png');
        }

        // --- ADDRESS BAR INIT ---
        function initAddressBar() {
            const a = TEZOS_ADDRESS;
            document.getElementById('walletAddrShort').textContent = a.slice(0, 8) + '...' + a.slice(-6);
            document.getElementById('walletExtLink').href = `https://tzkt.io/${a}/operations`;

            document.getElementById('walletCopyBtn').addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(a);
                    showToast('Address copied');
                } catch (e) {
                    const ta = document.createElement('textarea');
                    ta.value = a; document.body.appendChild(ta);
                    ta.select(); document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast('Address copied');
                }
            });
        }
        let toastTimer = null;
        function showToast(msg) {
            const t = document.getElementById('copyToast');
            t.textContent = msg;
            t.classList.add('visible');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('visible'), 1500);
        }
        initAddressBar();

        // --- MAIN TRADE CHART ---
        const lineGradientPlugin = {
            id: 'lineGradients',
            afterLayout(chart) {
                const { ctx, chartArea } = chart;
                if (!chartArea) return;
                const { left, right } = chartArea;
                const xtzG = ctx.createLinearGradient(left, 0, right, 0);
                xtzG.addColorStop(0.00, 'rgba(30, 58,138,0.00)');
                xtzG.addColorStop(0.30, 'rgba(30, 58,138,0.06)');
                xtzG.addColorStop(0.60, 'rgba(39,150,170,0.42)');
                xtzG.addColorStop(1.00, 'rgba(45,212,191,0.90)');
                const btcG = ctx.createLinearGradient(left, 0, right, 0);
                btcG.addColorStop(0.00, 'rgba(124, 45, 18,0.00)');
                btcG.addColorStop(0.30, 'rgba(124, 45, 18,0.06)');
                btcG.addColorStop(0.60, 'rgba(194, 95, 39,0.42)');
                btcG.addColorStop(1.00, 'rgba(251,146, 60,0.90)');
                chart.data.datasets[0].borderColor = xtzG;
                if (chart.data.datasets[1]) chart.data.datasets[1].borderColor = btcG;
            }
        };

        const zeroRefLine = {
            id: 'zeroRefLine',
            afterDatasetsDraw(chart) {
                const { ctx, chartArea, scales } = chart;
                const yScale = scales.y;
                if (!yScale || !chartArea) return;
                const y = yScale.getPixelForValue(0);
                if (y < chartArea.top || y > chartArea.bottom) return;
                ctx.save();
                ctx.strokeStyle = 'rgba(148,163,184,0.45)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 3]);
                ctx.beginPath(); ctx.moveTo(chartArea.left, y); ctx.lineTo(chartArea.right, y); ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(148,163,184,0.7)';
                ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillText('+0.0%', chartArea.right - 4, y - 7);
                ctx.restore();
            }
        };

        const tradeChart = new Chart(document.getElementById('chartTrade').getContext('2d'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'XTZ', data: [], borderColor: 'rgba(45,212,191,0.90)',  backgroundColor: 'rgba(45,212,191,0.07)', borderWidth: 1.75, pointRadius: 0, tension: 0.2, fill: false, yAxisID: 'y' },
                    { label: 'BTC', data: [], borderColor: 'rgba(251,146,60,0.90)',  backgroundColor: 'transparent',          borderWidth: 1.75, pointRadius: 0, tension: 0.2, fill: false, yAxisID: 'y' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                interaction: { mode: 'index', intersect: false },
                scales: { x: { display: false }, y: { display: false } },
                plugins: { legend: { display: false }, tooltip: { enabled: false } }
            },
            plugins: [zeroRefLine, lineGradientPlugin]
        });

        // --- REWARD SPARKLINE ---
        const rewardSparkChart = new Chart(document.getElementById('rewardSpark').getContext('2d'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.15)', borderWidth: 1.5, pointRadius: 2.5, pointBackgroundColor: '#fbbf24', tension: 0.3, fill: true }] },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                interaction: { mode: 'index', intersect: false },
                scales: { x: { display: false }, y: { display: false } },
                plugins: { legend: { display: false }, tooltip: { enabled: false } }
            }
        });

        // --- DATA FETCH ---
        async function fetchKlines(symbol, interval, limit) {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
            return r.json();
        }
        async function fetchFxIfStale() {
            const now = Date.now();
            if (usdToGbp !== null && (now - lastFxFetchTs) < FX_REFRESH_MS) return;
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/USD');
                const j = await r.json();
                if (j && j.rates) {
                    if (isFinite(j.rates.GBP)) usdToGbp = j.rates.GBP;
                    if (isFinite(j.rates.CAD)) usdToCad = j.rates.CAD;
                    lastFxFetchTs = now;
                }
            } catch (e) { console.warn('[FX] fetch failed', e); }
        }

        // --- TZKT REWARD MATH ---
        function mutezToXtz(mu) { return (mu || 0) / 1_000_000; }

        // Reward field groups (per Tezos protocol, Atlas+ era).
        // For each reward source we have up to 4 variants:
        //   *Liquid       - paid as liquid tez (legacy / pre-Paris)
        //   *StakedOwn    - baker's own staked portion
        //   *StakedEdge   - baker's commission on external stake
        //   *StakedShared - external stakers' portion (post-edge)
        //   *Delegated    - liquid delegators' portion (post-Paris explicit split)
        // We also include the older flat fields for backwards compatibility.
        const REWARD_BASES = [
            'ownBlockRewards', 'extraBlockRewards', 'futureBlockRewards',
            'endorsementRewards', 'futureEndorsementRewards',
            'attestationRewards', 'futureAttestationRewards',
            'dalAttestationRewards', 'futureDalAttestationRewards',
            'nonceRevelationRewards', 'vdfRevelationRewards',
            'doubleBakingRewards', 'doubleEndorsingRewards', 'doublePreendorsingRewards'
        ];

        // Sum baker's TOTAL rewards going to the *delegated* pool for the cycle.
        // Mostly populated by *RewardsDelegated suffix fields plus liquid block fees.
        function sumBakerDelegatedPoolMutez(r) {
            if (!r || typeof r !== 'object') return 0;
            const fields = [
                'ownBlockRewardsDelegated', 'extraBlockRewardsDelegated', 'futureBlockRewardsDelegated',
                'endorsementRewardsDelegated', 'futureEndorsementRewardsDelegated',
                'attestationRewardsDelegated', 'futureAttestationRewardsDelegated',
                'dalAttestationRewardsDelegated', 'futureDalAttestationRewardsDelegated',
                'nonceRevelationRewardsDelegated', 'vdfRevelationRewardsDelegated',
                // Block fees are paid in liquid tez to the delegated pool
                'ownBlockFees', 'extraBlockFees'
            ];
            return sumFields(r, fields);
        }

        // Sum baker's TOTAL rewards going to the *external staked* pool (post baker edge).
        function sumBakerStakedSharedPoolMutez(r) {
            if (!r || typeof r !== 'object') return 0;
            const fields = [
                'ownBlockRewardsStakedShared', 'extraBlockRewardsStakedShared', 'futureBlockRewardsStakedShared',
                'endorsementRewardsStakedShared', 'futureEndorsementRewardsStakedShared',
                'attestationRewardsStakedShared', 'futureAttestationRewardsStakedShared',
                'dalAttestationRewardsStakedShared', 'futureDalAttestationRewardsStakedShared',
                'nonceRevelationRewardsStakedShared', 'vdfRevelationRewardsStakedShared'
            ];
            return sumFields(r, fields);
        }

        // Losses that should be deducted (penalties on the baker affect external stakers too).
        function sumLossesMutez(r) {
            if (!r || typeof r !== 'object') return 0;
            return sumFields(r, [
                'nonceRevelationLosses', 'revelationLosses',
                'doubleBakingLostStaked', 'doubleEndorsingLostStaked', 'doublePreendorsingLostStaked',
                'doubleBakingLostUnstaked', 'doubleEndorsingLostUnstaked', 'doublePreendorsingLostUnstaked',
                'revelationLostRewards', 'revelationLostFees',
                'doubleBakingLostDeposits', 'doubleBakingLostRewards', 'doubleBakingLostFees',
                'doubleEndorsingLostDeposits', 'doubleEndorsingLostRewards', 'doubleEndorsingLostFees'
            ]);
        }

        // Legacy/fallback: sum all reward fields as baker gross, ignoring the split.
        // Used when the *Delegated / *StakedShared split is absent.
        function sumBakerGrossLegacyMutez(r) {
            if (!r || typeof r !== 'object') return 0;
            const fields = [];
            for (const base of REWARD_BASES) fields.push(base);
            fields.push('ownBlockFees', 'extraBlockFees');
            return sumFields(r, fields);
        }

        // Compute THIS delegator/staker's expected payout in mutez for the cycle.
        // r:      delegator reward record (/rewards/delegators)
        // baker:  baker reward record for SAME cycle (/rewards/bakers/{baker})
        function computeDelegatorPayoutMutez(r, baker) {
            if (!r || typeof r !== 'object') return 0;
            const losses = sumLossesMutez(r);

            // --- DELEGATION SLICE ---
            // r.balance (or delegatedBalance) is your liquid delegated portion at snapshot.
            // baker.externalDelegatedBalance (or stakingBalance fallback) is the pool size.
            let delegSlice = 0;
            const myDelegated = num(r.delegatedBalance) || num(r.balance);
            if (myDelegated > 0 && baker) {
                const pool = num(baker.externalDelegatedBalance) || num(baker.stakingBalance);
                if (pool > 0) {
                    const delegPoolRewards = sumBakerDelegatedPoolMutez(baker);
                    delegSlice = delegPoolRewards * (myDelegated / pool);
                }
            }

            // --- STAKING SLICE ---
            // Your slice via pseudotokens (the protocol's unit-of-account for stake shares).
            let stakeSlice = 0;
            const myPT = num(r.stakedPseudotokens);
            if (myPT > 0 && baker) {
                const issued = num(baker.issuedPseudotokens);
                if (issued > 0) {
                    const stakePoolRewards = sumBakerStakedSharedPoolMutez(baker);
                    stakeSlice = stakePoolRewards * (myPT / issued);
                }
            }

            // --- FALLBACK ---
            // If the baker record is missing OR the new split fields aren't populated yet
            // (e.g. very old cycles, or pre-Paris records), fall back to the legacy
            // gross * (balance / stakingBalance) calculation.
            if (delegSlice === 0 && stakeSlice === 0) {
                const bakerGross = baker ? sumBakerGrossLegacyMutez(baker) : 0;
                const sb = num(r.stakingBalance);
                const bal = num(r.balance) || num(r.delegatedBalance);
                if (bakerGross > 0 && sb > 0 && bal > 0) {
                    return Math.max(0, bakerGross - losses) * (bal / sb);
                }
                return 0;
            }

            // Apply losses proportionally to combined slice (rare edge case)
            const gross = delegSlice + stakeSlice;
            const totalPool = (baker ? sumBakerDelegatedPoolMutez(baker) + sumBakerStakedSharedPoolMutez(baker) : 0);
            const lossShare = (totalPool > 0) ? losses * (gross / totalPool) : 0;
            return Math.max(0, gross - lossShare);
        }

        function isCycleInFuture(r) {
            const futureFields = ['futureBlockRewards', 'futureEndorsementRewards', 'futureAttestationRewards', 'futureDalAttestationRewards',
                                  'futureBlockRewardsDelegated', 'futureBlockRewardsStakedShared',
                                  'futureEndorsementRewardsDelegated', 'futureEndorsementRewardsStakedShared',
                                  'futureAttestationRewardsDelegated', 'futureAttestationRewardsStakedShared',
                                  'futureDalAttestationRewardsDelegated', 'futureDalAttestationRewardsStakedShared'];
            for (const f of futureFields) {
                if (typeof r[f] === 'number' && r[f] > 0) return true;
            }
            return false;
        }

        async function fetchTzktIfStale() {
            const now = Date.now();
            if (walletBalanceXtz !== null && (now - lastTzktFetchTs) < TZKT_REFRESH_MS) return;
            try {
                const [accRes, rewRes] = await Promise.all([
                    fetch(`${TZKT_BASE}/accounts/${TEZOS_ADDRESS}`),
                    fetch(`${TZKT_BASE}/rewards/delegators/${TEZOS_ADDRESS}?limit=${REWARD_HISTORY_COUNT}`)
                ]);
                const acc = await accRes.json();
                const rew = await rewRes.json();

                // ACCOUNT
                const totalMutez = acc.balance || 0;
                const stakedMutez = acc.stakedBalance || 0;
                const unstakedMutez = acc.unstakedBalance || 0;
                const spendableMutez = totalMutez - stakedMutez - unstakedMutez;
                walletBalanceXtz = mutezToXtz(totalMutez);
                walletSpendableXtz = mutezToXtz(spendableMutez);
                const stakedXtz = mutezToXtz(stakedMutez);
                const unstakedXtz = mutezToXtz(unstakedMutez);

                let bakerLabel = '-';
                let bakerAddr = null;
                if (acc.delegate) {
                    bakerAddr = acc.delegate.address || null;
                    bakerLabel = acc.delegate.alias
                        || (bakerAddr ? bakerAddr.slice(0, 6) + '...' + bakerAddr.slice(-4) : '-');
                }

                // BAKER REWARDS for matching cycles - needed to compute pool shares
                let bakerByCycle = new Map();
                if (bakerAddr && Array.isArray(rew) && rew.length > 0) {
                    const cycles = rew.map(r => r.cycle).filter(c => typeof c === 'number');
                    if (cycles.length > 0) {
                        const minC = Math.min(...cycles);
                        const maxC = Math.max(...cycles);
                        try {
                            const bRes = await fetch(`${TZKT_BASE}/rewards/bakers/${bakerAddr}?cycle.ge=${minC}&cycle.le=${maxC}&limit=${maxC - minC + 2}`);
                            const bJson = await bRes.json();
                            if (Array.isArray(bJson)) {
                                bJson.forEach(b => { if (b && typeof b.cycle === 'number') bakerByCycle.set(b.cycle, b); });
                            }
                        } catch (e) { console.warn('[TzKT] baker rewards fetch failed', e); }
                    }
                }

                // REWARDS - new dual-pool calculation
                let parsedRewards = [];
                if (Array.isArray(rew) && rew.length > 0) {
                    parsedRewards = rew.map(r => ({
                        cycle: r.cycle,
                        xtz: mutezToXtz(computeDelegatorPayoutMutez(r, bakerByCycle.get(r.cycle))),
                        isFuture: isCycleInFuture(r),
                        dateMs: null
                    }));
                }

                // Cycle metadata for dates
                if (parsedRewards.length > 0) {
                    const cycles = parsedRewards.map(p => p.cycle);
                    const minC = Math.min(...cycles);
                    const maxC = Math.max(...cycles);
                    try {
                        const cyclesRes = await fetch(`${TZKT_BASE}/cycles?cycle.ge=${minC}&cycle.le=${maxC}&select=index,endTime&limit=${maxC - minC + 1}`);
                        const cyclesJson = await cyclesRes.json();
                        const cycleEndMap = new Map();
                        if (Array.isArray(cyclesJson)) {
                            cyclesJson.forEach(c => {
                                if (c && typeof c.index === 'number' && c.endTime) {
                                    cycleEndMap.set(c.index, new Date(c.endTime).getTime());
                                }
                            });
                        }
                        parsedRewards.forEach(p => { p.dateMs = cycleEndMap.get(p.cycle) || null; });
                    } catch (e) { console.warn('[TzKT] cycles fetch failed', e); }
                }

                rewardHistory = parsedRewards;
                latestRewardXtz = parsedRewards.length > 0 ? parsedRewards[0].xtz : 0;
                lastTzktFetchTs = now;

                renderWallet({
                    totalXtz: walletBalanceXtz, spendableXtz: walletSpendableXtz,
                    stakedXtz, unstakedXtz, bakerLabel, bakerAddr
                });
                renderRewards(parsedRewards);
            } catch (e) {
                console.warn('[TzKT] fetch failed', e);
            }
        }

        function renderWallet(s) {
            document.getElementById('walletBalance').textContent = fmt(s.totalXtz, 2) + ' XTZ';
            document.getElementById('walletSpendable').textContent = fmt(s.spendableXtz, 2) + ' XTZ';
            document.getElementById('walletStaked').textContent = fmt(s.stakedXtz, 2) + ' XTZ';

            const unstakeWrap = document.getElementById('walletUnstakeWrap');
            const unstakeEl = document.getElementById('walletUnstaking');
            if (s.unstakedXtz > 0) {
                unstakeWrap.classList.remove('hidden');
                unstakeEl.textContent = fmt(s.unstakedXtz, 2) + ' XTZ';
            } else {
                unstakeWrap.classList.add('hidden');
            }

            const bakerEl = document.getElementById('walletBakerLink');
            bakerEl.textContent = s.bakerLabel;
            bakerEl.href = s.bakerAddr ? `https://tzkt.io/${s.bakerAddr}` : '#';
            updateWalletFiat();
        }

        function renderRewards(rewards) {
            if (!rewards || rewards.length === 0) {
                document.getElementById('rewardCycle').textContent = '-';
                document.getElementById('rewardAmount').textContent = '-';
                document.getElementById('rewardStatus').textContent = '-';
                document.getElementById('rewardHistoryBody').innerHTML = '<tr><td colspan="4" class="text-center text-slate-500 italic">No data</td></tr>';
                return;
            }

            const next = rewards[0];
            document.getElementById('rewardCycle').textContent = next.cycle;
            document.getElementById('rewardAmount').textContent = (next.xtz > 0 ? '+' : '') + fmt(next.xtz, 4) + ' XTZ';
            const statusEl = document.getElementById('rewardStatus');
            statusEl.textContent = next.isFuture ? 'PENDING' : 'REALISED';
            statusEl.style.color = next.isFuture ? '#fbbf24' : '#34d399';

            const history = next.isFuture ? rewards.slice(1) : rewards.slice(0);

            const sparkData = history.slice().reverse();
            rewardSparkChart.data.labels = sparkData.map(h => 'C' + h.cycle);
            rewardSparkChart.data.datasets[0].data = sparkData.map(h => h.xtz);
            rewardSparkChart.update();

            const tbody = document.getElementById('rewardHistoryBody');
            if (history.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-slate-500 italic">No realised cycles yet</td></tr>';
            } else {
                tbody.innerHTML = history.map(h => {
                    const gbpVal = (lastXtzPriceUsd && usdToGbp && h.xtz > 0)
                        ? "£" + fmt(h.xtz * lastXtzPriceUsd * usdToGbp, 2)
                        : '-';
                    return `<tr class="realised">
                        <td>${h.cycle}</td>
                        <td>${fmtDate(h.dateMs)}</td>
                        <td class="num amount">+${fmt(h.xtz, 4)}</td>
                        <td class="num text-slate-400">${gbpVal}</td>
                    </tr>`;
                }).join('');
            }

            updateWalletFiat();
        }

        let lastXtzPriceUsd = null;
        function updateWalletFiat() {
            const fiatEl = document.getElementById('walletFiat');
            const rewardFiatEl = document.getElementById('rewardFiat');
            if (lastXtzPriceUsd == null) {
                fiatEl.textContent = '-';
                rewardFiatEl.textContent = '-';
                return;
            }
            if (walletBalanceXtz != null) {
                fiatEl.textContent = fmtMultiCcy(walletBalanceXtz * lastXtzPriceUsd, usdToGbp, usdToCad);
            }
            if (latestRewardXtz != null && latestRewardXtz > 0) {
                rewardFiatEl.textContent = fmtMultiCcy(latestRewardXtz * lastXtzPriceUsd, usdToGbp, usdToCad);
            } else {
                rewardFiatEl.textContent = '-';
            }
            const tbody = document.getElementById('rewardHistoryBody');
            const rows = tbody.querySelectorAll('tr.realised');
            const next = rewardHistory[0];
            const history = (next && next.isFuture) ? rewardHistory.slice(1) : rewardHistory.slice(0);
            rows.forEach((row, i) => {
                const h = history[i];
                if (!h) return;
                const cells = row.querySelectorAll('td');
                if (cells.length === 4 && lastXtzPriceUsd && usdToGbp && h.xtz > 0) {
                    cells[3].textContent = "£" + fmt(h.xtz * lastXtzPriceUsd * usdToGbp, 2);
                }
            });
        }

        // --- MAIN UPDATE ---
        async function updateAll() {
            try {
                fetchFxIfStale();
                fetchTzktIfStale();
                const [xtzK, btcK] = await Promise.all([
                    fetchKlines('XTZUSDT', TRADE_KLINE_INTERVAL, TRADE_KLINE_LIMIT),
                    fetchKlines('BTCUSDT', TRADE_KLINE_INTERVAL, TRADE_KLINE_LIMIT)
                ]);

                const xtzClose = xtzK.map(c => parseFloat(c[4]));
                const btcClose = btcK.map(c => parseFloat(c[4]));

                const tradeIdx = findBaselineIdx(xtzK, TRADE_DATE_UTC_MS);
                const xtzBase = xtzClose[tradeIdx];
                const btcBase = btcClose[Math.min(tradeIdx, btcClose.length - 1)];

                const xtzSlice = xtzClose.slice(tradeIdx);
                const kSlice   = xtzK.slice(tradeIdx);
                const xtzIdx = xtzSlice.map(v => ((v / xtzBase) - 1) * 100);

                tradeChart.data.labels = kSlice.map(k => {
                    const dt = new Date(k[0]);
                    return dt.toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false });
                });
                tradeChart.data.datasets[0].data = xtzIdx;

                const btcSlice = btcClose.slice(Math.min(tradeIdx, btcClose.length - 1));
                const btcIdx = (isFinite(btcBase) && btcBase > 0)
                    ? btcSlice.map(v => ((v / btcBase) - 1) * 100)
                    : [];
                const btcAligned = btcIdx.slice(0, xtzIdx.length);
                tradeChart.data.datasets[1].data = btcAligned;

                const allIdx = [...xtzIdx, ...btcAligned, 0];
                const idxMin = Math.min(...allIdx); const idxMax = Math.max(...allIdx);
                const idxRange = (idxMax - idxMin) || 1; const idxPad = idxRange * 0.08;
                tradeChart.options.scales.y.min = idxMin - idxPad;
                tradeChart.options.scales.y.max = idxMax + idxPad;

                tradeChart.update();

                const xtzPctTrade = xtzIdx[xtzIdx.length - 1];
                writePct('xtzPct_trade', xtzPctTrade);

                const xtzPriceNow = xtzSlice[xtzSlice.length - 1];
                const btcPriceNow = btcClose[btcClose.length - 1];
                if (isFinite(btcBase) && btcBase > 0 && isFinite(btcPriceNow)) {
                    const btcPctTrade = ((btcPriceNow / btcBase) - 1) * 100;
                    writePct('btcPct_trade', btcPctTrade);
                }

                const xtzPriceEl = document.getElementById('xtzPrice');
                const btcPriceEl = document.getElementById('btcPrice');
                if (xtzPriceEl) xtzPriceEl.textContent = fmtMultiCcy(xtzPriceNow, usdToGbp, usdToCad);
                if (btcPriceEl) btcPriceEl.textContent = fmtMultiCcy(btcPriceNow, usdToGbp, usdToCad);

                lastXtzPriceUsd = xtzPriceNow;
                updateWalletFiat();

                const profitable = xtzPctTrade >= 0;
                setFavicon(profitable);
                document.title = "XTZ " + fmtPct(xtzPctTrade);

                lastSuccessTs = Date.now();
                consecutiveErrors = 0;
                document.getElementById('liveDot').classList.remove('stale', 'error');
                document.getElementById('liveStatus').textContent = 'Live';
                document.getElementById('errCount').classList.add('hidden');

            } catch (err) {
                consecutiveErrors++;
                console.error('Update failed', err);
                document.getElementById('liveDot').classList.add('error');
                document.getElementById('liveStatus').textContent = 'Error';
                const ec = document.getElementById('errCount');
                ec.textContent = `x${consecutiveErrors}`;
                ec.classList.remove('hidden');
            }
        }

        setInterval(() => {
            if (lastSuccessTs === 0) return;
            const ageMs = Date.now() - lastSuccessTs;
            const liveDot = document.getElementById('liveDot');
            const liveStatus = document.getElementById('liveStatus');
            if (ageMs > STALE_MS) {
                if (!liveDot.classList.contains('error')) { liveDot.classList.add('stale'); liveStatus.textContent = 'Stale'; }
            }
        }, 1000);

        updateAll();
        setInterval(updateAll, 1000);
    </script>
