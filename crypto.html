    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { height: 100%; overflow: hidden; overflow-x: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000 radial-gradient(ellipse at top, rgba(45, 212, 191, 0.20) 0%, rgba(30, 41, 59, 0.15) 40%, transparent 75%) no-repeat;
            font-variant-numeric: tabular-nums;
        }
        /* Mobile: keep everything in viewport, no scroll. Tighten gaps + padding,
           drop redundant labels, pin chart to remaining space. */
        @media (max-width: 767px) {
            /* Cap chart in a rectangular box rather than stretching it
               to fill all remaining viewport height (which made the
               chart look comically tall on phones). Body scrolls if needed. */
            html, body { height: auto; min-height: 100%; overflow-y: auto; overflow-x: hidden; max-width: 100%; }
            body { width: 100%; padding: 4px; }
            #chartCard { flex: 0 0 auto; min-height: 0; }
            #chartCard > div.flex-1 { height: 45vh; max-height: 420px; min-height: 240px; flex: 0 0 auto; }
            #heroRateBlock { padding: 6px 8px; }
            #heroRateBlock > table { font-size: 11px; }
            #heroRateBlock > table th,
            #heroRateBlock > table td { padding-top: 1px; padding-bottom: 1px; }
            /* Compress chart legend to one row */
            #chartLegendRow { font-size: 9px; gap: 4px; }
            #chartLegendRow .legend-title { font-size: 9px; }
        }
        @media (min-width: 768px) { }
        .glass-card {
            background: #000; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.12); border-radius: 12px;
        }
        .glass-card-accent {
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.12) 0%, #000 60%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(45, 212, 191, 0.25); border-radius: 12px;
            box-shadow: 0 0 10px rgba(45, 212, 191, 0.08);
        }
        .zec-gradient { background: linear-gradient(to right, #fde047, #ca8a04); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .xtz-gradient { background: linear-gradient(to right, #1e3a8a, #2dd4bf); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 2s infinite; }
        .live-dot.stale { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        .live-dot.error { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .stale-dim { opacity: 0.5; transition: opacity 0.3s ease; }
        .privacy-overlay { position: fixed; inset: 0; background: #020617; z-index: 9998; transition: opacity 0.15s ease; }
        body.revealed .privacy-overlay { opacity: 0; pointer-events: none; }
        .privacy-toggle {
            position: fixed; bottom: 6px; right: 6px; width: 10px; height: 10px;
            border-radius: 50%; background: rgba(100, 116, 139, 0.25); border: none;
            cursor: pointer; z-index: 9999; padding: 0; transition: background 0.2s ease, transform 0.2s ease;
        }
        .privacy-toggle:hover { background: rgba(148, 163, 184, 0.6); transform: scale(1.3); }
        body.revealed .privacy-toggle { background: rgba(34, 211, 238, 0.4); }
        @media (hover: none) and (pointer: coarse) { .privacy-overlay, .privacy-toggle { display: none; } }
    </style>
</head>
<body class="text-slate-100 p-1 md:p-3 flex flex-col">
    <div class="max-w-screen-2xl mx-auto w-full flex-1 flex flex-col gap-1 md:gap-2 min-h-0">

        <!-- HEADER -->
        <header class="relative flex-none pr-16">
            <div class="text-sm md:text-base font-semibold tracking-tight leading-tight flex flex-col gap-y-0.5">
                <div class="flex items-baseline gap-x-1.5">
                    <span class="text-lg md:text-2xl font-bold xtz-gradient">XTZ</span>
                    <span class="text-slate-400 text-sm md:text-base">vs</span>
                    <span class="text-lg md:text-2xl font-bold zec-gradient">ZEC</span>
                </div>
                <div class="text-slate-500 text-xs font-normal">since trade:</div>
                <div class="flex flex-wrap items-baseline gap-x-2 gap-y-0.5">
                    <span class="flex items-baseline gap-x-1">
                        <span class="xtz-gradient font-bold">XTZ:</span>
                        <span id="xtzPct_trade" class="font-bold">-</span>
                    </span>
                    <span class="text-slate-600">·</span>
                    <span class="flex items-baseline gap-x-1">
                        <span class="zec-gradient font-bold">ZEC:</span>
                        <span id="zecPct_trade" class="font-bold">-</span>
                    </span>
                    <span class="text-slate-600">·</span>
                    <span class="flex items-baseline gap-x-1">
                        <span class="font-bold" style="color:#a78bfa;">RS:</span>
                        <span id="rsHeadline" class="font-bold" style="color:#a78bfa;">-</span>
                    </span>
                </div>
            </div>
            <div class="absolute right-0 top-1/2 -translate-y-1/2 flex items-center gap-2 md:gap-3 text-xs">
                <div class="flex items-center gap-1.5">
                    <span id="liveDot" class="live-dot"></span>
                    <span id="liveStatus" class="text-slate-400">Live</span>
                    <span id="errCount" class="hidden text-[10px] text-rose-400 font-semibold"></span>
                </div>
            </div>
        </header>

        <!-- MAIN TRADE CHART -->
        <section id="chartCard" class="glass-card p-1 md:p-2 flex flex-col flex-1 min-h-0">
            <div id="chartLegendRow" class="flex items-center mb-1 flex-none text-xs font-semibold gap-2 flex-nowrap">
                <div class="flex items-center gap-2 md:gap-3 text-[10px] flex-nowrap whitespace-nowrap">
                    <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#2dd4bf;"></span><span class="xtz-gradient">XTZ</span></span>
                    <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#fde047;"></span><span class="zec-gradient">ZEC</span></span>
                    <span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded-full" style="background:#a78bfa;"></span><span style="color:#a78bfa;">RS</span></span>
                </div>
            </div>
            <div class="flex-1 min-h-0 relative"><canvas id="chartTrade"></canvas></div>
        </section>

    </div>

    <!-- Privacy overlay -->
    <div id="privacyOverlay" class="privacy-overlay"></div>
    <button id="privacyToggle" class="privacy-toggle" title="Click to reveal for 3 min" aria-label="Toggle visibility"></button>

    <script>
        // ==============================================================
        // CRYPTO.HTML - Trade-baseline only view.
        // Single chart, single hero column, all metrics measured from
        // trade-entry candle on 3 May 2026 20:57:57 UTC (21:57:57 BST).
        //
        // RS = XTZ% - ZEC% from trade entry (percentage points).
        //   Positive = XTZ outperforming ZEC since trade
        //   Negative = ZEC outperforming XTZ since trade
        // BREAK_EVEN_RS_PP = +0.30pp (covers ~0.20pp round-trip taker fees
        //   for XTZ -> USDT -> ZEC swap-back, plus a slippage margin).
        // ==============================================================

        // --- CONFIG ---
        const TRADE_DATE_UTC_MS = Date.UTC(2026, 4, 3, 20, 57, 57);
        const BREAK_EVEN_RS_PP  = 0.30; // post-fee BE threshold; updates sparkline ref line + favicon colour

        // Trade kline source: 15m candles, 1000 limit (~10 days of room)
        const TRADE_KLINE_INTERVAL = '15m';
        const TRADE_KLINE_LIMIT = 1000;

        let lastSuccessTs = 0;
        const STALE_MS = 5000;
        let consecutiveErrors = 0;

        // --- NETWORK DETECTION (privacy overlay) ---
        const WORK_IPS = ['193.63.36.242'];
        let detectedIp = null;
        let isWorkNetwork = false;

        // --- HELPERS ---
        const fmt = (n, d = 2) => Number(n).toLocaleString('en-GB', { minimumFractionDigits: d, maximumFractionDigits: d });
        const fmtPct = (n) => (n >= 0 ? '+' : '') + fmt(n, 1) + '%';
        const fmtRs  = (n) => (n >= 0 ? '+' : '') + fmt(n, 1) + 'pp';

        // Colour scale: orange at zero, green for positive, red for negative.
        // scale = the value at which the colour reaches full saturation.
        function valueColour(val, scale) {
            const t = Math.min(Math.abs(val) / scale, 1);
            const o = [251, 146,  60];  // orange (zero)
            const g = [ 52, 211, 153];  // emerald (positive)
            const r = [248, 113, 113];  // red (negative)
            const to = val >= 0 ? g : r;
            return `rgb(${Math.round(o[0]+(to[0]-o[0])*t)},${Math.round(o[1]+(to[1]-o[1])*t)},${Math.round(o[2]+(to[2]-o[2])*t)})`;
        }
        function writePct(elId, pct, scale = 3) {
            const el = document.getElementById(elId);
            if (!el) return;
            el.textContent = fmtPct(pct);
            el.style.color = valueColour(pct, scale);
        }
        // Find index of candle whose open-time is closest to targetMs
        function findBaselineIdx(klines, targetMs) {
            if (targetMs === null) return 0;
            let best = 0;
            let bestDiff = Infinity;
            klines.forEach((k, i) => {
                const diff = Math.abs(k[0] - targetMs);
                if (diff < bestDiff) { bestDiff = diff; best = i; }
            });
            return best;
        }

        // --- PRIVACY ---
        function hidePrivacy() { if (detectedIp !== null && !isWorkNetwork) return; document.body.classList.remove('revealed'); }
        function revealPrivacy() { document.body.classList.add('revealed'); }

        const TIMED_REVEAL_MS = 180000;
        const DOUBLE_TAP_WINDOW_MS = 400;
        let timedRevealTimer = null;
        let lastVTapTime = 0;
        function clearTimedReveal() { if (timedRevealTimer !== null) { clearTimeout(timedRevealTimer); timedRevealTimer = null; } }
        function startTimedReveal() { clearTimedReveal(); revealPrivacy(); timedRevealTimer = setTimeout(() => { timedRevealTimer = null; hidePrivacy(); }, TIMED_REVEAL_MS); }

        document.getElementById('privacyToggle').addEventListener('click', () => {
            if (document.body.classList.contains('revealed')) { clearTimedReveal(); hidePrivacy(); }
            else startTimedReveal();
        });
        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if ((e.key === 'v' || e.key === 'V') && !e.repeat) {
                e.preventDefault();
                if (timedRevealTimer !== null) { clearTimedReveal(); hidePrivacy(); lastVTapTime = 0; return; }
                const now = Date.now();
                if (now - lastVTapTime <= DOUBLE_TAP_WINDOW_MS) { startTimedReveal(); lastVTapTime = 0; }
                else { revealPrivacy(); lastVTapTime = now; }
            }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'v' || e.key === 'V') { e.preventDefault(); if (timedRevealTimer === null) hidePrivacy(); }
        });
        document.addEventListener('visibilitychange', () => { if (document.hidden) { clearTimedReveal(); hidePrivacy(); } });
        window.addEventListener('blur', () => { clearTimedReveal(); hidePrivacy(); });
        hidePrivacy();

        async function detectNetwork() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const data = await r.json();
                detectedIp = data.ip;
                isWorkNetwork = WORK_IPS.some(ip => detectedIp === ip || detectedIp.startsWith(ip + '.'));
                console.log('[Network] IP:', detectedIp, '| Work:', isWorkNetwork);
                if (!isWorkNetwork) {
                    document.body.classList.add('revealed'); clearTimedReveal();
                    const ov = document.getElementById('privacyOverlay');
                    const tg = document.getElementById('privacyToggle');
                    if (ov) ov.style.display = 'none';
                    if (tg) tg.style.display = 'none';
                }
            } catch (e) { console.warn('[Network] IP detection failed', e); }
        }
        detectNetwork();

        // --- FAVICON (teal when net-profitable, yellow otherwise) ---
        const faviconEl = document.getElementById('favicon');
        const favCanvas = document.createElement('canvas');
        favCanvas.width = 32; favCanvas.height = 32;
        let lastFavColour = null;
        function setFavicon(profitable) {
            const colour = profitable ? '#2dd4bf' : '#fde047';
            if (colour === lastFavColour) return;
            lastFavColour = colour;
            const ctx = favCanvas.getContext('2d');
            ctx.clearRect(0, 0, 32, 32);
            ctx.fillStyle = colour;
            ctx.beginPath(); ctx.arc(16, 16, 13, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();
            faviconEl.href = favCanvas.toDataURL('image/png');
        }

        // --- MAIN TRADE CHART ---
        // Datasets:
        //   [0] XTZ indexed % (teal, left axis y)
        //   [1] ZEC indexed % (yellow, left axis y - shared scale with XTZ)
        //   [2] RS = xtz% - zec% (purple, right hidden axis yRs)
        // Reference lines on the RS axis:
        //   0pp = trade entry
        //   +BREAK_EVEN_RS_PP (+0.30pp) = post-fee break-even with margin
        const tradeChartRefLines = {
            id: 'tradeChartRefLines',
            afterDatasetsDraw(chart) {
                const { ctx, chartArea, scales } = chart;
                const yScale = scales.yRs;
                if (!yScale || !chartArea) return;
                const drawLine = (value, color, dash, label) => {
                    if (value === null || isNaN(value)) return;
                    const y = yScale.getPixelForValue(value);
                    if (y < chartArea.top || y > chartArea.bottom) return;
                    ctx.save();
                    ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.setLineDash(dash);
                    ctx.beginPath(); ctx.moveTo(chartArea.left, y); ctx.lineTo(chartArea.right, y); ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.fillStyle = color;
                    ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(label, chartArea.right - 4, y - 7);
                    ctx.restore();
                };
                drawLine(0, 'rgba(148,163,184,0.45)', [4, 3], '+0.00pp');
                drawLine(BREAK_EVEN_RS_PP, 'rgba(45,212,191,0.55)', [2, 3], '+' + BREAK_EVEN_RS_PP.toFixed(2) + 'pp');
            }
        };

        // Gradient colours + opacity fade applied to XTZ and ZEC lines after layout.
        // Both lines are nearly invisible at the left (oldest data) and ramp up to full
        // opacity at the right (most recent data). Opacity build starts around 30% width.
        // XTZ: navy (#1e3a8a) → teal (#2dd4bf) · ZEC: yellow (#fde047) → dark gold (#ca8a04)
        const lineGradientPlugin = {
            id: 'lineGradients',
            afterLayout(chart) {
                const { ctx, chartArea } = chart;
                if (!chartArea) return;
                const { left, right } = chartArea;
                const xtzG = ctx.createLinearGradient(left, 0, right, 0);
                xtzG.addColorStop(0.00, 'rgba(30, 58,138,0.00)');   // invisible at far left
                xtzG.addColorStop(0.30, 'rgba(30, 58,138,0.06)');   // barely visible at 30%
                xtzG.addColorStop(0.60, 'rgba(39,150,170,0.42)');   // mid-opacity at 60%
                xtzG.addColorStop(1.00, 'rgba(45,212,191,0.90)');   // full at right
                const zecG = ctx.createLinearGradient(left, 0, right, 0);
                zecG.addColorStop(0.00, 'rgba(253,224, 71,0.00)');
                zecG.addColorStop(0.30, 'rgba(253,224, 71,0.06)');
                zecG.addColorStop(0.60, 'rgba(222,172, 31,0.42)');
                zecG.addColorStop(1.00, 'rgba(202,138,  4,0.90)');
                chart.data.datasets[0].borderColor = xtzG;
                chart.data.datasets[1].borderColor = zecG;
            }
        };

        const tradeChart = new Chart(document.getElementById('chartTrade').getContext('2d'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'XTZ', data: [], borderColor: 'rgba(45,212,191,0.90)',  backgroundColor: 'rgba(45,212,191,0.07)', borderWidth: 1.75, pointRadius: 0, tension: 0.2, fill: false, yAxisID: 'y' },
                    { label: 'ZEC', data: [], borderColor: 'rgba(202,138,4,0.90)',   backgroundColor: 'transparent',          borderWidth: 1.75, pointRadius: 0, tension: 0.2, fill: false, yAxisID: 'y' },
                    { label: 'RS',  data: [], borderColor: 'rgba(167,139,250,0.85)', backgroundColor: 'rgba(167,139,250,0.18)', borderWidth: 1.75, pointRadius: 0, tension: 0.2, fill: 'origin', yAxisID: 'yRs' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x:    { display: false },
                    y:    { display: false },
                    yRs:  { display: false, position: 'right' }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false }
                }
            },
            plugins: [tradeChartRefLines, lineGradientPlugin]
        });

        // --- DATA FETCH ---
        async function fetchKlines(symbol, interval, limit) {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
            return r.json();
        }
        // --- MAIN UPDATE ---
        async function updateAll() {
            try {
                const [zecK, xtzK] = await Promise.all([
                    fetchKlines('ZECUSDT', TRADE_KLINE_INTERVAL, TRADE_KLINE_LIMIT),
                    fetchKlines('XTZUSDT', TRADE_KLINE_INTERVAL, TRADE_KLINE_LIMIT)
                ]);

                const zecClose = zecK.map(c => parseFloat(c[4]));
                const xtzClose = xtzK.map(c => parseFloat(c[4]));

                const tradeIdx = findBaselineIdx(xtzK, TRADE_DATE_UTC_MS);
                const xtzBase = xtzClose[tradeIdx];
                const zecBase = zecClose[tradeIdx];

                // Build sliced series starting at trade entry
                const xtzSlice = xtzClose.slice(tradeIdx);
                const zecSlice = zecClose.slice(tradeIdx);
                const kSlice   = xtzK.slice(tradeIdx);

                const xtzIdx = xtzSlice.map(v => ((v / xtzBase) - 1) * 100);
                const zecIdx = zecSlice.map(v => ((v / zecBase) - 1) * 100);
                const rs     = xtzIdx.map((x, i) => x - zecIdx[i]);

                // Update main chart (BTC is intentionally excluded from the chart - it's
                // shown in the hero table but doesn't belong on the trade-baselined chart).
                tradeChart.data.labels = kSlice.map(k => {
                    const dt = new Date(k[0]);
                    return dt.toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false });
                });
                tradeChart.data.datasets[0].data = xtzIdx;
                tradeChart.data.datasets[1].data = zecIdx;
                tradeChart.data.datasets[2].data = rs;

                const allIdx = [...xtzIdx, ...zecIdx];
                const idxMin = Math.min(...allIdx); const idxMax = Math.max(...allIdx);
                const idxRange = (idxMax - idxMin) || 1; const idxPad = idxRange * 0.08;
                tradeChart.options.scales.y.min = idxMin - idxPad;
                tradeChart.options.scales.y.max = idxMax + idxPad;

                // RS axis: include both reference lines (0pp and +0.30pp) plus current value
                // so all three are always visible regardless of how the live RS drifts
                const currentRsForRange = xtzIdx[xtzIdx.length - 1] - zecIdx[zecIdx.length - 1];
                const rsValues = [...rs, 0, BREAK_EVEN_RS_PP, currentRsForRange];
                const rsMin = Math.min(...rsValues); const rsMax = Math.max(...rsValues);
                const rsRange = (rsMax - rsMin) || 1; const rsPad = rsRange * 0.1;
                tradeChart.options.scales.yRs.min = rsMin - rsPad;
                tradeChart.options.scales.yRs.max = rsMax + rsPad;

                tradeChart.update();

                // Hero table cells
                const xtzPctTrade = xtzIdx[xtzIdx.length - 1];
                const zecPctTrade = zecIdx[zecIdx.length - 1];
                const currentRsTrade = xtzPctTrade - zecPctTrade;
                writePct('xtzPct_trade', xtzPctTrade);
                writePct('zecPct_trade', zecPctTrade);

                // Headline RS in header
                const profitable = currentRsTrade >= BREAK_EVEN_RS_PP;
                const rsEl = document.getElementById('rsHeadline');
                rsEl.textContent = fmtRs(currentRsTrade);
                rsEl.style.color = valueColour(currentRsTrade, 1);

                // Favicon + tab title
                setFavicon(profitable);
                document.title = fmtRs(currentRsTrade);

                // Status
                lastSuccessTs = Date.now();
                consecutiveErrors = 0;
                document.getElementById('liveDot').classList.remove('stale', 'error');
                document.getElementById('liveStatus').textContent = 'Live';
                document.getElementById('errCount').classList.add('hidden');

            } catch (err) {
                consecutiveErrors++;
                console.error('Update failed', err);
                document.getElementById('liveDot').classList.add('error');
                document.getElementById('liveStatus').textContent = 'Error';
                const ec = document.getElementById('errCount');
                ec.textContent = `x${consecutiveErrors}`;
                ec.classList.remove('hidden');
            }
        }

        // Stale watcher
        setInterval(() => {
            if (lastSuccessTs === 0) return;
            const ageMs = Date.now() - lastSuccessTs;
            const liveDot = document.getElementById('liveDot');
            const liveStatus = document.getElementById('liveStatus');
            if (ageMs > STALE_MS) {
                if (!liveDot.classList.contains('error')) { liveDot.classList.add('stale'); liveStatus.textContent = 'Stale'; }
            }
        }, 1000);

        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
