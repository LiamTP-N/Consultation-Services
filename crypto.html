<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 50%, #020617 100%);
            font-variant-numeric: tabular-nums;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 12px;
        }
        .glass-card-accent {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.22), rgba(30, 41, 59, 0.5));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 197, 94, 0.5);
            border-radius: 12px;
            box-shadow: 0 0 14px rgba(34, 197, 94, 0.18);
        }
        .zec-gradient {
            background: linear-gradient(to right, #fde047, #b8860b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .xtz-gradient {
            background: linear-gradient(to right, #1e3a8a, #2dd4bf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }
        .live-dot.stale { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        .live-dot.error { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Privacy overlay */
        .privacy-overlay {
            position: fixed;
            inset: 0;
            background: #020617;
            z-index: 9998;
            transition: opacity 0.15s ease;
        }
        body.revealed .privacy-overlay {
            opacity: 0;
            pointer-events: none;
        }
        .privacy-toggle {
            position: fixed;
            bottom: 6px;
            right: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(100, 116, 139, 0.25);
            border: none;
            cursor: pointer;
            z-index: 9999;
            padding: 0;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .privacy-toggle:hover {
            background: rgba(148, 163, 184, 0.6);
            transform: scale(1.3);
        }
        body.revealed .privacy-toggle {
            background: rgba(34, 211, 238, 0.4);
        }
    </style>
</head>
<body class="text-slate-100 p-2 md:p-3 flex flex-col">
    <div class="max-w-7xl mx-auto w-full flex-1 flex flex-col gap-2 min-h-0">

        <!-- HEADER -->
        <header class="flex items-center justify-between gap-3 flex-none">
            <div>
                <h1 class="text-xl md:text-2xl font-bold tracking-tight leading-tight">
                    <span class="zec-gradient">ZEC</span>
                    <span class="text-slate-400 mx-1">→</span>
                    <span class="xtz-gradient">XTZ</span>
                </h1>
            </div>
            <div class="flex items-center gap-2 text-xs">
                <span id="tfIndicator" class="px-1.5 py-0.5 rounded bg-cyan-500/15 border border-cyan-400/30 text-cyan-300 font-semibold uppercase tracking-wider text-[10px]">24h</span>
                <span class="text-slate-600">·</span>
                <div class="flex items-center gap-1.5">
                    <span id="liveDot" class="live-dot"></span>
                    <span id="liveStatus" class="text-slate-400">Live</span>
                </div>
                <span class="text-slate-600">·</span>
                <span id="lastUpdated" class="text-slate-400">-</span>
            </div>
        </header>

        <!-- HERO STATS -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-2 flex-none">
            <div class="glass-card-accent p-3">
                <p class="text-emerald-300/80 text-[10px] uppercase tracking-wider font-semibold">Current / Target</p>
                <p class="text-2xl font-bold mt-0.5 leading-tight">
                    <span id="heroRate" class="text-emerald-300">-</span>
                    <span class="text-slate-500 mx-1">/</span>
                    <span id="heroTarget" class="text-rose-300">-</span>
                </p>
                <p class="text-emerald-400/60 text-[10px]">XTZ per ZEC</p>
            </div>
            <div class="glass-card p-3">
                <p class="text-slate-400 text-[10px] uppercase tracking-wider font-semibold">Distance</p>
                <p id="heroDistance" class="text-2xl font-bold mt-0.5 leading-tight">-</p>
                <p class="text-slate-500 text-[10px]">to target</p>
            </div>
        </section>

        <!-- TIMEFRAME PANELS (fill remaining vertical space) -->
        <section id="tfRow" class="grid grid-cols-5 gap-2 flex-1 min-h-0">
            <div id="panel_15m" class="glass-card p-2 flex flex-col min-h-0">
                <div class="flex items-center justify-between mb-1 flex-none">
                    <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-400">15m</span>
                    <span id="move_15m" class="text-xs font-semibold">-</span>
                </div>
                <div class="flex-1 min-h-0 relative">
                    <canvas id="chart_15m"></canvas>
                </div>
            </div>
            <div id="panel_1h" class="glass-card p-2 flex flex-col min-h-0">
                <div class="flex items-center justify-between mb-1 flex-none">
                    <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-400">1h</span>
                    <span id="move_1h" class="text-xs font-semibold">-</span>
                </div>
                <div class="flex-1 min-h-0 relative">
                    <canvas id="chart_1h"></canvas>
                </div>
            </div>
            <div id="panel_12h" class="glass-card p-2 flex flex-col min-h-0">
                <div class="flex items-center justify-between mb-1 flex-none">
                    <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-400">12h</span>
                    <span id="move_12h" class="text-xs font-semibold">-</span>
                </div>
                <div class="flex-1 min-h-0 relative">
                    <canvas id="chart_12h"></canvas>
                </div>
            </div>
            <div id="panel_24h" class="glass-card p-2 flex flex-col min-h-0">
                <div class="flex items-center justify-between mb-1 flex-none">
                    <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-400">24h</span>
                    <span id="move_24h" class="text-xs font-semibold">-</span>
                </div>
                <div class="flex-1 min-h-0 relative">
                    <canvas id="chart_24h"></canvas>
                </div>
            </div>
            <div id="panel_7d" class="glass-card p-2 flex flex-col min-h-0">
                <div class="flex items-center justify-between mb-1 flex-none">
                    <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-400">7d</span>
                    <span id="move_7d" class="text-xs font-semibold">-</span>
                </div>
                <div class="flex-1 min-h-0 relative">
                    <canvas id="chart_7d"></canvas>
                </div>
            </div>
        </section>

        <!-- SECONDARY GRID: ZEC / XTZ / Holdings -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-2 flex-none">
            <div class="glass-card p-3">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-[10px] uppercase tracking-wider font-semibold">ZEC / USD <span class="text-cyan-400/70 normal-case">· 24h</span></p>
                        <p id="zecPrice" class="text-lg font-bold leading-tight">-</p>
                    </div>
                    <p id="zecChange" class="text-xs font-semibold">-</p>
                </div>
                <div style="height: 28px;" class="mt-1">
                    <canvas id="zecSpark"></canvas>
                </div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1">
                    <span>H: <span id="zecHigh" class="text-slate-300">-</span></span>
                    <span>L: <span id="zecLow" class="text-slate-300">-</span></span>
                    <span>V: <span id="zecVol" class="text-slate-300">-</span></span>
                </div>
            </div>

            <div class="glass-card p-3">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-[10px] uppercase tracking-wider font-semibold">XTZ / USD <span class="text-cyan-400/70 normal-case">· 24h</span></p>
                        <p id="xtzPrice" class="text-lg font-bold leading-tight">-</p>
                    </div>
                    <p id="xtzChange" class="text-xs font-semibold">-</p>
                </div>
                <div style="height: 28px;" class="mt-1">
                    <canvas id="xtzSpark"></canvas>
                </div>
                <div class="flex justify-between text-[10px] text-slate-500 mt-1">
                    <span>H: <span id="xtzHigh" class="text-slate-300">-</span></span>
                    <span>L: <span id="xtzLow" class="text-slate-300">-</span></span>
                    <span>V: <span id="xtzVol" class="text-slate-300">-</span></span>
                </div>
            </div>

            <div class="glass-card p-3">
                <p class="text-slate-400 text-[10px] uppercase tracking-wider font-semibold">Holdings</p>
                <p class="text-lg font-bold leading-tight"><span id="holdingsZec">16.256</span> <span class="text-slate-400 text-sm">ZEC</span></p>
                <div class="mt-1 space-y-0.5 text-xs">
                    <div class="flex justify-between"><span class="text-slate-400">USD</span><span id="holdingsUsd" class="font-semibold">-</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">GBP</span><span id="holdingsGbp" class="font-semibold">-</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">XTZ now</span><span id="holdingsXtz" class="font-semibold">-</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Shortfall</span><span id="holdingsShortfall" class="font-semibold">-</span></div>
                </div>
            </div>
        </section>

    </div>

    <!-- Privacy overlay + toggle (discreet) -->
    <div id="privacyOverlay" class="privacy-overlay"></div>
    <button id="privacyToggle" class="privacy-toggle" title="Hold V to reveal" aria-label="Toggle visibility"></button>

    <script>
        // --------------------------------------------------------------
        // CONFIG (preserved)
        // --------------------------------------------------------------
        emailjs.init('YOUR_PUBLIC_KEY');
        const zecHeld = 16.256;
        const xtzTarget = 17500;
        const targetRate = xtzTarget / zecHeld;
        let alertSent = false;

        // --------------------------------------------------------------
        // STATE
        // --------------------------------------------------------------
        const TIMEFRAMES = {
            '15m': { interval: '1m', limit: 15  },
            '1h':  { interval: '1m', limit: 60  },
            '12h': { interval: '1m', limit: 720 },
            '24h': { interval: '5m', limit: 288 },
            '7d':  { interval: '1h', limit: 168 }
        };
        const TF_KEYS = ['15m', '1h', '12h', '24h', '7d'];

        // --------------------------------------------------------------
        // TIMEFRAME VIEW (1-5 keys, defaults to 24h)
        // --------------------------------------------------------------
        const KEY_TO_TF = { '1': '15m', '2': '1h', '3': '12h', '4': '24h', '5': '7d' };
        const DEFAULT_TF = '24h';
        let currentTF = DEFAULT_TF;

        function setTF(tf) {
            if (!TF_KEYS.includes(tf)) return;
            currentTF = tf;
            TF_KEYS.forEach(k => {
                const panel = document.getElementById('panel_' + k);
                if (k === tf) {
                    panel.classList.remove('hidden');
                    panel.classList.add('col-span-5');
                } else {
                    panel.classList.add('hidden');
                    panel.classList.remove('col-span-5');
                }
            });
            const ind = document.getElementById('tfIndicator');
            if (ind) ind.textContent = tf;
            // Resize the now-visible chart so it fills the new width
            if (typeof panelCharts !== 'undefined' && panelCharts[tf]) {
                panelCharts[tf].resize();
            }
        }
        function resetTF() {
            if (currentTF !== DEFAULT_TF) setTF(DEFAULT_TF);
        }

        // --------------------------------------------------------------
        // PRIVACY
        // Hold 'V' to reveal, release to hide. Click toggle dot still works.
        // --------------------------------------------------------------
        function hidePrivacy() {
            document.body.classList.remove('revealed');
        }
        function revealPrivacy() {
            document.body.classList.add('revealed');
        }
        function togglePrivacy() {
            clearTimedReveal();
            if (document.body.classList.contains('revealed')) hidePrivacy();
            else revealPrivacy();
        }

        // Timed reveal state (double-tap V = 30s window)
        const TIMED_REVEAL_MS = 30000;
        const DOUBLE_TAP_WINDOW_MS = 400;
        let timedRevealTimer = null;
        let lastVTapTime = 0;

        function clearTimedReveal() {
            if (timedRevealTimer !== null) {
                clearTimeout(timedRevealTimer);
                timedRevealTimer = null;
            }
        }
        function startTimedReveal() {
            clearTimedReveal();
            revealPrivacy();
            timedRevealTimer = setTimeout(() => {
                timedRevealTimer = null;
                hidePrivacy();
            }, TIMED_REVEAL_MS);
        }

        document.getElementById('privacyToggle').addEventListener('click', togglePrivacy);

        document.addEventListener('keydown', e => {
            // Ignore if any modifier is held (avoid hijacking shortcuts)
            if (e.ctrlKey || e.metaKey || e.altKey) return;

            // Number keys 1-5 switch the visible timeframe
            if (KEY_TO_TF[e.key] && !e.repeat) {
                e.preventDefault();
                setTF(KEY_TO_TF[e.key]);
                return;
            }

            if ((e.key === 'v' || e.key === 'V') && !e.repeat) {
                e.preventDefault();
                resetTF();
                // If a 30s timed reveal is active, single tap cancels it and hides
                if (timedRevealTimer !== null) {
                    clearTimedReveal();
                    hidePrivacy();
                    lastVTapTime = 0;
                    return;
                }
                const now = Date.now();
                if (now - lastVTapTime <= DOUBLE_TAP_WINDOW_MS) {
                    // Second tap within window: start 30s timed reveal
                    startTimedReveal();
                    lastVTapTime = 0;
                } else {
                    // First tap (or too slow): treat as hold-to-reveal
                    revealPrivacy();
                    lastVTapTime = now;
                }
            }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'v' || e.key === 'V') {
                e.preventDefault();
                // Don't hide if a 30s timed reveal is active
                if (timedRevealTimer === null) hidePrivacy();
            }
        });
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearTimedReveal();
                hidePrivacy();
                resetTF();
            }
        });
        window.addEventListener('blur', () => {
            clearTimedReveal();
            hidePrivacy();
            resetTF();
        });
        // Start hidden by default, default TF
        hidePrivacy();
        setTF(DEFAULT_TF);

        // --------------------------------------------------------------
        // HELPERS
        // --------------------------------------------------------------
        const fmt = (n, d = 2) => Number(n).toLocaleString('en-GB', { minimumFractionDigits: d, maximumFractionDigits: d });
        const fmtUsd = (n) => '$' + fmt(n, n < 1 ? 4 : 2);
        const fmtGbp = (n) => '£' + fmt(n, n < 1 ? 4 : 2);
        const fmtPct = (n) => (n >= 0 ? '+' : '') + fmt(n, 2) + '%';
        const fmtVol = (n) => n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 1e3 ? (n / 1e3).toFixed(1) + 'K' : Math.round(n).toString();
        function setChangeColour(el, pct) {
            el.classList.remove('text-emerald-400', 'text-rose-400');
            el.classList.add(pct >= 0 ? 'text-emerald-400' : 'text-rose-400');
        }
        // Timeframe-scoped H/L/V/change from kline array
        function klineStats(klines) {
            const high = Math.max(...klines.map(c => parseFloat(c[2])));
            const low = Math.min(...klines.map(c => parseFloat(c[3])));
            const vol = klines.reduce((s, c) => s + parseFloat(c[5]), 0);
            const firstClose = parseFloat(klines[0][4]);
            const lastClose = parseFloat(klines[klines.length - 1][4]);
            const pct = ((lastClose - firstClose) / firstClose) * 100;
            return { high, low, vol, pct };
        }

        // --------------------------------------------------------------
        // PANEL MINI-CHARTS (one per timeframe)
        // --------------------------------------------------------------
        function makePanelChart(canvasId) {
            return new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'line',
                data: { labels: [], datasets: [{
                    data: [],
                    borderColor: '#22d3ee',
                    backgroundColor: 'rgba(34, 211, 238, 0.08)',
                    borderWidth: 1.5,
                    pointRadius: 0,
                    tension: 0.2,
                    fill: true
                }] },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { x: { display: false }, y: { display: false } },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }
        const panelCharts = {};
        TF_KEYS.forEach(tf => { panelCharts[tf] = makePanelChart('chart_' + tf); });

        // --------------------------------------------------------------
        // SPARKLINES (ZEC / XTZ USD cards)
        // --------------------------------------------------------------
        function makeSparkline(canvasId, colour) {
            return new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: colour, borderWidth: 2, pointRadius: 0, tension: 0.3, fill: false }] },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { x: { display: false }, y: { display: false } },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }
        const zecSpark = makeSparkline('zecSpark', '#a78bfa');
        const xtzSpark = makeSparkline('xtzSpark', '#60a5fa');

        // --------------------------------------------------------------
        // DATA FETCH
        // --------------------------------------------------------------
        async function fetchKlines(symbol, interval, limit) {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
            return r.json();
        }
        async function fetch24h(symbol) {
            const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
            return r.json();
        }

        // --------------------------------------------------------------
        // MAIN UPDATE LOOP
        // --------------------------------------------------------------
        async function updateAll() {
            try {
                // Build request list: kline pairs for each TF, then 24h tickers (ZEC, XTZ, GBP)
                const requests = [];
                TF_KEYS.forEach(tf => {
                    requests.push(fetchKlines('ZECUSDT', TIMEFRAMES[tf].interval, TIMEFRAMES[tf].limit));
                    requests.push(fetchKlines('XTZUSDT', TIMEFRAMES[tf].interval, TIMEFRAMES[tf].limit));
                });
                requests.push(fetch24h('ZECUSDT'));
                requests.push(fetch24h('XTZUSDT'));
                requests.push(fetch24h('GBPUSDT'));
                const results = await Promise.all(requests);

                // Slice out per-TF klines
                const panelData = {};
                TF_KEYS.forEach((tf, i) => {
                    const zecK = results[i * 2];
                    const xtzK = results[i * 2 + 1];
                    const zecClose = zecK.map(c => parseFloat(c[4]));
                    const xtzClose = xtzK.map(c => parseFloat(c[4]));
                    const rates = zecClose.map((z, j) => z / xtzClose[j]);
                    panelData[tf] = { zecK, xtzK, zecClose, xtzClose, rates };
                });
                const zecT = results[TF_KEYS.length * 2];
                const xtzT = results[TF_KEYS.length * 2 + 1];
                const gbpT = results[TF_KEYS.length * 2 + 2];
                const usdToGbp = 1 / parseFloat(gbpT.lastPrice);

                // Update each panel chart + move % + strip cell
                TF_KEYS.forEach(tf => {
                    const d = panelData[tf];
                    const chart = panelCharts[tf];
                    chart.data.labels = Array(d.rates.length).fill('');
                    chart.data.datasets[0].data = d.rates;
                    chart.update();
                    const move = ((d.rates[d.rates.length - 1] / d.rates[0]) - 1) * 100;
                    const moveEl = document.getElementById('move_' + tf);
                    moveEl.textContent = fmtPct(move);
                    setChangeColour(moveEl, move);
                });

                // Freshest rate comes from 15m (1m klines, newest partial)
                const latestRate = panelData['15m'].rates[panelData['15m'].rates.length - 1];
                const distancePct = ((latestRate / targetRate) - 1) * 100;
                const aboveTarget = latestRate >= targetRate;

                // HERO
                document.getElementById('heroRate').textContent = fmt(latestRate, 2);
                document.getElementById('heroTarget').textContent = fmt(targetRate, 2);
                const heroDist = document.getElementById('heroDistance');
                heroDist.textContent = fmtPct(distancePct);
                heroDist.className = 'text-2xl font-bold mt-0.5 leading-tight ' + (aboveTarget ? 'text-emerald-400' : 'text-rose-400');

                // ZEC / XTZ cards (pinned to 24h kline data)
                const d24 = panelData['24h'];
                const zecStats = klineStats(d24.zecK);
                const xtzStats = klineStats(d24.xtzK);

                const zecPrice = parseFloat(zecT.lastPrice);
                document.getElementById('zecPrice').textContent = fmtUsd(zecPrice);
                const zecChangeEl = document.getElementById('zecChange');
                zecChangeEl.textContent = (zecStats.pct >= 0 ? '▲ ' : '▼ ') + fmt(Math.abs(zecStats.pct), 2) + '%';
                setChangeColour(zecChangeEl, zecStats.pct);
                document.getElementById('zecHigh').textContent = fmtUsd(zecStats.high);
                document.getElementById('zecLow').textContent = fmtUsd(zecStats.low);
                document.getElementById('zecVol').textContent = fmtVol(zecStats.vol);

                const xtzPrice = parseFloat(xtzT.lastPrice);
                document.getElementById('xtzPrice').textContent = fmtUsd(xtzPrice);
                const xtzChangeEl = document.getElementById('xtzChange');
                xtzChangeEl.textContent = (xtzStats.pct >= 0 ? '▲ ' : '▼ ') + fmt(Math.abs(xtzStats.pct), 2) + '%';
                setChangeColour(xtzChangeEl, xtzStats.pct);
                document.getElementById('xtzHigh').textContent = fmtUsd(xtzStats.high);
                document.getElementById('xtzLow').textContent = fmtUsd(xtzStats.low);
                document.getElementById('xtzVol').textContent = fmtVol(xtzStats.vol);

                // Sparklines use 24h kline closes
                const sparkLen = Math.min(60, d24.zecClose.length);
                zecSpark.data.labels = Array(sparkLen).fill('');
                zecSpark.data.datasets[0].data = d24.zecClose.slice(-sparkLen);
                zecSpark.update();
                xtzSpark.data.labels = Array(sparkLen).fill('');
                xtzSpark.data.datasets[0].data = d24.xtzClose.slice(-sparkLen);
                xtzSpark.update();

                // Holdings
                const holdingsUsd = zecHeld * zecPrice;
                const holdingsGbp = holdingsUsd * usdToGbp;
                const holdingsXtzNow = zecHeld * latestRate;
                const shortfall = xtzTarget - holdingsXtzNow;
                document.getElementById('holdingsUsd').textContent = fmtUsd(holdingsUsd);
                document.getElementById('holdingsGbp').textContent = fmtGbp(holdingsGbp);
                document.getElementById('holdingsXtz').textContent = fmt(holdingsXtzNow, 0) + ' XTZ';
                const shortEl = document.getElementById('holdingsShortfall');
                if (shortfall <= 0) {
                    shortEl.textContent = 'TARGET REACHED';
                    shortEl.className = 'font-semibold text-emerald-400';
                } else {
                    shortEl.textContent = fmt(shortfall, 0) + ' XTZ';
                    shortEl.className = 'font-semibold text-slate-200';
                }

                // Header status
                document.getElementById('lastUpdated').textContent = 'Updated just now';
                document.getElementById('liveDot').classList.remove('stale', 'error');
                document.getElementById('liveStatus').textContent = 'Live';

                // Tab title (always shows live rate, regardless of privacy)
                document.title = `${latestRate.toFixed(2)} / ${targetRate.toFixed(2)}`;

                // Alert trigger
                if (aboveTarget && !alertSent) {
                    sendEmailAlert(latestRate);
                    alertSent = true;
                }

            } catch (err) {
                console.error('Update failed', err);
                document.getElementById('liveDot').classList.add('error');
                document.getElementById('liveStatus').textContent = 'Error';
            }
        }

        function sendEmailAlert(rate) {
            const templateParams = {
                message: `Target reached. The ZEC to XTZ exchange rate is currently ${rate.toFixed(2)}.`
            };
            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
                .then(r => console.log('Alert email sent.', r.status, r.text))
                .catch(e => console.log('Failed to send email.', e));
        }

        // Kick off
        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
