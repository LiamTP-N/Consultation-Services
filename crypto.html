    <style>
        /* Desktop: locked viewport, no scroll */
        html, body { height: 100%; overflow: hidden; overflow-x: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* Solid black base with a subtle grey-blue wash at top */
            background: #000 radial-gradient(ellipse at top, rgba(71, 85, 105, 0.35) 0%, rgba(30, 41, 59, 0.15) 40%, transparent 75%) no-repeat;
            font-variant-numeric: tabular-nums;
        }

        /* Mobile: allow vertical scroll only, fix chart panel height so it's always visible */
        @media (max-width: 767px) {
            html, body { height: auto; overflow-x: hidden; overflow-y: auto; max-width: 100%; }
            body { width: 100%; }
            #tfRow { height: 220px; flex: none; }
        }

        .glass-card {
            background: #000;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 12px;
        }
        .glass-card-accent {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.12) 0%, #000 60%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 197, 94, 0.25);
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.08);
        }
        /* ZEC card: yellow/gold tint matching the ZEC wordmark gradient */
        .glass-card-zec {
            background: linear-gradient(135deg, rgba(253, 224, 71, 0.10) 0%, #000 60%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(253, 224, 71, 0.22);
            border-radius: 12px;
        }
        /* XTZ card: navy/teal tint matching the XTZ wordmark gradient */
        .glass-card-xtz {
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.12) 0%, #000 60%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(45, 212, 191, 0.22);
            border-radius: 12px;
        }
        /* BTC card: orange tint matching Bitcoin brand colour */
        .glass-card-btc {
            background: linear-gradient(135deg, rgba(247, 147, 26, 0.14) 0%, #000 60%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(247, 147, 26, 0.25);
            border-radius: 12px;
        }
        /* ZEC holdings card: gold tint right-to-left, mirroring accent layout */
        .glass-card-zec-right {
            background: linear-gradient(315deg, rgba(253, 224, 71, 0.12) 0%, #000 60%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(253, 224, 71, 0.25);
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(253, 224, 71, 0.06);
        }
        .zec-gradient {
            background: linear-gradient(to right, #fde047, #ca8a04);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .xtz-gradient {
            background: linear-gradient(to right, #1e3a8a, #2dd4bf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btc-gradient {
            background: linear-gradient(to right, #fb923c, #ea580c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }
        .live-dot.stale { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        .live-dot.error { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Stale data dimming on hero numbers */

    <button id="privacyToggle" class="privacy-toggle" title="Click to reveal for 3 min" aria-label="Toggle visibility"></button>

    <script>
        // ==============================================================
        // CRYPTO.HTML - personal ZEC->XTZ swap monitor (private page)
        // ==============================================================
        // Purpose: live dashboard tracking when the ZEC/XTZ rate hits a
        // target that would let me swap my ZEC holdings for a chosen
        // amount of XTZ (cost-basis-aware, fee-adjusted).
        //
        // Data sources (all free, no API keys):
        //   - Binance public REST API: spot prices + kline history for
        //     ZECUSDT, XTZUSDT, BTCUSDT, GBPUSDT. Polled every 1s.
        //   - Frankfurter (ECB): GBP/CAD FX rate. Refreshed every 5 min.
        //   - ipify: public IP detection (one-shot on load) to decide
        //     whether we're on a work network and should start in
        //     privacy mode.
        //
        // Alert delivery (client-side only - tab must be open):
        //   - Browser Notification API (native desktop notification)
        //   - Telegram Bot API (POSTs to sendMessage)
        //   Both fire at 90/95/98/100% of the fee-adjusted target rate,
        //   each threshold once per page load. Reload to re-arm.
        //
        // Privacy model:
        //   - If IP matches WORK_IPS -> start hidden behind a black
        //     overlay; hold V (or tap the corner dot) to reveal.
        //   - If IP doesn't match -> overlay disabled entirely.
        //   - Mobile: overlay disabled regardless (no keyboard).
        //
        // Keyboard shortcuts:
        //   1-5 = switch visible timeframe panel (15m/1h/12h/24h/7d)
        //   0   = reset to default (24h)
        //   V   = hold to reveal; double-tap for 3-min timed reveal
        //
        // No persistence: all state is in-memory. Closing the tab
        // clears everything including fired-alert history.
        // ==============================================================

        // --------------------------------------------------------------
        // CONFIG
        // --------------------------------------------------------------
        const zecHeld = 16.256;
        const xtzTarget = 17500;
        // Rough cost basis (GBP). Estimate of total GBP put in across many
        // swaps since 2019 - update here if you ever pin it down properly.
        const COST_BASIS_GBP = 35000;
        // Binance worst-case fee: 0.1% taker per trade, two market orders
        // (ZEC -> USDT -> XTZ) = 0.2% total drag, no BNB discount assumed.
        const TOTAL_FEE = 0.002;
        const rawTargetRate = xtzTarget / zecHeld;           // 1076.53 (pre-fee)
        const targetRate = rawTargetRate / (1 - TOTAL_FEE);  // ~1078.69 (fee-adjusted, used everywhere)
        // Progress-based alert thresholds (% of fee-adjusted target rate).
        // Each fires once per page load; reload to re-arm.
        const ALERT_THRESHOLDS = [90, 95, 98, 100];
        const alertsFired = new Set();
        let lastSuccessTs = 0;
        const STALE_MS = 5000;

        // GBP/CAD cache - fetched separately from Binance loop, refreshed every 5 min.
        // Binance has no spot GBPCAD/USDTCAD pair, so we use Frankfurter (ECB, free, no key).
        let gbpToCad = null;
        const GBP_CAD_REFRESH_MS = 5 * 60 * 1000;

        // --------------------------------------------------------------
        // NETWORK CONTEXT
        // Privacy mode is ON only when on a listed work IP.
        // Default elsewhere (home, mobile, anywhere): no privacy.
        // To add a new work IP: load the page from that network, copy
        // the IP shown in the top-right of the header into WORK_IPS,
        // commit + push. Privacy will activate there from then on.
        // Entries can be exact IPs ('193.63.36.242') OR prefixes
        // ('193.63.36' matches a /24, '193.63' matches a /16).
        // --------------------------------------------------------------
        const WORK_IPS = [
            '193.63.36.242'  // Northumbria University
        ];
        let detectedIp = null;
        let isWorkNetwork = false;

        // --------------------------------------------------------------
        // STATE
        // --------------------------------------------------------------
        const TIMEFRAMES = {
            '15m': { interval: '1m', limit: 15  },
            '1h':  { interval: '1m', limit: 60  },
            '12h': { interval: '1m', limit: 720 },
            '24h': { interval: '5m', limit: 288 },
            '7d':  { interval: '1h', limit: 168 }
        };
        const TF_KEYS = ['15m', '1h', '12h', '24h', '7d'];

        // --------------------------------------------------------------
        // TIMEFRAME VIEW (1-5 keys, 0 to reset, defaults to 24h)
        // --------------------------------------------------------------
        const KEY_TO_TF = { '1': '15m', '2': '1h', '3': '12h', '4': '24h', '5': '7d' };
        const DEFAULT_TF = '24h';
        let currentTF = DEFAULT_TF;

        function setTF(tf) {
            if (!TF_KEYS.includes(tf)) return;
            currentTF = tf;
            TF_KEYS.forEach(k => {
                const panel = document.getElementById('panel_' + k);
                if (k === tf) {
                    panel.classList.remove('hidden');
                    panel.classList.add('col-span-5');
                } else {
                    panel.classList.add('hidden');
                    panel.classList.remove('col-span-5');
                }
            });
            // Resize the now-visible chart so it fills the new width
            if (typeof panelCharts !== 'undefined' && panelCharts[tf]) {
                panelCharts[tf].resize();
            }
        }
        function resetTF() {
            if (currentTF !== DEFAULT_TF) setTF(DEFAULT_TF);
        }

        // --------------------------------------------------------------
        // PRIVACY
        // Hold 'V' to reveal, release to hide. Click toggle dot still works.
        // --------------------------------------------------------------
        function hidePrivacy() {
            // Suppress hide when we've confirmed we're NOT on a work network
            if (detectedIp !== null && !isWorkNetwork) return;
            document.body.classList.remove('revealed');
        }
        function revealPrivacy() {
            document.body.classList.add('revealed');
        }
        function togglePrivacy() {
            clearTimedReveal();
            if (document.body.classList.contains('revealed')) hidePrivacy();
            else revealPrivacy();
        }

        // Timed reveal state (double-tap V or click dot = 3 min window)
        const TIMED_REVEAL_MS = 180000;
        const DOUBLE_TAP_WINDOW_MS = 400;
        let timedRevealTimer = null;
        let lastVTapTime = 0;

        function clearTimedReveal() {
            if (timedRevealTimer !== null) {
                clearTimeout(timedRevealTimer);
                timedRevealTimer = null;
            }
        }
        function startTimedReveal() {
            clearTimedReveal();
            revealPrivacy();
            timedRevealTimer = setTimeout(() => {
                timedRevealTimer = null;
                hidePrivacy();
            }, TIMED_REVEAL_MS);
        }

        document.getElementById('privacyToggle').addEventListener('click', () => {
            if (document.body.classList.contains('revealed')) {
                clearTimedReveal();
                hidePrivacy();
            } else {
                startTimedReveal();
            }
        });

        document.addEventListener('keydown', e => {
            // Ignore if any modifier is held (avoid hijacking shortcuts)
            if (e.ctrlKey || e.metaKey || e.altKey) return;

            // Number keys 1-5 switch the visible timeframe
            if (KEY_TO_TF[e.key] && !e.repeat) {
                e.preventDefault();
                setTF(KEY_TO_TF[e.key]);
                return;
            }
            // 0 resets to default
            if (e.key === '0' && !e.repeat) {
                e.preventDefault();
                resetTF();
                return;
            }

            if ((e.key === 'v' || e.key === 'V') && !e.repeat) {
                e.preventDefault();
                resetTF();
                // If a 30s timed reveal is active, single tap cancels it and hides
                if (timedRevealTimer !== null) {
                    clearTimedReveal();
                    hidePrivacy();
                    lastVTapTime = 0;
                    return;
                }
                const now = Date.now();
                if (now - lastVTapTime <= DOUBLE_TAP_WINDOW_MS) {
                    // Second tap within window: start 30s timed reveal
                    startTimedReveal();
                    lastVTapTime = 0;
                } else {
                    // First tap (or too slow): treat as hold-to-reveal
                    revealPrivacy();
                    lastVTapTime = now;
                }
            }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'v' || e.key === 'V') {
                e.preventDefault();
                // Don't hide if a 30s timed reveal is active
                if (timedRevealTimer === null) hidePrivacy();
            }
        });
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearTimedReveal();
                hidePrivacy();
                resetTF();
            }
        });
        window.addEventListener('blur', () => {
            clearTimedReveal();
            hidePrivacy();
            resetTF();
        });
        // Start hidden by default
        hidePrivacy();

        // --------------------------------------------------------------
        // NETWORK DETECTION (runs once on load)
        // --------------------------------------------------------------
        async function detectNetwork() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const data = await r.json();
                detectedIp = data.ip;
                isWorkNetwork = WORK_IPS.some(ip =>
                    detectedIp === ip || detectedIp.startsWith(ip + '.')
                );
                // Logged to console only (no on-screen indicator).
                // To find a new work IP: open DevTools, look for [Network] log.
                console.log('[Network] IP:', detectedIp, '| Work:', isWorkNetwork);

                if (!isWorkNetwork) {
                    // Not at work: kill privacy entirely
                    document.body.classList.add('revealed');
                    clearTimedReveal();
                    const ov = document.getElementById('privacyOverlay');
                    const tg = document.getElementById('privacyToggle');
                    if (ov) ov.style.display = 'none';
                    if (tg) tg.style.display = 'none';
                }
            } catch (e) {
                console.warn('[Network] IP detection failed - keeping privacy on', e);
            }
        }
        detectNetwork();

        // --------------------------------------------------------------
        // GBP/CAD FETCHER (independent of Binance loop)
        // Frankfurter is free, no key, ECB-sourced, daily refresh.
        // We refresh every 5 min which is overkill but harmless.
        // --------------------------------------------------------------
        async function refreshGbpCad() {
            try {
                const r = await fetch('https://api.frankfurter.dev/v1/latest?base=GBP&symbols=CAD');
                const data = await r.json();
                if (data && data.rates && typeof data.rates.CAD === 'number') {
                    gbpToCad = data.rates.CAD;
                    const el = document.getElementById('fxGbpCad');
                    if (el) el.textContent = fmt(gbpToCad, 4);
                }
            } catch (e) {
                console.warn('GBP/CAD fetch failed', e);
            }
        }

        // --------------------------------------------------------------
        // BROWSER NOTIFICATIONS (request once on load, silently)
        // --------------------------------------------------------------
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission().catch(() => {});
        }
        function fireBrowserNotification(rate, threshold) {
            if (!('Notification' in window)) return;
            if (Notification.permission !== 'granted') return;
            const title = threshold >= 100 ? 'Target reached' : `At ${threshold}% of target`;
            try {
                new Notification(title, {
                    body: `ZEC to XTZ rate is ${rate.toFixed(2)} (fee-adjusted target ${targetRate.toFixed(2)}).`,
                    tag: `zec-xtz-${threshold}`
                });
            } catch (e) { /* ignore */ }
        }

        // --------------------------------------------------------------
        // TELEGRAM NOTIFICATION
        // --------------------------------------------------------------
        const TELEGRAM_TOKEN = '8471305313:AAFbrJGU1i9VWQI3e7NDobzFBUCEXj0YdAI';
        const TELEGRAM_CHAT_ID = '5097919336';
        function fireTelegramNotification(rate, threshold) {
            if (!TELEGRAM_TOKEN || !TELEGRAM_CHAT_ID) return;
            const icon = threshold >= 100 ? "\u{1F3AF}" : "\u{1F4C8}";
            const headline = threshold >= 100
                ? "Target reached!"
                : `At ${threshold}% of target.`;
            const text = `${icon} ${headline} ZEC\u2192XTZ rate is ${rate.toFixed(2)} (fee-adjusted target ${targetRate.toFixed(2)}).`;
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: text })
            }).catch(e => console.error('Telegram send failed', e));
        }

        // Combined alert at a given threshold (90/95/98/100)
        function fireTargetAlert(rate, threshold) {
            fireBrowserNotification(rate, threshold);
            fireTelegramNotification(rate, threshold);
            const el = document.getElementById('alertLog');
            if (el) {
                const now = new Date();
                const ts = now.toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false });
                const icon = threshold >= 100 ? "\u{1F3AF}" : "\u{1F4C8}";
                el.textContent = `${icon} ${threshold}% alert ${ts} @ ${fmtInt(rate)}`;
                el.classList.remove('hidden');
            }
        }

        // --------------------------------------------------------------
        // DYNAMIC FAVICON (green dot above target, red below)
        // --------------------------------------------------------------
        const faviconEl = document.getElementById('favicon');
        const favCanvas = document.createElement('canvas');
        favCanvas.width = 32; favCanvas.height = 32;
        let lastFavColour = null;
        function setFavicon(aboveTarget) {
            const colour = aboveTarget ? '#22c55e' : '#ef4444';
            if (colour === lastFavColour) return;
            lastFavColour = colour;
            const ctx = favCanvas.getContext('2d');
            ctx.clearRect(0, 0, 32, 32);
            ctx.fillStyle = colour;
            ctx.beginPath();
            ctx.arc(16, 16, 13, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            faviconEl.href = favCanvas.toDataURL('image/png');
        }

        // --------------------------------------------------------------
        // HELPERS
        // --------------------------------------------------------------
        const fmt = (n, d = 2) => Number(n).toLocaleString('en-GB', { minimumFractionDigits: d, maximumFractionDigits: d });
        const fmtUsd = (n) => '$' + fmt(n, n < 1 ? 4 : 2);
        const fmtGbp = (n) => '£' + fmt(n, n < 1 ? 4 : 2);
        const fmtPct = (n) => (n >= 0 ? '+' : '') + fmt(n, 0) + '%';
        const fmtVol = (n) => n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 1e3 ? (n / 1e3).toFixed(1) + 'K' : Math.round(n).toString();
        // Integer formatter for big display numbers (hero rate/target, BTC price)
        const fmtInt = (n) => Math.round(Number(n)).toLocaleString('en-GB');
        // Signed integer GBP formatter for holdings deltas (e.g. "+£124", "-£12")
        const fmtGbpDeltaInt = (n) => (n >= 0 ? '+' : '-') + '£' + fmtInt(Math.abs(n));
        function setChangeColour(el, pct) {
            el.classList.remove('text-emerald-400', 'text-rose-400');
            el.classList.add(pct >= 0 ? 'text-emerald-400' : 'text-rose-400');
        }
        // Helper: write a % into a cell and colour it
        function writePct(elId, pct) {
            const el = document.getElementById(elId);
            if (!el) return;
            el.textContent = fmtPct(pct);
            setChangeColour(el, pct);
        }
        // Helper: write a signed GBP integer delta and colour it
        function writeGbpDelta(elId, gbp) {
            const el = document.getElementById(elId);
            if (!el) return;
            el.textContent = fmtGbpDeltaInt(gbp);
            setChangeColour(el, gbp);
        }
        // % change between first and last close in a closes array
        function pctFromCloses(closes) {
            const first = closes[0];
            const last = closes[closes.length - 1];
            return ((last / first) - 1) * 100;
        }
        // Timeframe-scoped H/L/V/change from kline array
        function klineStats(klines) {
            const high = Math.max(...klines.map(c => parseFloat(c[2])));
            const low = Math.min(...klines.map(c => parseFloat(c[3])));
            const vol = klines.reduce((s, c) => s + parseFloat(c[5]), 0);
            const firstClose = parseFloat(klines[0][4]);
            const lastClose = parseFloat(klines[klines.length - 1][4]);
            const pct = ((lastClose - firstClose) / firstClose) * 100;
            return { high, low, vol, pct };
        }

        // --------------------------------------------------------------
        // CUSTOM CHART.JS PLUGIN: dashed horizontal target line
        // (uses fee-adjusted targetRate)
        // --------------------------------------------------------------
        const targetLinePlugin = {
            id: 'targetLine',
            afterDatasetsDraw(chart) {
                const yScale = chart.scales.y;
                if (!yScale) return;
                // Only draw if target sits within the visible y-range
                if (targetRate < yScale.min || targetRate > yScale.max) return;
                const ctx = chart.ctx;
                const y = yScale.getPixelForValue(targetRate);
                const xLeft = chart.chartArea.left;
                const xRight = chart.chartArea.right;
                ctx.save();
                ctx.strokeStyle = 'rgba(251, 113, 133, 0.7)'; // rose-400 @ 70%
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(xLeft, y);
                ctx.lineTo(xRight, y);
                ctx.stroke();
                ctx.restore();
            }
        };

        // --------------------------------------------------------------
        // PANEL MINI-CHARTS (one per timeframe)
        // --------------------------------------------------------------
        function makePanelChart(canvasId) {
            // Primary dataset = ZEC/XTZ rate (left/default y-axis).
            // All timeframes: add three coin overlays (ZEC, XTZ, BTC),
            // each on its OWN hidden axis so their raw USD price ranges
            // (XTZ ~$1, ZEC ~$100, BTC ~$100k) each use the full vertical
            // space and show their trend shape.
            // BTC has a black underlay dataset drawn first for a 1px outline.
            //
            // Dataset index map (order matters - referenced by index in updateAll):
            //   [0] "XTZ/ZEC"   - the rate line (pink, filled area), axis: y
            //   [1] "BTC_stroke" - darker orange underlay drawn FIRST,   axis: yBtc
            //                      gives BTC line a 1px outline against
            //                      the background; filtered out of tooltip.
            //   [2] "ZEC"        - yellow overlay,                       axis: yZec
            //   [3] "XTZ"        - teal overlay,                         axis: yXtz
            //   [4] "BTC"        - orange dashed overlay (over stroke),  axis: yBtc
            //
            // Each of yZec/yXtz/yBtc is a separate hidden axis so coin
            // prices at wildly different scales share the panel without
            // one flattening the others.
            const datasets = [{
                label: "XTZ/ZEC",
                data: [],
                borderColor: "transparent",
                backgroundColor: "rgba(236, 72, 153, 0.10)",
                pointBackgroundColor: "#ec4899",
                pointBorderColor: "#ec4899",
                borderWidth: 0,
                pointRadius: 0,
                pointHoverRadius: 4,
                pointStyle: "circle",
                pointHoverBackgroundColor: "#ec4899",
                pointHoverBorderColor: "#0f172a",
                pointHoverBorderWidth: 2,
                tension: 0.2,
                fill: true,
                yAxisID: "y"
            },
            // BTC orange underlay - drawn first (underneath) to create a 1px stroke
            { label: "BTC_stroke", data: [], borderColor: "#c2410c", backgroundColor: "transparent", borderWidth: 2.75, borderDash: [6, 3], pointRadius: 0, pointStyle: "circle", tension: 0.2, fill: false, yAxisID: "yBtc" },
            { label: "ZEC", data: [], borderColor: "#fff147", backgroundColor: "#fff147", pointBackgroundColor: "#fff147", borderWidth: 2.5, pointRadius: 0, pointStyle: "circle", tension: 0.2, fill: false, yAxisID: "yZec" },
            { label: "XTZ", data: [], borderColor: "rgba(45, 212, 191, 0.65)", backgroundColor: "rgba(45, 212, 191, 0.65)", pointBackgroundColor: "rgba(45, 212, 191, 0.65)", borderWidth: 1.25, pointRadius: 0, pointStyle: "circle", tension: 0.2, fill: false, yAxisID: "yXtz" },
            { label: "BTC", data: [], borderColor: "rgba(249, 115, 22, 0.80)", backgroundColor: "rgba(249, 115, 22, 0.80)", pointBackgroundColor: "rgba(249, 115, 22, 0.80)", borderWidth: 1.25, borderDash: [6, 3], pointRadius: 0, pointStyle: "circle", tension: 0.2, fill: false, yAxisID: "yBtc" }
            ];
            return new Chart(document.getElementById(canvasId).getContext("2d"), {
                type: "line",
                data: { labels: [], datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    interaction: { mode: "index", intersect: false },
                    scales: {
                        x: { display: false },
                        y: { display: false },
                        yZec: { display: false, position: "right" },
                        yXtz: { display: false, position: "right" },
                        yBtc: { display: false, position: "right" }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            enabled: true,
                            displayColors: true,
                            usePointStyle: true,
                            boxWidth: 8,
                            boxHeight: 8,
                            backgroundColor: "rgba(0, 0, 0, 0.95)",
                            borderColor: "rgba(236, 72, 153, 0.4)",
                            borderWidth: 1,
                            titleColor: "#94a3b8",
                            bodyColor: "#e2e8f0",
                            titleFont: { size: 10, weight: "600" },
                            bodyFont: { size: 12, weight: "700" },
                            padding: 8,
                            cornerRadius: 6,
                            filter: (ctx) => ctx.dataset.label !== "BTC_stroke",
                            callbacks: {
                                label: (ctx) => {
                                    const ds = ctx.dataset.label || "";
                                    if (ds === "XTZ/ZEC") return fmt(ctx.parsed.y, 2) + " XTZ/ZEC";
                                    return ds + "  " + fmtUsd(ctx.parsed.y);
                                }
                            }
                        }
                    }
                },
                plugins: [targetLinePlugin]
            });
        }
        const panelCharts = {};
        TF_KEYS.forEach(tf => { panelCharts[tf] = makePanelChart('chart_' + tf); });

        // --------------------------------------------------------------
        // SPARKLINES (ZEC / XTZ / BTC USD cards)
        // Accepts either a solid colour string or an array of [stop, colour]
        // pairs so the line stroke can mirror the wordmark gradient.
        // --------------------------------------------------------------
        function makeSparkline(canvasId, colour) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            let borderColor = colour;
            if (Array.isArray(colour)) {
                // Build horizontal gradient across the canvas width
                const grad = ctx.createLinearGradient(0, 0, canvas.width || 200, 0);
                colour.forEach(([stop, col]) => grad.addColorStop(stop, col));
                borderColor = grad;
            }
            return new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: borderColor, borderWidth: 2, pointRadius: 0, tension: 0.3, fill: false }] },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: { x: { display: false }, y: { display: false } },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }
        // ZEC / XTZ / BTC sparklines removed - replaced by 7d chart overlay legend.

        // All charts now exist with correct initial dimensions; safe to apply default TF.
        setTF(DEFAULT_TF);

        // Cost basis label on first paint - no longer displayed, kept for P/L calc reference only.

        // Kick off GBP/CAD fetcher (independent of Binance loop)
        refreshGbpCad();
        setInterval(refreshGbpCad, GBP_CAD_REFRESH_MS);

        // --------------------------------------------------------------
        // DATA FETCH
        // --------------------------------------------------------------
        async function fetchKlines(symbol, interval, limit) {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
            return r.json();
        }
        async function fetch24h(symbol) {
            const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
            return r.json();
        }

        // --------------------------------------------------------------
        // MAIN UPDATE LOOP
        // --------------------------------------------------------------
        async function updateAll() {
            try {
                // Build request list: kline triples (ZEC/XTZ/BTC) for each TF,
                // then 24h tickers (ZEC, XTZ, GBP, BTC), then GBPUSDT klines per TF.
                const requests = [];
                TF_KEYS.forEach(tf => {
                    requests.push(fetchKlines("ZECUSDT", TIMEFRAMES[tf].interval, TIMEFRAMES[tf].limit));
                    requests.push(fetchKlines("XTZUSDT", TIMEFRAMES[tf].interval, TIMEFRAMES[tf].limit));
                    requests.push(fetchKlines("BTCUSDT", TIMEFRAMES[tf].interval, TIMEFRAMES[tf].limit));
                });
                requests.push(fetch24h("ZECUSDT"));
                requests.push(fetch24h("XTZUSDT"));
                requests.push(fetch24h("GBPUSDT"));
                requests.push(fetch24h("BTCUSDT"));
                // GBPUSDT kline series for per-timeframe holdings GBP deltas (matches each TF)
                TF_KEYS.forEach(tf => {
                    requests.push(fetchKlines("GBPUSDT", TIMEFRAMES[tf].interval, TIMEFRAMES[tf].limit));
                });
                const results = await Promise.all(requests);

                // Slice out per-TF klines (ZEC, XTZ, BTC per TF)
                // panelData[tf] holds everything needed to render one
                // timeframe panel and compute its stats. Shape per tf:
                //   {
                //     zecK, xtzK, btcK   - raw Binance kline arrays
                //                          (each kline: [openTime, open, high, low, close, volume, ...])
                //     zecClose, xtzClose, btcClose  - extracted close prices (USD)
                //     rates              - derived ZEC/XTZ rate per candle
                //     gbpClose           - GBPUSDT closes (USD per GBP),
                //                          attached in the second pass below
                //   }
                const panelData = {};
                TF_KEYS.forEach((tf, i) => {
                    const zecK = results[i * 3];
                    const xtzK = results[i * 3 + 1];
                    const btcK = results[i * 3 + 2];
                    const zecClose = zecK.map(c => parseFloat(c[4]));
                    const xtzClose = xtzK.map(c => parseFloat(c[4]));
                    const btcClose = btcK.map(c => parseFloat(c[4]));
                    const rates = zecClose.map((z, j) => z / xtzClose[j]);
                    panelData[tf] = { zecK, xtzK, btcK, zecClose, xtzClose, btcClose, rates };
                });
                const tickerBase = TF_KEYS.length * 3;
                const zecT = results[tickerBase];
                const xtzT = results[tickerBase + 1];
                const gbpT = results[tickerBase + 2];
                const btcT = results[tickerBase + 3];
                const gbpKlinesBase = tickerBase + 4;
                // Attach GBPUSDT kline closes to each panelData entry
                TF_KEYS.forEach((tf, i) => {
                    const gbpK = results[gbpKlinesBase + i];
                    panelData[tf].gbpClose = gbpK.map(c => parseFloat(c[4]));
                });
                const btcK24 = panelData["24h"].btcK;
                const usdToGbp = 1 / parseFloat(gbpT.lastPrice);   // GBPUSDT lastPrice = USD per GBP

                // Update each panel chart + move % + tight y-axis
                TF_KEYS.forEach(tf => {
                    const d = panelData[tf];
                    const chart = panelCharts[tf];
                    // All timeframes: use timestamp labels so tooltip shows date/time of hovered point
                    chart.data.labels = d.zecK.map(k => {
                        const dt = new Date(k[0]);
                        return dt.toLocaleString("en-GB", {
                            weekday: "short",
                            day: "numeric",
                            month: "short",
                            hour: "2-digit",
                            minute: "2-digit",
                            hour12: false
                        });
                    });
                    chart.data.datasets[0].data = d.rates;

                    // Tight y-axis with ~5% padding, expanded to include target if nearby
                    const dataMin = Math.min(...d.rates);
                    const dataMax = Math.max(...d.rates);
                    const range = (dataMax - dataMin) || (dataMax * 0.01) || 1;
                    const pad = range * 0.05;
                    let yMin = dataMin - pad;
                    let yMax = dataMax + pad;
                    // If target sits within ~25% beyond the data range either side, include it
                    const includeTargetMargin = range * 0.25;
                    if (targetRate >= dataMin - includeTargetMargin && targetRate <= dataMax + includeTargetMargin) {
                        yMin = Math.min(yMin, targetRate - pad);
                        yMax = Math.max(yMax, targetRate + pad);
                    }
                    chart.options.scales.y.min = yMin;
                    chart.options.scales.y.max = yMax;

                    // All timeframes: populate raw USD price overlays for ZEC, XTZ, BTC,
                    // each on its own hidden axis, auto-scaled tight to its range.
                    // Dataset order: [0] rate, [1] BTC_stroke (black), [2] ZEC, [3] XTZ, [4] BTC
                    chart.data.datasets[1].data = d.btcClose;
                    chart.data.datasets[2].data = d.zecClose;
                    chart.data.datasets[3].data = d.xtzClose;
                    chart.data.datasets[4].data = d.btcClose;
                    const setAxis = (axisId, arr) => {
                        const aMin = Math.min(...arr);
                        const aMax = Math.max(...arr);
                        const aRange = (aMax - aMin) || (aMax * 0.01) || 1;
                        const aPad = aRange * 0.10;
                        chart.options.scales[axisId].min = aMin - aPad;
                        chart.options.scales[axisId].max = aMax + aPad;
                    };
                    setAxis("yZec", d.zecClose);
                    setAxis("yXtz", d.xtzClose);
                    setAxis("yBtc", d.btcClose);

                    chart.update();

                    const move = ((d.rates[d.rates.length - 1] / d.rates[0]) - 1) * 100;
                    const moveEl = document.getElementById("move_" + tf);
                    if (moveEl) {
                        moveEl.textContent = fmtPct(move);
                        setChangeColour(moveEl, move);
                    }

                    // Multi-timeframe table cells (rate + per-coin %change, all 5 TFs)
                    writePct("ratePct_" + tf, move);
                    writePct("zecPct_" + tf, pctFromCloses(d.zecClose));
                    writePct("xtzPct_" + tf, pctFromCloses(d.xtzClose));
                    writePct("btcPct_" + tf, pctFromCloses(d.btcClose));

                    // Holdings GBP delta + % over the timeframe.
                    // Holdings GBP at each point = zecHeld * zecCloseUsd / gbpCloseUsd
                    // (gbpClose is USD per GBP, so divide USD by it to get GBP).
                    const gbpFirst = zecHeld * d.zecClose[0] / d.gbpClose[0];
                    const gbpLast = zecHeld * d.zecClose[d.zecClose.length - 1] / d.gbpClose[d.gbpClose.length - 1];
                    const gbpDelta = gbpLast - gbpFirst;
                    const gbpDeltaPct = ((gbpLast / gbpFirst) - 1) * 100;
                });

                // Freshest rate comes from 15m (1m klines, newest partial)
                const latestRate = panelData['15m'].rates[panelData['15m'].rates.length - 1];
                const progressPctExact = (latestRate / targetRate) * 100;
                const aboveTarget = latestRate >= targetRate;

                // HERO - integer display
                const heroDist = document.getElementById('heroDistance');
                const progInt = Math.round(progressPctExact);
                heroDist.textContent = progInt + '%';
                heroDist.className = 'text-base md:text-xl font-bold ' + (aboveTarget ? 'text-emerald-400' : 'text-rose-400');

                // ZEC / XTZ / BTC cards (pinned to 24h kline data)
                const d24 = panelData['24h'];
                const zecStats = klineStats(d24.zecK);
                const xtzStats = klineStats(d24.xtzK);
                const btcStats = klineStats(btcK24);

                const zecPrice = parseFloat(zecT.lastPrice);
                document.getElementById('zecPrice').textContent = fmtUsd(zecPrice);

                const xtzPrice = parseFloat(xtzT.lastPrice);
                document.getElementById('xtzPrice').textContent = fmtUsd(xtzPrice);

                const btcPrice = parseFloat(btcT.lastPrice);
                // BTC is big - display as integer dollars
                document.getElementById('btcPrice').textContent = '$' + fmtInt(btcPrice);

                // Holdings (current values)
                const holdingsUsd = zecHeld * zecPrice;
                const holdingsGbp = holdingsUsd * usdToGbp;
                const holdingsXtzNow = zecHeld * latestRate;
                const holdingsXtzNet = holdingsXtzNow * (1 - TOTAL_FEE); // post 0.2% swap drag
                document.getElementById('holdingsUsd').textContent = '$' + fmtInt(holdingsUsd * (1 - TOTAL_FEE));
                document.getElementById('holdingsGbp').textContent = '£' + fmtInt(holdingsGbp * (1 - TOTAL_FEE));

                // FX rates
                const gbpUsdRate = parseFloat(gbpT.lastPrice);
                document.getElementById('fxGbpUsd').textContent = fmt(gbpUsdRate, 4);

                // Header status
                lastSuccessTs = Date.now();
                document.getElementById('liveDot').classList.remove('stale', 'error');
                document.getElementById('liveStatus').textContent = 'Live';
                // Clear any stale-dim
                document.getElementById('heroRateBlock').classList.remove('stale-dim');

                // Tab title: [progress%]: z[ZEC] | ꜩ[XTZ] | ₿[BTC]
                const progressPct = Math.round(progressPctExact);
                document.title = `${progressPct}%: z${fmtInt(zecPrice)} | ꜩ${xtzPrice.toFixed(2)} | ₿${fmtInt(btcPrice)}`;

                // Favicon
                setFavicon(aboveTarget);

                // Alert triggers at 90%, 95%, 98%, 100% of fee-adjusted target.
                // Each fires once per page load. Uses progressPctExact so a
                // brief dip below doesn't rearm an already-fired threshold.
                for (const t of ALERT_THRESHOLDS) {
                    if (progressPctExact >= t && !alertsFired.has(t)) {
                        fireTargetAlert(latestRate, t);
                        alertsFired.add(t);
                    }
                }

            } catch (err) {
                console.error('Update failed', err);
                document.getElementById('liveDot').classList.add('error');
                document.getElementById('liveStatus').textContent = 'Error';
            }
        }

        // --------------------------------------------------------------
        // STALE WATCHER (separate from main fetch loop)
        // --------------------------------------------------------------
        setInterval(() => {
            if (lastSuccessTs === 0) return; // not yet had a first success
            const ageMs = Date.now() - lastSuccessTs;
            const liveDot = document.getElementById('liveDot');
            const liveStatus = document.getElementById('liveStatus');
            const rateBlock = document.getElementById('heroRateBlock');
            if (ageMs > STALE_MS) {
                if (!liveDot.classList.contains('error')) {
                    liveDot.classList.add('stale');
                    liveStatus.textContent = 'Stale';
                }
                rateBlock.classList.add('stale-dim');
            }
        }, 1000);

        // Kick off
        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
