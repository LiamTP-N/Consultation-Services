    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { height: 100%; overflow: hidden; overflow-x: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000 radial-gradient(ellipse at top, rgba(45, 212, 191, 0.20) 0%, rgba(30, 41, 59, 0.15) 40%, transparent 75%) no-repeat;
            font-variant-numeric: tabular-nums;
        }
        /* Mobile: keep everything in viewport, no scroll. Tighten gaps + padding,
           drop redundant labels, pin chart to remaining space. */
        @media (max-width: 767px) {
            html, body { height: 100dvh; height: 100vh; overflow: hidden; max-width: 100%; }
            body { width: 100%; padding: 4px; }
            #chartCard { flex: 1 1 auto; min-height: 0; }
            /* Stack hero block vertically: table on top, side card below */
            #heroRateBlock {
                padding: 6px 8px; gap: 4px;
                flex-direction: column; flex-wrap: nowrap;
                align-items: stretch;
            }
            #heroRateBlock > table {
                font-size: 11px;
                width: 100%;
            }
            #heroRateBlock > table th,
            #heroRateBlock > table td { padding-top: 1px; padding-bottom: 1px; }
            /* Side card: tight horizontal rows, full width, left-aligned, with a thin top divider */
            #sideCard {
                flex-direction: column; align-items: stretch;
                gap: 2px; width: 100%; min-width: 0;
                border-left: none; padding-left: 0;
                padding-top: 4px;
                border-top: 1px solid rgba(148,163,184,0.12);
            }
            #sideCard .side-label { display: none; }
            #sideCard .side-row {
                display: flex; align-items: center;

        <!-- MAIN TRADE CHART -->
        <section id="chartCard" class="glass-card p-1 md:p-2 flex flex-col flex-1 min-h-0">

                </div>
                <span class="legend-title text-[10px] uppercase tracking-wider text-purple-300 whitespace-nowrap">Since trade<span class="hidden md:inline"> (3 May 2026 21:57 BST)</span></span>

    <!-- Privacy overlay -->
    <div id="privacyOverlay" class="privacy-overlay"></div>
    <button id="privacyToggle" class="privacy-toggle" title="Click to reveal for 3 min" aria-label="Toggle visibility"></button>

    <script>
        // ==============================================================
        // CRYPTO.HTML - Trade-baseline only view.
        // Single chart, single hero column, all metrics measured from
        // trade-entry candle on 3 May 2026 20:57:57 UTC (21:57:57 BST).
        //
        // RS = XTZ% - ZEC% from trade entry (percentage points).
        //   Positive = XTZ outperforming ZEC since trade
        //   Negative = ZEC outperforming XTZ since trade
        // BREAK_EVEN_RS_PP = +0.30pp (covers ~0.20pp round-trip taker fees
        //   for XTZ -> USDT -> ZEC swap-back, plus a slippage margin).
        // ==============================================================

        // --- CONFIG ---
        // Trade ledger (3 May 2026 20:57:45-57 UTC, two-leg swap ZEC -> USDT -> XTZ)
        const ZEC_HELD_PRE_TRADE     = 16.256;          // ZEC sold in leg 1
        const XTZ_HELD               = 18004.7772;      // XTZ held after leg 2 (post-fee)
        const COST_BASIS_USDT        = 6585.55317;      // USDT spent on leg 2 (XTZ buy total)
        const LEG1_NET_USDT          = 6585.32695;      // USDT netted from leg 1 (ZEC sell, post-fee)
        const FEE_LEG1_USDT          = 6.59191887;      // ZEC-sell fee (paid in USDT)
        const FEE_LEG2_XTZ           = 18.0228;         // XTZ-buy fee (paid in XTZ)
        const FEE_LEG2_USDT_AT_TRADE = 6.58552;         // FEE_LEG2_XTZ * leg2 avg price (0.36540123)
        const FEES_PAID_USDT         = FEE_LEG1_USDT + FEE_LEG2_USDT_AT_TRADE; // 13.17744 USDT total entry fees
        const INTERLEG_USDT_GAP      = COST_BASIS_USDT - LEG1_NET_USDT;        // 0.22622 USDT (12s price tick)

        const TRADE_DATE_UTC_MS = Date.UTC(2026, 4, 3, 20, 57, 57);

        // Break-even maths (Binance taker = 0.1% per leg, +margin)
        const TAKER_FEE = 0.001;
        const ROUND_TRIP_RETENTION = (1 - TAKER_FEE) * (1 - TAKER_FEE); // 0.998001
        const BREAK_EVEN_RS_PP = 0.30;
        const ENTRY_RATIO_ZEC_PER_XTZ = ZEC_HELD_PRE_TRADE / XTZ_HELD; // ~0.0009029
        const BREAK_EVEN_RATIO = ENTRY_RATIO_ZEC_PER_XTZ * (1 + BREAK_EVEN_RS_PP / 100); // ~0.0009056

        // Trade kline source: 15m candles, 1000 limit (~10 days of room)
        const TRADE_KLINE_INTERVAL = '15m';
        const TRADE_KLINE_LIMIT = 1000;

        let lastSuccessTs = 0;
        const STALE_MS = 5000;
        let consecutiveErrors = 0;

        let gbpToCad = null;
        const GBP_CAD_REFRESH_MS = 5 * 60 * 1000;

        // --- NETWORK DETECTION (privacy overlay) ---
        const WORK_IPS = ['193.63.36.242'];
        let detectedIp = null;
        let isWorkNetwork = false;

        // --- HELPERS ---
        const fmt = (n, d = 2) => Number(n).toLocaleString('en-GB', { minimumFractionDigits: d, maximumFractionDigits: d });
        const fmtUsd = (n) => '$' + fmt(n, n < 1 ? 4 : 2);
        const fmtPct = (n) => (n >= 0 ? '+' : '') + fmt(n, 1) + '%';
        const fmtRs  = (n) => (n >= 0 ? '+' : '') + fmt(n, 1) + 'pp';
        const fmtInt = (n) => Math.round(Number(n)).toLocaleString('en-GB');

        function setChangeColour(el, val) {
            el.classList.remove('text-emerald-400', 'text-rose-400', 'text-yellow-300', 'text-teal-300');
            el.classList.add(val >= 0 ? 'text-emerald-400' : 'text-rose-400');
        }
        function writePct(elId, pct) {
            const el = document.getElementById(elId);
            if (!el) return;
            el.textContent = fmtPct(pct);
            setChangeColour(el, pct);
        }
        function writeRs(elId, rs) {
            const el = document.getElementById(elId);
            if (!el) return;
            el.textContent = fmtRs(rs);
            // RS uses the same purple as the chart's RS line - colour cohesion across the page.
            // Profitability signal lives on the +0.30pp chart line and the headline colour.
            el.classList.remove('text-emerald-400', 'text-rose-400', 'text-teal-400', 'text-yellow-400');
            el.style.color = '#a78bfa';
        }
        // Find index of candle whose open-time is closest to targetMs
        function findBaselineIdx(klines, targetMs) {
            if (targetMs === null) return 0;
            let best = 0;
            let bestDiff = Infinity;
            klines.forEach((k, i) => {
                const diff = Math.abs(k[0] - targetMs);
                if (diff < bestDiff) { bestDiff = diff; best = i; }
            });
            return best;
        }

        // --- PRIVACY ---
        function hidePrivacy() { if (detectedIp !== null && !isWorkNetwork) return; document.body.classList.remove('revealed'); }
        function revealPrivacy() { document.body.classList.add('revealed'); }

        const TIMED_REVEAL_MS = 180000;
        const DOUBLE_TAP_WINDOW_MS = 400;
        let timedRevealTimer = null;
        let lastVTapTime = 0;
        function clearTimedReveal() { if (timedRevealTimer !== null) { clearTimeout(timedRevealTimer); timedRevealTimer = null; } }
        function startTimedReveal() { clearTimedReveal(); revealPrivacy(); timedRevealTimer = setTimeout(() => { timedRevealTimer = null; hidePrivacy(); }, TIMED_REVEAL_MS); }

        document.getElementById('privacyToggle').addEventListener('click', () => {
            if (document.body.classList.contains('revealed')) { clearTimedReveal(); hidePrivacy(); }
            else startTimedReveal();
        });
        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if ((e.key === 'v' || e.key === 'V') && !e.repeat) {
                e.preventDefault();
                if (timedRevealTimer !== null) { clearTimedReveal(); hidePrivacy(); lastVTapTime = 0; return; }
                const now = Date.now();
                if (now - lastVTapTime <= DOUBLE_TAP_WINDOW_MS) { startTimedReveal(); lastVTapTime = 0; }
                else { revealPrivacy(); lastVTapTime = now; }
            }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'v' || e.key === 'V') { e.preventDefault(); if (timedRevealTimer === null) hidePrivacy(); }
        });
        document.addEventListener('visibilitychange', () => { if (document.hidden) { clearTimedReveal(); hidePrivacy(); } });
        window.addEventListener('blur', () => { clearTimedReveal(); hidePrivacy(); });
        hidePrivacy();

        async function detectNetwork() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const data = await r.json();
                detectedIp = data.ip;
                isWorkNetwork = WORK_IPS.some(ip => detectedIp === ip || detectedIp.startsWith(ip + '.'));
                console.log('[Network] IP:', detectedIp, '| Work:', isWorkNetwork);
                if (!isWorkNetwork) {
                    document.body.classList.add('revealed'); clearTimedReveal();
                    const ov = document.getElementById('privacyOverlay');
                    const tg = document.getElementById('privacyToggle');
                    if (ov) ov.style.display = 'none';
                    if (tg) tg.style.display = 'none';
                }
            } catch (e) { console.warn('[Network] IP detection failed', e); }
        }
        detectNetwork();

        // --- GBP/CAD ---
        async function refreshGbpCad() {
            try {
                const r = await fetch('https://api.frankfurter.dev/v1/latest?base=GBP&symbols=CAD');
                const data = await r.json();
                if (data && data.rates && typeof data.rates.CAD === 'number') {
                    gbpToCad = data.rates.CAD;
                    const el = document.getElementById('fxGbpCad');
                    if (el) el.textContent = fmt(gbpToCad, 4);
                }
            } catch (e) { console.warn('GBP/CAD fetch failed', e); }
        }
        refreshGbpCad();
        setInterval(refreshGbpCad, GBP_CAD_REFRESH_MS);

        // --- FAVICON (teal when net-profitable, yellow otherwise) ---
        const faviconEl = document.getElementById('favicon');
        const favCanvas = document.createElement('canvas');
        favCanvas.width = 32; favCanvas.height = 32;
        let lastFavColour = null;
        function setFavicon(profitable) {
            const colour = profitable ? '#2dd4bf' : '#fde047';
            if (colour === lastFavColour) return;
            lastFavColour = colour;
            const ctx = favCanvas.getContext('2d');
            ctx.clearRect(0, 0, 32, 32);
            ctx.fillStyle = colour;
            ctx.beginPath(); ctx.arc(16, 16, 13, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();
            faviconEl.href = favCanvas.toDataURL('image/png');
        }

        // --- HOVER TOOLTIP (shared by both charts) ---
        const hoverCard = document.getElementById('hoverCard');
        function externalTooltipHandler(context) {
            const { tooltip } = context;
            if (tooltip.opacity === 0) { hoverCard.classList.remove('visible'); return; }
            if (!tooltip.dataPoints || tooltip.dataPoints.length === 0) return;
            const dp = tooltip.dataPoints;
            const title = tooltip.title && tooltip.title[0] ? tooltip.title[0] : '';
            const xtzPt = dp.find(p => p.dataset.label === 'XTZ');
            const zecPt = dp.find(p => p.dataset.label === 'ZEC');
            const rsPt  = dp.find(p => p.dataset.label === 'RS');
            let html = `<div class="hc-title">${title}</div>`;
            if (rsPt)  html += `<div class="hc-row"><span class="hc-label" style="color:#a78bfa;">RS</span><span style="color:#a78bfa;font-weight:700;">${fmtRs(rsPt.parsed.y)}</span></div>`;
            if (xtzPt) html += `<div class="hc-row"><span class="hc-label" style="color:#2dd4bf;">XTZ idx</span><span>${fmtPct(xtzPt.parsed.y)}</span></div>`;
            if (zecPt) html += `<div class="hc-row"><span class="hc-label" style="color:#fde047;">ZEC idx</span><span>${fmtPct(zecPt.parsed.y)}</span></div>`;
            hoverCard.innerHTML = html;
            hoverCard.classList.add('visible');
        }
        document.getElementById('chartCard').addEventListener('mouseleave', () => { hoverCard.classList.remove('visible'); });

        // --- MAIN TRADE CHART ---
        // Datasets:
        //   [0] XTZ indexed % (teal, left axis y)
        //   [1] ZEC indexed % (yellow, left axis y - shared scale with XTZ)
        //   [2] RS = xtz% - zec% (purple, right hidden axis yRs)
        // BTC is fetched but not plotted - it appears only in the hero summary table.
        // Reference lines for the main trade chart, drawn on the RS (yRs) axis:
        //   0pp = price-only break-even (where the trade started)
        //   +BREAK_EVEN_RS_PP (+0.30pp) = post-fee break-even with margin
        //   currentRs = live RS value (updated each tick), so you can see at a glance
        //   how far the live reading sits from the two static reference lines.
        let liveRsLineValue = null;
        const tradeChartRefLines = {
            id: 'tradeChartRefLines',
            afterDatasetsDraw(chart) {
                const { ctx, chartArea, scales } = chart;
                const yScale = scales.yRs;
                if (!yScale || !chartArea) return;
                const drawLine = (value, color, dash, label) => {
                    if (value === null || isNaN(value)) return;
                    const y = yScale.getPixelForValue(value);
                    if (y < chartArea.top || y > chartArea.bottom) return;
                    ctx.save();
                    ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.setLineDash(dash);
                    ctx.beginPath(); ctx.moveTo(chartArea.left, y); ctx.lineTo(chartArea.right, y); ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.fillStyle = color;
                    ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(label, chartArea.right - 4, y - 7);
                    ctx.restore();
                };
                drawLine(0, 'rgba(148,163,184,0.45)', [4, 3], '+0.00pp');                              // 0pp = trade entry
                drawLine(BREAK_EVEN_RS_PP, 'rgba(45,212,191,0.55)', [2, 3], '+' + BREAK_EVEN_RS_PP.toFixed(2) + 'pp'); // +0.30pp = post-fee BE + margin
                if (liveRsLineValue !== null) {
                    const sign = liveRsLineValue >= 0 ? '+' : '';
                    drawLine(liveRsLineValue, 'rgba(167,139,250,0.85)', [1, 4], sign + liveRsLineValue.toFixed(2) + 'pp'); // current RS
                }
            }
        };

        const tradeChart = new Chart(document.getElementById('chartTrade').getContext('2d'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'XTZ', data: [], borderColor: 'rgba(45,212,191,0.85)', backgroundColor: 'rgba(45,212,191,0.07)', borderWidth: 1.75, pointRadius: 0, tension: 0.2, fill: false, yAxisID: 'y' },
                    { label: 'ZEC', data: [], borderColor: 'rgba(253,224,71,0.80)',  backgroundColor: 'transparent',          borderWidth: 1.75, pointRadius: 0, tension: 0.2, fill: false, yAxisID: 'y' },
                    { label: 'RS',  data: [], borderColor: 'rgba(167,139,250,0.85)', backgroundColor: 'rgba(167,139,250,0.18)', borderWidth: 1.5,  pointRadius: 0, tension: 0.2, fill: 'origin', yAxisID: 'yRs', borderDash: [3, 2] }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x:    { display: false },
                    y:    { display: false },
                    yRs:  { display: false, position: 'right' }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false, external: externalTooltipHandler }
                }
            },
            plugins: [tradeChartRefLines]
        });

        // --- HERO SPARKLINE (RS series since trade, with reference lines) ---
        const refLinesPlugin = {
            id: 'rsRefLines',
            afterDatasetsDraw(chart) {
                const { ctx, chartArea, scales } = chart;
                const yScale = scales.y;
                if (!yScale || !chartArea) return;
                const drawLine = (value, color, dash) => {
                    const y = yScale.getPixelForValue(value);
                    if (y < chartArea.top || y > chartArea.bottom) return;
                    ctx.save();
                    ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.setLineDash(dash);
                    ctx.beginPath(); ctx.moveTo(chartArea.left, y); ctx.lineTo(chartArea.right, y); ctx.stroke();
                    ctx.restore();
                };
                drawLine(0, 'rgba(148,163,184,0.55)', [4, 3]);                // 0pp = trade entry
                drawLine(BREAK_EVEN_RS_PP, 'rgba(45,212,191,0.55)', [2, 3]);  // +0.30pp = post-fee BE + margin
            }
        };
        const heroSparkChart = new Chart(document.getElementById('heroSparkline').getContext('2d'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: 'rgba(167,139,250,0.7)', backgroundColor: 'rgba(167,139,250,0.08)', borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true }] },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                scales: { x: { display: false }, y: { display: false } },
                plugins: { legend: { display: false }, tooltip: { enabled: false } }
            },
            plugins: [refLinesPlugin]
        });

        // --- DATA FETCH ---
        async function fetchKlines(symbol, interval, limit) {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
            return r.json();
        }
        async function fetch24h(symbol) {
            const r = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
            return r.json();
        }

        // --- MAIN UPDATE ---
        async function updateAll() {
            try {
                const [zecK, xtzK, btcK, zecT, xtzT, gbpT, btcT] = await Promise.all([
                    fetchKlines('ZECUSDT', TRADE_KLINE_INTERVAL, TRADE_KLINE_LIMIT),
                    fetchKlines('XTZUSDT', TRADE_KLINE_INTERVAL, TRADE_KLINE_LIMIT),
                    fetchKlines('BTCUSDT', TRADE_KLINE_INTERVAL, TRADE_KLINE_LIMIT),
                    fetch24h('ZECUSDT'),
                    fetch24h('XTZUSDT'),
                    fetch24h('GBPUSDT'),
                    fetch24h('BTCUSDT')
                ]);

                const zecClose = zecK.map(c => parseFloat(c[4]));
                const xtzClose = xtzK.map(c => parseFloat(c[4]));
                const btcClose = btcK.map(c => parseFloat(c[4]));

                const tradeIdx = findBaselineIdx(xtzK, TRADE_DATE_UTC_MS);
                const xtzBase = xtzClose[tradeIdx];
                const zecBase = zecClose[tradeIdx];
                const btcBase = btcClose[tradeIdx];

                // Build sliced series starting at trade entry
                const xtzSlice = xtzClose.slice(tradeIdx);
                const zecSlice = zecClose.slice(tradeIdx);
                const btcSlice = btcClose.slice(tradeIdx);
                const kSlice   = xtzK.slice(tradeIdx);

                const xtzIdx = xtzSlice.map(v => ((v / xtzBase) - 1) * 100);
                const zecIdx = zecSlice.map(v => ((v / zecBase) - 1) * 100);
                const btcIdx = btcSlice.map(v => ((v / btcBase) - 1) * 100);
                const rs     = xtzIdx.map((x, i) => x - zecIdx[i]);

                // Update main chart (BTC is intentionally excluded from the chart - it's
                // shown in the hero table but doesn't belong on the trade-baselined chart).
                tradeChart.data.labels = kSlice.map(k => {
                    const dt = new Date(k[0]);
                    return dt.toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false });
                });
                tradeChart.data.datasets[0].data = xtzIdx;
                tradeChart.data.datasets[1].data = zecIdx;
                tradeChart.data.datasets[2].data = rs;

                const allIdx = [...xtzIdx, ...zecIdx];
                const idxMin = Math.min(...allIdx); const idxMax = Math.max(...allIdx);
                const idxRange = (idxMax - idxMin) || 1; const idxPad = idxRange * 0.08;
                tradeChart.options.scales.y.min = idxMin - idxPad;
                tradeChart.options.scales.y.max = idxMax + idxPad;

                // RS axis: include both reference lines (0pp and +0.30pp) plus current value
                // so all three are always visible regardless of how the live RS drifts
                const currentRsForRange = xtzIdx[xtzIdx.length - 1] - zecIdx[zecIdx.length - 1];
                const rsValues = [...rs, 0, BREAK_EVEN_RS_PP, currentRsForRange];
                const rsMin = Math.min(...rsValues); const rsMax = Math.max(...rsValues);
                const rsRange = (rsMax - rsMin) || 1; const rsPad = rsRange * 0.1;
                tradeChart.options.scales.yRs.min = rsMin - rsPad;
                tradeChart.options.scales.yRs.max = rsMax + rsPad;

                tradeChart.update();

                // Hero table cells
                const xtzPctTrade = xtzIdx[xtzIdx.length - 1];
                const zecPctTrade = zecIdx[zecIdx.length - 1];
                const btcPctTrade = btcIdx[btcIdx.length - 1];
                const currentRsTrade = xtzPctTrade - zecPctTrade;
                writePct('xtzPct_trade', xtzPctTrade);
                writePct('zecPct_trade', zecPctTrade);
                writePct('btcPct_trade', btcPctTrade);
                writeRs('rsPct_trade', currentRsTrade);

                // Headline RS: purple (matches the chart RS line + table RS row).
                // Profitability indication lives on the +0.30pp chart line, the BE ratio,
                // the favicon colour, and the P&L readouts.
                const profitable = currentRsTrade >= BREAK_EVEN_RS_PP;
                const rsEl = document.getElementById('rsHeadline');
                rsEl.textContent = fmtRs(currentRsTrade);
                rsEl.className = 'text-base md:text-xl font-bold ml-1';
                rsEl.style.color = '#a78bfa';

                // Update the live RS reference line on the main chart
                liveRsLineValue = currentRsTrade;

                // Hero sparkline (RS series since trade)
                heroSparkChart.data.labels = rs.map((_, i) => i);
                heroSparkChart.data.datasets[0].data = rs;
                heroSparkChart.update();

                // Prices, holdings, FX, ratio
                const xtzPrice = parseFloat(xtzT.lastPrice);
                const zecPrice = parseFloat(zecT.lastPrice);
                const ratio = xtzPrice / zecPrice;
                const ratioEl = document.getElementById('currentRatio');
                ratioEl.textContent = fmt(ratio, 6);
                ratioEl.classList.remove('text-slate-300', 'text-teal-400', 'text-yellow-400');
                ratioEl.classList.add(ratio >= BREAK_EVEN_RATIO ? 'text-teal-400' : 'text-yellow-400');
                document.getElementById('breakEvenRatio').textContent = fmt(BREAK_EVEN_RATIO, 6);
                document.getElementById('xtzPrice').textContent = fmtUsd(xtzPrice);
                document.getElementById('zecPrice').textContent = fmtUsd(zecPrice);
                document.getElementById('btcPrice').textContent = '$' + fmtInt(parseFloat(btcT.lastPrice));

                const usdToGbp = 1 / parseFloat(gbpT.lastPrice);
                const holdingsUsd = XTZ_HELD * xtzPrice;
                const holdingsGbp = holdingsUsd * usdToGbp;
                document.getElementById('holdingsUsd').textContent = '$' + fmtInt(holdingsUsd);
                document.getElementById('holdingsGbp').textContent = '£' + fmtInt(holdingsGbp);
                document.getElementById('fxGbpUsd').textContent = fmt(parseFloat(gbpT.lastPrice), 4);

                // Trade ledger - static USD values + live GBP equivalents
                const costBasisGbp  = COST_BASIS_USDT  * usdToGbp;
                const feesPaidGbp   = FEES_PAID_USDT   * usdToGbp;
                const slippageGbp   = INTERLEG_USDT_GAP * usdToGbp;
                document.getElementById('costBasis').textContent = '$' + fmt(COST_BASIS_USDT, 2)  + ' / £' + fmt(costBasisGbp, 2);
                document.getElementById('feesPaid').textContent  = '$' + fmt(FEES_PAID_USDT, 2)   + ' / £' + fmt(feesPaidGbp, 2);
                document.getElementById('slippage').textContent  = '$' + fmt(INTERLEG_USDT_GAP, 2) + ' / £' + fmt(slippageGbp, 2);

                // P&L vs ZEC: if I swapped XTZ -> USDT -> ZEC right now (after round-trip taker
                // fees), how many ZEC would I end up with vs the original 16.256?
                const zecEquivAfterFees = (XTZ_HELD * xtzPrice * ROUND_TRIP_RETENTION) / zecPrice;
                const pnlVsZec = zecEquivAfterFees - ZEC_HELD_PRE_TRADE;
                const pnlVsZecEl = document.getElementById('pnlVsZec');
                pnlVsZecEl.textContent = (pnlVsZec >= 0 ? '+' : '') + fmt(pnlVsZec, 3) + ' ZEC';
                pnlVsZecEl.classList.remove('text-teal-400', 'text-yellow-400', 'text-slate-300');
                pnlVsZecEl.classList.add(pnlVsZec >= 0 ? 'text-teal-400' : 'text-yellow-400');

                // P&L vs USD: if I sold XTZ -> USDT right now (after one-leg taker fee),
                // how many USDT vs the leg-1 net (i.e. would I be ahead of just keeping the
                // USDT from the ZEC sell?). Leg-1 fee is sunk either way.
                const usdtEquivAfterFee = XTZ_HELD * xtzPrice * (1 - TAKER_FEE);
                const pnlVsUsd = usdtEquivAfterFee - LEG1_NET_USDT;
                const pnlVsUsdGbp = pnlVsUsd * usdToGbp;
                const pnlVsUsdEl = document.getElementById('pnlVsUsd');
                const pnlSign = pnlVsUsd >= 0 ? '+' : '-';
                const pnlAbsUsd = Math.abs(pnlVsUsd);
                const pnlAbsGbp = Math.abs(pnlVsUsdGbp);
                pnlVsUsdEl.textContent = pnlSign + '$' + fmt(pnlAbsUsd, 2) + ' / ' + pnlSign + '£' + fmt(pnlAbsGbp, 2);
                pnlVsUsdEl.classList.remove('text-teal-400', 'text-yellow-400', 'text-slate-300');
                pnlVsUsdEl.classList.add(pnlVsUsd >= 0 ? 'text-teal-400' : 'text-yellow-400');

                // Favicon + tab title
                setFavicon(profitable);
                document.title = `RS ${fmtRs(currentRsTrade)} | ꜩ${xtzPrice.toFixed(3)} | ZEC $${fmtInt(zecPrice)} | ₿$${fmtInt(parseFloat(btcT.lastPrice))}`;

                // Status
                lastSuccessTs = Date.now();
                consecutiveErrors = 0;
                document.getElementById('liveDot').classList.remove('stale', 'error');
                document.getElementById('liveStatus').textContent = 'Live';
                document.getElementById('errCount').classList.add('hidden');
                document.getElementById('heroRateBlock').classList.remove('stale-dim');

            } catch (err) {
                consecutiveErrors++;
                console.error('Update failed', err);
                document.getElementById('liveDot').classList.add('error');
                document.getElementById('liveStatus').textContent = 'Error';
                const ec = document.getElementById('errCount');
                ec.textContent = `x${consecutiveErrors}`;
                ec.classList.remove('hidden');
            }
        }

        // Stale watcher
        setInterval(() => {
            if (lastSuccessTs === 0) return;
            const ageMs = Date.now() - lastSuccessTs;
            const liveDot = document.getElementById('liveDot');
            const liveStatus = document.getElementById('liveStatus');
            const rateBlock = document.getElementById('heroRateBlock');
            if (ageMs > STALE_MS) {
                if (!liveDot.classList.contains('error')) { liveDot.classList.add('stale'); liveStatus.textContent = 'Stale'; }
                rateBlock.classList.add('stale-dim');
            }
        }, 1000);

        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
