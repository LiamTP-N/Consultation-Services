<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTZ</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: sans-serif; color: white; background: #000;
        }
        #widgetContainer {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }
        #widgetBtc {
            font-size: 9vmin; font-weight: bold; line-height: 1; white-space: nowrap;
            color: #fb923c;
            margin-bottom: 0.35em;
        }
        #widgetNumber {
            font-size: 13vmin; font-weight: bold; line-height: 1; white-space: nowrap;
            background: linear-gradient(to right, #1e3a8a, #2dd4bf);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            text-shadow: none;
        }
        #widgetSub {
            font-size: 13vmin; font-weight: bold; line-height: 1; white-space: nowrap;
            margin-top: 0.25em; letter-spacing: 0.01em;
        }
        .infoRow {
            font-size: 4.2vmin; font-weight: 600; line-height: 1.15;
            margin-top: 0.55em; color: #d1d5db; white-space: nowrap;
        }
        .infoRow .label {
            color: #9ca3af; font-weight: 500; margin-right: 0.4em;
        }
        .infoRow .gbp {
            color: #9ca3af; font-weight: 500; font-size: 0.78em;
        }
        #balanceRow { margin-top: 0.7em; }
        #balanceRow .gbpLine {
            display: block; margin-top: 0.15em;
            font-size: 3.4vmin; color: #9ca3af; font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="widgetContainer">
        <div id="widgetBtc">-</div>
        <div id="widgetNumber">-</div>
        <div id="widgetSub">-</div>
        <div id="balanceRow" class="infoRow">
            <span class="label">Bal</span><span id="balanceXtz">-</span>
            <span class="gbpLine" id="balanceGbp">-</span>
        </div>
        <div id="pendingRow" class="infoRow">
            <span class="label">Pending</span><span id="pendingXtz">-</span>
        </div>
        <div id="settledRow" class="infoRow">
            <span class="label">Last</span><span id="settledXtz">-</span>
        </div>
    </div>

    <script>
        // ==============================================================
        // CRYPTO-WIDGET.HTML
        // Top block (always-on-display friendly):
        //   BTC current spot price
        //   XTZ current price
        //   XTZ % change since trade entry
        // Below block (TzKT-powered):
        //   Total balance (XTZ + GBP)
        //   Pending reward (current/next cycle, projected)
        //   Last realised reward
        //
        // REWARD CALCULATION matches crypto.html:
        //   Dual pool model. Your stake earns from the staking pool;
        //   any delegated balance earns from the delegation pool.
        //     stakeSlice = (sum *StakedShared rewards) * (stakedPseudotokens / issuedPseudotokens)
        //     delegSlice = (sum *Delegated rewards)   * (delegatedBalance / externalDelegatedBalance)
        //   total = stakeSlice + delegSlice  (losses pro-rata)
        // ==============================================================

        const TRADE_DATE_UTC_MS = Date.UTC(2026, 4, 3, 20, 57, 57);
        const TZ_ADDRESS = "tz1cg93LEsvZ7Uy64SkXpwAL7NUMZCwgZPxp";
        const TZKT_BASE = "https://api.tzkt.io/v1";

        // FX cache (USD -> GBP)
        let gbpRate = null;
        let gbpRateFetchedAt = 0;
        const GBP_TTL_MS = 30 * 60 * 1000;

        // TzKT cache - balance + rewards refresh on the minute, not the second
        let tzktCache = null;
        let tzktFetchedAt = 0;
        const TZKT_TTL_MS = 60 * 1000;

        // --- BINANCE / FX ---
        async function fetchKlines(symbol, interval, limit) {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
            return r.json();
        }
        async function fetchLastPrice(symbol) {
            const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
            const d = await r.json();
            return parseFloat(d.price);
        }
        async function fetchGbpRate() {
            const now = Date.now();
            if (gbpRate && (now - gbpRateFetchedAt) < GBP_TTL_MS) return gbpRate;
            try {
                const r = await fetch("https://open.er-api.com/v6/latest/USD");
                const d = await r.json();
                if (d && d.rates && d.rates.GBP) {
                    gbpRate = d.rates.GBP;
                    gbpRateFetchedAt = now;
                }
            } catch (e) { console.error("GBP rate fetch failed", e); }
            return gbpRate;
        }

        // --- TZKT REWARD MATH (mirrors crypto.html) ---
        function num(v) { return (typeof v === "number" && isFinite(v)) ? v : 0; }
        function sumFields(obj, fields) {
            let t = 0;
            for (const f of fields) t += num(obj[f]);
            return t;
        }

        function sumBakerDelegatedPoolMutez(b) {
            if (!b) return 0;
            return sumFields(b, [
                "ownBlockRewardsDelegated", "extraBlockRewardsDelegated", "futureBlockRewardsDelegated",
                "endorsementRewardsDelegated", "futureEndorsementRewardsDelegated",
                "attestationRewardsDelegated", "futureAttestationRewardsDelegated",
                "dalAttestationRewardsDelegated", "futureDalAttestationRewardsDelegated",
                "nonceRevelationRewardsDelegated", "vdfRevelationRewardsDelegated",
                "ownBlockFees", "extraBlockFees"
            ]);
        }
        function sumBakerStakedSharedPoolMutez(b) {
            if (!b) return 0;
            return sumFields(b, [
                "ownBlockRewardsStakedShared", "extraBlockRewardsStakedShared", "futureBlockRewardsStakedShared",
                "endorsementRewardsStakedShared", "futureEndorsementRewardsStakedShared",
                "attestationRewardsStakedShared", "futureAttestationRewardsStakedShared",
                "dalAttestationRewardsStakedShared", "futureDalAttestationRewardsStakedShared",
                "nonceRevelationRewardsStakedShared", "vdfRevelationRewardsStakedShared"
            ]);
        }
        function sumLossesMutez(r) {
            if (!r) return 0;
            return sumFields(r, [
                "nonceRevelationLosses", "revelationLosses",
                "doubleBakingLostStaked", "doubleEndorsingLostStaked", "doublePreendorsingLostStaked",
                "doubleBakingLostUnstaked", "doubleEndorsingLostUnstaked", "doublePreendorsingLostUnstaked",
                "revelationLostRewards", "revelationLostFees",
                "doubleBakingLostDeposits", "doubleBakingLostRewards", "doubleBakingLostFees",
                "doubleEndorsingLostDeposits", "doubleEndorsingLostRewards", "doubleEndorsingLostFees"
            ]);
        }
        function sumBakerGrossLegacyMutez(b) {
            if (!b) return 0;
            return sumFields(b, [
                "ownBlockRewards", "extraBlockRewards", "futureBlockRewards",
                "endorsementRewards", "futureEndorsementRewards",
                "attestationRewards", "futureAttestationRewards",
                "dalAttestationRewards", "futureDalAttestationRewards",
                "nonceRevelationRewards", "vdfRevelationRewards",
                "doubleBakingRewards", "doubleEndorsingRewards", "doublePreendorsingRewards",
                "ownBlockFees", "extraBlockFees"
            ]);
        }

        function computeDelegatorPayoutMutez(r, baker) {
            if (!r) return 0;
            const losses = sumLossesMutez(r);

            // DELEGATION SLICE
            let delegSlice = 0;
            const myDelegated = num(r.delegatedBalance) || num(r.balance);
            if (myDelegated > 0 && baker) {
                const pool = num(baker.externalDelegatedBalance) || num(baker.stakingBalance);
                if (pool > 0) {
                    delegSlice = sumBakerDelegatedPoolMutez(baker) * (myDelegated / pool);
                }
            }

            // STAKING SLICE
            let stakeSlice = 0;
            const myPT = num(r.stakedPseudotokens);
            if (myPT > 0 && baker) {
                const issued = num(baker.issuedPseudotokens);
                if (issued > 0) {
                    stakeSlice = sumBakerStakedSharedPoolMutez(baker) * (myPT / issued);
                }
            }

            // Fallback for old/transition cycles
            if (delegSlice === 0 && stakeSlice === 0) {
                const bakerGross = baker ? sumBakerGrossLegacyMutez(baker) : 0;
                const sb = num(r.stakingBalance);
                const bal = num(r.balance) || num(r.delegatedBalance);
                if (bakerGross > 0 && sb > 0 && bal > 0) {
                    return Math.max(0, bakerGross - losses) * (bal / sb);
                }
                return 0;
            }

            const gross = delegSlice + stakeSlice;
            const totalPool = sumBakerDelegatedPoolMutez(baker) + sumBakerStakedSharedPoolMutez(baker);
            const lossShare = (totalPool > 0) ? losses * (gross / totalPool) : 0;
            return Math.max(0, gross - lossShare);
        }

        function isCycleInFuture(r) {
            const fields = ["futureBlockRewards", "futureEndorsementRewards", "futureAttestationRewards", "futureDalAttestationRewards",
                            "futureBlockRewardsDelegated", "futureBlockRewardsStakedShared",
                            "futureEndorsementRewardsDelegated", "futureEndorsementRewardsStakedShared",
                            "futureAttestationRewardsDelegated", "futureAttestationRewardsStakedShared",
                            "futureDalAttestationRewardsDelegated", "futureDalAttestationRewardsStakedShared"];
            for (const f of fields) {
                if (typeof r[f] === "number" && r[f] > 0) return true;
            }
            return false;
        }

        async function fetchTzkt() {
            const now = Date.now();
            if (tzktCache && (now - tzktFetchedAt) < TZKT_TTL_MS) return tzktCache;
            try {
                const [acctR, rewardsR] = await Promise.all([
                    fetch(`${TZKT_BASE}/accounts/${TZ_ADDRESS}`),
                    fetch(`${TZKT_BASE}/rewards/delegators/${TZ_ADDRESS}?limit=10`)
                ]);
                const acct = await acctR.json();
                const rewards = await rewardsR.json();

                const balanceXtz = (acct.balance || 0) / 1e6;
                const bakerAddr = (acct.delegate && acct.delegate.address) ? acct.delegate.address : null;

                // Fetch baker reward records for the same cycles, so we can compute pool shares.
                let bakerByCycle = new Map();
                if (bakerAddr && Array.isArray(rewards) && rewards.length > 0) {
                    const cycles = rewards.map(r => r.cycle).filter(c => typeof c === "number");
                    if (cycles.length > 0) {
                        const minC = Math.min(...cycles);
                        const maxC = Math.max(...cycles);
                        try {
                            const bRes = await fetch(`${TZKT_BASE}/rewards/bakers/${bakerAddr}?cycle.ge=${minC}&cycle.le=${maxC}&limit=${maxC - minC + 2}`);
                            const bJson = await bRes.json();
                            if (Array.isArray(bJson)) {
                                bJson.forEach(b => { if (b && typeof b.cycle === "number") bakerByCycle.set(b.cycle, b); });
                            }
                        } catch (e) { console.warn("[TzKT] baker rewards fetch failed", e); }
                    }
                }

                // Pending = the first record (newest cycle), regardless of future flag
                // (gives projected total for the cycle currently in progress).
                let pendingXtz = 0;
                let settledXtz = 0;
                if (Array.isArray(rewards) && rewards.length > 0) {
                    const newest = rewards[0];
                    pendingXtz = computeDelegatorPayoutMutez(newest, bakerByCycle.get(newest.cycle)) / 1e6;

                    // Last realised = first record where there are no future rewards remaining.
                    for (let i = 0; i < rewards.length; i++) {
                        if (!isCycleInFuture(rewards[i])) {
                            settledXtz = computeDelegatorPayoutMutez(rewards[i], bakerByCycle.get(rewards[i].cycle)) / 1e6;
                            break;
                        }
                    }
                }

                tzktCache = { balanceXtz, pendingXtz, settledXtz };
                tzktFetchedAt = now;
            } catch (e) {
                console.error("TzKT fetch failed", e);
            }
            return tzktCache;
        }

        function findBaselineIdx(klines, targetMs) {
            let best = 0;
            let bestDiff = Infinity;
            klines.forEach((k, i) => {
                const diff = Math.abs(k[0] - targetMs);
                if (diff < bestDiff) { bestDiff = diff; best = i; }
            });
            return best;
        }

        function fmtPct(n) {
            const sign = n >= 0 ? "+" : "";
            return sign + n.toFixed(2) + "%";
        }
        function fmtPrice(n) { return "$" + n.toFixed(4); }
        function fmtBtc(n) { return "$" + Math.round(n).toLocaleString("en-US"); }
        function fmtXtzBalance(n) {
            return n.toLocaleString("en-GB", { maximumFractionDigits: 2, minimumFractionDigits: 2 }) + " XTZ";
        }
        function fmtXtzReward(n) {
            if (!isFinite(n) || n < 0.0001) return "0.0000 XTZ";
            return n.toFixed(4) + " XTZ";
        }
        function fmtGbp(n) {
            return "\u00A3" + n.toLocaleString("en-GB", { maximumFractionDigits: 2, minimumFractionDigits: 2 });
        }

        // Map % change to colour. Saturates at +/- 10%.
        function pctColour(pct) {
            const cap = 10;
            const t = Math.max(-1, Math.min(1, pct / cap));
            const neutral = [220, 220, 220];
            const green   = [34, 197, 94];
            const red     = [248, 113, 113];
            let rgb;
            if (t >= 0) {
                rgb = neutral.map((c, i) => Math.round(c + (green[i] - c) * t));
            } else {
                rgb = neutral.map((c, i) => Math.round(c + (red[i]   - c) * (-t)));
            }
            return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
        }

        async function updateWidget() {
            try {
                const [xtzK, xtzLast, btcLast, gbp, tz] = await Promise.all([
                    fetchKlines("XTZUSDT", "15m", 1000),
                    fetchLastPrice("XTZUSDT"),
                    fetchLastPrice("BTCUSDT"),
                    fetchGbpRate(),
                    fetchTzkt()
                ]);
                if (!xtzK.length || !xtzLast) return;

                const xtzBaseIdx = findBaselineIdx(xtzK, TRADE_DATE_UTC_MS);
                const xtzBase = parseFloat(xtzK[xtzBaseIdx][4]);
                if (!xtzBase) return;

                const xtzPct = ((xtzLast / xtzBase) - 1) * 100;

                const btcEl = document.getElementById("widgetBtc");
                const numEl = document.getElementById("widgetNumber");
                const subEl = document.getElementById("widgetSub");

                if (btcLast) btcEl.textContent = fmtBtc(btcLast);
                numEl.textContent = fmtPrice(xtzLast);
                subEl.textContent = fmtPct(xtzPct);
                subEl.style.color = pctColour(xtzPct);

                document.title = "XTZ " + fmtPrice(xtzLast) + " " + fmtPct(xtzPct);

                if (tz) {
                    const balXtzEl = document.getElementById("balanceXtz");
                    const balGbpEl = document.getElementById("balanceGbp");
                    const pendEl = document.getElementById("pendingXtz");
                    const setEl = document.getElementById("settledXtz");

                    balXtzEl.textContent = fmtXtzBalance(tz.balanceXtz);
                    if (gbp && xtzLast) {
                        balGbpEl.textContent = fmtGbp(tz.balanceXtz * xtzLast * gbp);
                    } else {
                        balGbpEl.textContent = "";
                    }

                    pendEl.textContent = fmtXtzReward(tz.pendingXtz);
                    setEl.textContent = fmtXtzReward(tz.settledXtz);
                }
            } catch (e) {
                console.error("Widget update failed", e);
            }
        }

        updateWidget();
        setInterval(updateWidget, 5000);
    </script>
</body>
</html>
