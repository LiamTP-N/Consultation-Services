<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEC to XTZ Widget</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            background: #000;
        }
        #widgetContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
        }
        #widgetNumber {
            font-size: 20vmin;
            font-weight: bold;
            line-height: 1;
            white-space: nowrap;
        }
        .above-target #widgetNumber {
            color: #22c55e;
        }
        .below-target #widgetNumber {
            color: white;
        }
        #widgetNumber.change-up {
            color: #22c55e;
        }
        #widgetNumber.change-down {
            color: #ef4444;
        }
    </style>
</head>
<body>

    <div id="widgetContainer">
        <div id="widgetNumber"></div>
    </div>

    <script>
        // EmailJS initialisation
        emailjs.init('YOUR_PUBLIC_KEY');

        const zecHeld = 16.256;
        const xtzTarget = 17500;
        const targetRate = xtzTarget / zecHeld;
        let alertSent = false;

        function sendEmailAlert(rate) {
            const templateParams = {
                message: `Target reached. The ZEC to XTZ exchange rate is currently ${rate.toFixed(2)}.`
            };
            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
                .then(function(response) {
                    console.log('Alert email sent successfully.', response.status, response.text);
                }, function(error) {
                    console.log('Failed to send email.', error);
                });
        }

        async function fetch24hrTicker(symbol) {
            const url = `https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`;
            const response = await fetch(url);
            const data = await response.json();
            return {
                last: parseFloat(data.lastPrice),
                open: parseFloat(data.openPrice)
            };
        }

        async function updateWidget() {
            try {
                const [xtz, zec] = await Promise.all([
                    fetch24hrTicker('XTZUSDT'),
                    fetch24hrTicker('ZECUSDT')
                ]);
                if (!xtz.last || !zec.last) return;

                const rate = zec.last / xtz.last;
                const rate24hAgo = (xtz.open && zec.open) ? zec.open / xtz.open : null;
                const distancePct = ((rate / targetRate) - 1) * 100;
                const aboveTarget = rate >= targetRate;

                const numEl = document.getElementById('widgetNumber');
                const containerEl = document.getElementById('widgetContainer');

                const sign = distancePct >= 0 ? '+' : '';
                const pctText = `${sign}${distancePct.toFixed(1)}%`;
                numEl.textContent = pctText;
                containerEl.className = aboveTarget ? 'above-target' : 'below-target';

                numEl.classList.remove('change-up', 'change-down');
                if (!aboveTarget && rate24hAgo !== null) {
                    if (rate > rate24hAgo) {
                        numEl.classList.add('change-up');
                    } else if (rate < rate24hAgo) {
                        numEl.classList.add('change-down');
                    }
                }

                document.title = pctText;

                if (aboveTarget && !alertSent) {
                    sendEmailAlert(rate);
                    alertSent = true;
                }
            } catch (e) {
                console.error('Widget update failed', e);
            }
        }

        updateWidget();
        setInterval(updateWidget, 5000);
    </script>
</body>
</html>
