<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTZ vs ZEC</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: sans-serif; color: white; background: #000;
        }
        #widgetContainer {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }
        #widgetLabel {
            font-size: 4vmin; font-weight: 600; letter-spacing: 0.08em;
            text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 0.3em;
        }
        #widgetNumber {
            font-size: 18vmin; font-weight: bold; line-height: 1; white-space: nowrap;
        }
        /* XTZ leading ZEC = teal; ZEC leading XTZ = yellow */
        .xtz-leading #widgetNumber { color: #2dd4bf; }
        .zec-leading #widgetNumber { color: #fde047; }
        #widgetSub {
            font-size: 3.5vmin; font-weight: 500; color: rgba(255,255,255,0.40);
            margin-top: 0.4em; letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <div id="widgetContainer">
        <div id="widgetLabel">XTZ vs ZEC RS (since trade)</div>
        <div id="widgetNumber">-</div>
        <div id="widgetSub">-</div>
    </div>

    <script>
        // XTZ/ZEC Relative Strength widget.
        // RS = xtzPct - zecPct measured from trade entry (3 May 2026 21:57 BST = 20:57 UTC).
        // Positive = XTZ outperforming ZEC since trade. Negative = ZEC outperforming XTZ since trade.
        // Colour threshold: round-trip swap-back via market orders costs ~0.20pp in fees;
        // bumped to +0.30pp to leave a slippage/spread margin. Teal only when RS clears that.

        const TRADE_DATE_UTC_MS = Date.UTC(2026, 4, 3, 20, 57, 57);
        const BREAK_EVEN_RS_PP = 0.30;

        async function fetchKlines(symbol, interval, limit) {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
            return r.json();
        }

        async function fetchLastPrice(symbol) {
            const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
            const d = await r.json();
            return parseFloat(d.price);
        }

        // Find index of kline open-time closest to targetMs.
        function findBaselineIdx(klines, targetMs) {
            let best = 0;
            let bestDiff = Infinity;
            klines.forEach((k, i) => {
                const diff = Math.abs(k[0] - targetMs);
                if (diff < bestDiff) { bestDiff = diff; best = i; }
            });
            return best;
        }

        function fmtRs(n) {
            const sign = n >= 0 ? '+' : '';
            return sign + n.toFixed(1) + 'pp';
        }
        function fmtPct(n) {
            const sign = n >= 0 ? '+' : '';
            return sign + n.toFixed(2) + '%';
        }

        async function updateWidget() {
            try {
                // 90 daily candles - covers trade date with plenty of headroom.
                const [xtzK, zecK, xtzLast, zecLast] = await Promise.all([
                    fetchKlines('XTZUSDT', '1d', 90),
                    fetchKlines('ZECUSDT', '1d', 90),
                    fetchLastPrice('XTZUSDT'),
                    fetchLastPrice('ZECUSDT')
                ]);
                if (!xtzK.length || !zecK.length || !xtzLast || !zecLast) return;

                const xtzBaseIdx = findBaselineIdx(xtzK, TRADE_DATE_UTC_MS);
                const zecBaseIdx = findBaselineIdx(zecK, TRADE_DATE_UTC_MS);
                const xtzBase = parseFloat(xtzK[xtzBaseIdx][4]); // close price of trade-day candle
                const zecBase = parseFloat(zecK[zecBaseIdx][4]);
                if (!xtzBase || !zecBase) return;

                const xtzPct = ((xtzLast / xtzBase) - 1) * 100;
                const zecPct = ((zecLast / zecBase) - 1) * 100;
                const rs = xtzPct - zecPct;
                const profitable = rs >= BREAK_EVEN_RS_PP;

                const numEl = document.getElementById('widgetNumber');
                const subEl = document.getElementById('widgetSub');
                const containerEl = document.getElementById('widgetContainer');

                numEl.textContent = fmtRs(rs);
                // Teal only when round-trip would be net-profitable after market-order fees
                containerEl.className = profitable ? 'xtz-leading' : 'zec-leading';

                const xtzLeading = rs >= 0;
                const winner = xtzLeading ? 'XTZ' : 'ZEC';
                const loser  = xtzLeading ? 'ZEC' : 'XTZ';
                subEl.textContent = `${winner} ${xtzLeading ? fmtPct(xtzPct) : fmtPct(zecPct)} / ${loser} ${xtzLeading ? fmtPct(zecPct) : fmtPct(xtzPct)}`;

                document.title = `RS ${fmtRs(rs)} | ꜩ${xtzLast.toFixed(3)}`;
            } catch (e) {
                console.error('Widget update failed', e);
            }
        }

        updateWidget();
        setInterval(updateWidget, 5000);
    </script>
</body>
</html>
