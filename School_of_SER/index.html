<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Northumbria Department Workflow Map</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
      line-height: 1.6;
    }
    
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e0e0e0; }
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    @media (prefers-color-scheme: dark) {
      .container { background: #2a2a2a; }
    }
    
    h1 { font-size: 24px; margin-bottom: 8px; font-weight: 600; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
    @media (prefers-color-scheme: dark) { .subtitle { color: #999; } }
    
    .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .controls label { font-size: 13px; font-weight: 500; margin-right: 8px; }
    
    button {
      padding: 8px 16px;
      border: 0.5px solid #ccc;
      border-radius: 4px;
      background: white;
      color: #333;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    @media (prefers-color-scheme: dark) {
      button { background: #333; color: #e0e0e0; border-color: #555; }
    }
    
    button:hover { background: #f0f0f0; border-color: #999; }
    button.active { background: #1f4e78; color: white; border-color: #1f4e78; }
    
    .diagram-container {
      border: 0.5px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      padding: 16px;
      margin-bottom: 24px;
      overflow-x: auto;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    @media (prefers-color-scheme: dark) {
      .diagram-container { background: #1a1a1a; border-color: #444; }
    }
    
    svg { width: 100%; height: auto; }
    .editable-box { cursor: pointer; transition: opacity 0.2s; }
    .editable-box:hover { opacity: 0.8; }
    
    .info-box {
      background: #f0f7ff;
      border-left: 3px solid #0066cc;
      padding: 16px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 24px;
    }
    
    @media (prefers-color-scheme: dark) {
      .info-box { background: #1a3a52; border-left-color: #0088dd; }
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.open { display: flex; }
    
    .modal-content {
      background: white;
      border-radius: 8px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    @media (prefers-color-scheme: dark) {
      .modal-content { background: #2a2a2a; color: #e0e0e0; }
    }
    
    .modal-content h2 { font-size: 18px; margin-bottom: 16px; }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 0.5px solid #ccc;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
    }
    
    @media (prefers-color-scheme: dark) {
      .form-group input,
      .form-group textarea {
        background: #333;
        color: #e0e0e0;
        border-color: #555;
      }
    }
    
    .form-group textarea { resize: vertical; min-height: 60px; }
    
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    
    .btn-save {
      background: #1f4e78;
      color: white;
      border-color: #1f4e78;
    }
    
    .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Northumbria Department Workflow Map</h1>
    <p class="subtitle">Click any box to edit</p>
    
    <div class="info-box">
      <strong>How to use:</strong>
      <ul>
        <li>Click any workflow box to edit it</li>
        <li>Filter by workflow using the buttons below</li>
        <li>Changes save instantly</li>
      </ul>
    </div>
    
    <div class="controls">
      <label>Filter:</label>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="teaching">Teaching</button>
      <button class="filter-btn" data-filter="research">Research</button>
      <button class="filter-btn" data-filter="admin">Admin</button>
    </div>
    
    <div class="diagram-container" id="diagramContainer">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2>Edit Workflow Step</h2>
      <form id="editForm" onsubmit="window.saveStep(event)">
        <div class="form-group">
          <label>Workflow</label>
          <input type="text" id="editWorkflow" readonly>
        </div>
        <div class="form-group">
          <label>Step #</label>
          <input type="text" id="editStep" required>
        </div>
        <div class="form-group">
          <label>Task</label>
          <textarea id="editTask" required></textarea>
        </div>
        <div class="form-group">
          <label>URL</label>
          <input type="text" id="editUrl">
        </div>
        <div class="form-group">
          <label>Audience</label>
          <input type="text" id="editAudience">
        </div>
        <div class="form-group">
          <label>Documents</label>
          <input type="text" id="editDocuments">
        </div>
        <div class="form-group">
          <label>Deadline</label>
          <input type="text" id="editDeadline">
        </div>
        <div class="form-group">
          <label>Depends On</label>
          <input type="text" id="editDependsOn">
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="editNotes" style="min-height: 40px;"></textarea>
        </div>
        <div class="modal-buttons">
          <button type="button" onclick="window.closeModal()">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getFirestore, collection, getDocs, orderBy, query, updateDoc, doc, addDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDSK-2hI6ML1eykIed6E8S5Ve29phrEolI",
      authDomain: "nu-school-of-sport.firebaseapp.com",
      projectId: "nu-school-of-sport",
      storageBucket: "nu-school-of-sport.firebasestorage.app",
      messagingSenderId: "396866213410",
      appId: "1:396866213410:web:bc7f31d1eb1833306d1c7b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let workflows = {};
    let currentEditingId = null;
    let currentFilter = 'all';

    async function loadWorkflows() {
      try {
        console.log('Loading workflows...');
        const q = query(collection(db, 'workflows'), orderBy('workflow'), orderBy('step'));
        const snapshot = await getDocs(q);
        
        workflows = {};
        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          if (!workflows[data.workflow]) {
            workflows[data.workflow] = [];
          }
          workflows[data.workflow].push({ id: docSnap.id, ...data });
        });
        
        console.log('Loaded workflows:', workflows);
        renderDiagram();
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('diagramContainer').innerHTML = '<div class="loading">Error loading workflows</div>';
      }
    }

    function renderDiagram() {
      const container = document.getElementById('diagramContainer');
      
      if (Object.keys(workflows).length === 0) {
        container.innerHTML = '<div class="loading">No workflows in database</div>';
        return;
      }

      let svg = '<svg viewBox="0 0 680 700"><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';

      svg += '<circle cx="340" cy="40" r="24" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.5"/><text x="340" y="48" text-anchor="middle" dominant-baseline="central" style="font-size: 14px; font-weight: 500; fill: currentColor;">Start</text><line x1="340" y1="64" x2="340" y2="100" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)"/>';

      svg += '<polygon points="340,100 410,130 340,160 270,130" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="1.5"/><text x="340" y="135" text-anchor="middle" dominant-baseline="central" style="font-size: 13px; font-weight: 500; fill: currentColor;">What are you doing?</text>';

      const positions = {
        'Teaching': { x: 180, arrow: { x1: 280, y1: 160, x2: 180, y2: 200 } },
        'Research': { x: 340, arrow: { x1: 340, y1: 160, x2: 340, y2: 200 } },
        'Admin': { x: 500, arrow: { x1: 400, y1: 160, x2: 500, y2: 200 } }
      };

      for (const [wName, pos] of Object.entries(positions)) {
        const visible = currentFilter === 'all' || currentFilter === wName.toLowerCase();
        const opacity = visible ? '1' : '0.15';
        
        svg += `<line x1="${pos.arrow.x1}" y1="${pos.arrow.y1}" x2="${pos.arrow.x2}" y2="${pos.arrow.y2}" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" opacity="${opacity}"/><text x="${pos.arrow.x1 + (pos.arrow.x2 - pos.arrow.x1) / 2}" y="${pos.arrow.y1 + (pos.arrow.y2 - pos.arrow.y1) / 2 - 10}" text-anchor="middle" style="font-size: 11px; fill: currentColor; opacity: ${opacity};">${wName}</text>`;

        let stepY = 200;
        const steps = workflows[wName] || [];
        
        for (let i = 0; i < steps.length; i++) {
          const step = steps[i];
          svg += `<g class="editable-box" onclick="window.openModal('${step.id}')" opacity="${opacity}"><rect x="${pos.x - 100}" y="${stepY}" width="200" height="60" rx="6" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1"/><text x="${pos.x}" y="${stepY + 20}" text-anchor="middle" style="font-size: 12px; font-weight: 500; fill: currentColor;">${step.task}</text><text x="${pos.x}" y="${stepY + 40}" text-anchor="middle" style="font-size: 10px; fill: currentColor; opacity: 0.7;">${step.notes}</text></g>`;

          if (i < steps.length - 1) {
            svg += `<line x1="${pos.x}" y1="${stepY + 60}" x2="${pos.x}" y2="${stepY + 90}" stroke="currentColor" stroke-width="1.5" marker-end="url(#arrow)" opacity="${opacity}"/>`;
          }
          stepY += 90;
        }
      }

      svg += '</svg>';
      container.innerHTML = svg;
    }

    window.openModal = function(id) {
      currentEditingId = id;
      let step = null;
      for (const w of Object.values(workflows)) {
        step = w.find(s => s.id === id);
        if (step) break;
      }
      if (step) {
        document.getElementById('editWorkflow').value = step.workflow;
        document.getElementById('editStep').value = step.step;
        document.getElementById('editTask').value = step.task;
        document.getElementById('editUrl').value = step.url || '';
        document.getElementById('editAudience').value = step.audience || '';
        document.getElementById('editDocuments').value = step.documents || '';
        document.getElementById('editDeadline').value = step.deadline || '';
        document.getElementById('editDependsOn').value = step.dependsOn || '';
        document.getElementById('editNotes').value = step.notes || '';
        document.getElementById('editModal').classList.add('open');
      }
    };

    window.closeModal = function() {
      document.getElementById('editModal').classList.remove('open');
      currentEditingId = null;
    };

    window.saveStep = async function(event) {
      event.preventDefault();
      if (!currentEditingId) return;

      try {
        await updateDoc(doc(db, 'workflows', currentEditingId), {
          step: document.getElementById('editStep').value,
          task: document.getElementById('editTask').value,
          url: document.getElementById('editUrl').value,
          audience: document.getElementById('editAudience').value,
          documents: document.getElementById('editDocuments').value,
          deadline: document.getElementById('editDeadline').value,
          dependsOn: document.getElementById('editDependsOn').value,
          notes: document.getElementById('editNotes').value
        });
        window.closeModal();
        await loadWorkflows();
      } catch (error) {
        alert('Error: ' + error.message);
      }
    };

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderDiagram();
      });
    });

    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target.id === 'editModal') window.closeModal();
    });

    loadWorkflows();
  </script>
</body>
</html>
