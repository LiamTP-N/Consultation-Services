<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-green: #22c55e;
            --accent-orange: #f97316;
            --accent-purple: #a855f7;
            --accent-red: #ef4444;
            --theme-color: #3b82f6; 
            --theme-shadow: rgba(59, 130, 246, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', system-ui, sans-serif; overscroll-behavior-y: contain; background-color: #0f172a; }
        body.timer-running { overflow: hidden; }
        .font-mono-display { font-family: 'Space Mono', monospace; }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .btn-select {
            background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; transition: all 0.2s;
        }
        .btn-select.active {
            background: var(--theme-color); color: white; border-color: var(--theme-color); font-weight: bold; box-shadow: 0 0 15px var(--theme-shadow);
        }
        
        .hidden { display: none !important; }

        #timer-bg { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 0; transition: height 1s linear, background-color 0.3s ease; }

        .home-btn { transition: all 0.2s ease; position: relative; overflow: hidden; }
        .home-btn:active { transform: scale(0.97); }

        .exercise-card { animation: slideIn 0.3s ease forwards; opacity: 0; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .t-stroke { -webkit-text-stroke: 4px rgba(0, 0, 0, 1); paint-order: stroke fill; }
        .t-stroke-heavy { -webkit-text-stroke: 6px rgba(0, 0, 0, 1); paint-order: stroke fill; }
        .t-stroke-btn { -webkit-text-stroke: 2px rgba(0, 0, 0, 1); paint-order: stroke fill; }
        .surprise-stroke { -webkit-text-stroke: 6px rgba(255, 255, 255, 0.6) !important; }
        .surprise-stroke-light { -webkit-text-stroke: 4px rgba(255, 255, 255, 0.5) !important; }
        .surprise-stroke-btn { -webkit-text-stroke: 2px rgba(255, 255, 255, 0.4) !important; }

        #timer-screen { height: 100vh; height: 100dvh; }
        #timer-middle { min-height: 0; }
        #round-focus { overflow-wrap: break-word; word-break: break-word; }

        #setup-screen { height: 100vh; height: 100dvh; overflow: hidden; }
        #setup-columns { min-height: 0; flex: 1; }
        #settings-scroll { overflow-y: auto; min-height: 0; }
        #preview-scroll { overflow-y: auto; min-height: 0; }

        /* HR pulse animation */
        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .hr-pulse { animation: heartPulse 0.8s ease-in-out infinite; }
        .hr-badge {
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-center">

    <div id="timer-bg" class="h-0 bg-slate-800"></div>

    <div class="relative z-10 w-full flex flex-col items-center justify-center p-4 min-h-screen">

        <!-- ==================== HOME SCREEN ==================== -->
        <div id="home-screen" class="w-full max-w-md space-y-6 py-8">
            <div class="text-center mb-4">
                <h1 class="text-3xl font-bold text-white tracking-tight mb-2">What's Today's Session?</h1>
                <p class="text-sm text-slate-400">Pick one and let's go.</p>
            </div>
            <div class="space-y-4">
                <button id="btn-home-boxing" class="home-btn w-full glass-card p-6 rounded-[2rem] flex items-center space-x-5 hover:border-green-500/30">
                    <div class="w-14 h-14 rounded-2xl bg-green-600/20 border border-green-500/30 flex items-center justify-center flex-shrink-0">
                        <svg class="w-7 h-7 text-green-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>
                    <div class="text-left"><span class="text-xl font-bold text-white block">Boxing</span><span class="text-xs text-slate-400">Interval timer with round callouts</span></div>
                </button>
                <button id="btn-home-gym" class="home-btn w-full glass-card p-6 rounded-[2rem] flex items-center space-x-5 hover:border-blue-500/30">
                    <div class="w-14 h-14 rounded-2xl bg-blue-600/20 border border-blue-500/30 flex items-center justify-center flex-shrink-0">
                        <svg class="w-7 h-7 text-blue-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h4v12H4zM16 6h4v12h-4zM8 11h8v2H8z"/></svg>
                    </div>
                    <div class="text-left"><span class="text-xl font-bold text-white block">Gym</span><span class="text-xs text-slate-400">Pick your day, get your exercises</span></div>
                </button>
            </div>
        </div>

        <!-- ==================== GYM: DAY SELECT ==================== -->
        <div id="gym-day-screen" class="hidden w-full max-w-md space-y-5 py-8">
            <div class="text-center mb-2"><h1 class="text-3xl font-bold text-white tracking-tight mb-1">What Day Is It?</h1><p class="text-sm text-slate-400">Pick your split.</p></div>
            <div class="glass-card p-5 rounded-[2rem] space-y-3">
                <button class="gym-day-btn home-btn w-full py-4 rounded-xl text-left px-5 bg-slate-800/50 border border-slate-700/30 hover:border-blue-500/40 transition-all" data-day="push"><span class="text-base font-bold text-white">Push</span><span class="text-xs text-slate-400 ml-2">Chest, shoulders, triceps</span></button>
                <button class="gym-day-btn home-btn w-full py-4 rounded-xl text-left px-5 bg-slate-800/50 border border-slate-700/30 hover:border-blue-500/40 transition-all" data-day="pull"><span class="text-base font-bold text-white">Pull</span><span class="text-xs text-slate-400 ml-2">Back, biceps, rear delts</span></button>
                <button class="gym-day-btn home-btn w-full py-4 rounded-xl text-left px-5 bg-slate-800/50 border border-slate-700/30 hover:border-blue-500/40 transition-all" data-day="legs"><span class="text-base font-bold text-white">Legs</span><span class="text-xs text-slate-400 ml-2">Quads, hamstrings, glutes, calves</span></button>
                <button class="gym-day-btn home-btn w-full py-4 rounded-xl text-left px-5 bg-slate-800/50 border border-slate-700/30 hover:border-blue-500/40 transition-all" data-day="upper"><span class="text-base font-bold text-white">Upper Body</span><span class="text-xs text-slate-400 ml-2">Full upper mix</span></button>
                <button class="gym-day-btn home-btn w-full py-4 rounded-xl text-left px-5 bg-slate-800/50 border border-slate-700/30 hover:border-blue-500/40 transition-all" data-day="lower"><span class="text-base font-bold text-white">Lower Body</span><span class="text-xs text-slate-400 ml-2">Full lower mix</span></button>
            </div>
            <button id="btn-gym-back" class="w-full py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white transition-colors">&larr; Back</button>
        </div>

        <!-- ==================== GYM: WORKOUT DISPLAY ==================== -->
        <div id="gym-workout-screen" class="hidden w-full max-w-md space-y-5 py-8">
            <div class="text-center mb-2"><p class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em]" id="gym-day-label">Push Day</p><h1 class="text-3xl font-bold text-white tracking-tight">Today's Exercises</h1></div>
            <div class="glass-card p-5 rounded-[2rem] space-y-3" id="gym-exercise-list"></div>
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-gym-shuffle" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl text-sm shadow-lg active:scale-[0.98] transition-all">Shuffle</button>
                <button id="btn-gym-workout-back" class="bg-slate-700/50 hover:bg-slate-700/70 border border-white/5 text-white/80 font-bold py-4 rounded-2xl text-sm transition-all active:scale-[0.98]">&larr; Back</button>
            </div>
        </div>

        <!-- ==================== BOXING: SETUP SCREEN ==================== -->
        <div id="setup-screen" class="hidden w-full flex flex-col p-2 sm:p-4">
            
            <div class="text-center mb-2 flex-shrink-0">
                <h1 class="text-lg sm:text-2xl font-bold text-white tracking-tight">Boxing Interval Timer</h1>
            </div>

            <!-- TOP BAR: Mode toggle + rest info -->
            <div class="glass-card p-3 sm:p-4 rounded-2xl flex-shrink-0 mb-2 sm:mb-3">
                <div class="flex items-center gap-3">
                    <div class="flex p-1 bg-slate-800/50 rounded-xl flex-shrink-0">
                        <button id="mode-solo" class="px-3 sm:px-4 py-2 rounded-lg text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all bg-green-600 text-white shadow-md">Solo</button>
                        <button id="mode-wife" class="px-3 sm:px-4 py-2 rounded-lg text-[10px] sm:text-xs font-bold uppercase tracking-wider transition-all text-slate-400 hover:text-white">With Wife</button>
                    </div>
                    <div id="rest-info" class="flex-1 text-center bg-slate-800/30 p-1.5 rounded-lg border border-slate-700/30">
                        <p class="text-[9px] sm:text-[10px] text-orange-300 font-bold uppercase tracking-widest">Progressive Rest</p>
                        <p class="text-[10px] sm:text-xs text-slate-400">Starts at 30s, +5s each round.</p>
                    </div>
                </div>

                <!-- HR Connect (only shown if Web Bluetooth available) -->
                <div id="hr-setup" class="hidden mt-3 pt-3 border-t border-slate-700/50">
                    <div class="flex items-center gap-2">
                        <button id="btn-hr-you" class="flex-1 py-2 px-3 rounded-xl text-[10px] sm:text-xs font-bold bg-slate-800/50 border border-slate-700/30 hover:border-red-500/40 active:scale-[0.98] transition-all flex items-center justify-center gap-1.5">
                            <svg class="w-3.5 h-3.5 text-red-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            <span id="hr-you-label">Connect HR</span>
                        </button>
                        <button id="btn-hr-partner" class="hidden flex-1 py-2 px-3 rounded-xl text-[10px] sm:text-xs font-bold bg-slate-800/50 border border-slate-700/30 hover:border-purple-500/40 active:scale-[0.98] transition-all flex items-center justify-center gap-1.5">
                            <svg class="w-3.5 h-3.5 text-purple-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            <span id="hr-partner-label">Partner HR</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- TWO COLUMNS -->
            <div id="setup-columns" class="flex flex-row gap-2 sm:gap-3 items-stretch">
                <!-- LEFT: Settings -->
                <div class="flex-1 min-w-0 flex flex-col">
                    <div id="settings-scroll" class="glass-card p-3 sm:p-4 rounded-2xl space-y-3 flex-1 custom-scrollbar">
                        <div class="space-y-1.5">
                            <label class="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase tracking-widest block ml-1">Rounds</label>
                            <div class="grid grid-cols-4 sm:grid-cols-6 gap-1.5" id="grid-rounds"></div>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase tracking-widest block ml-1">Work (Secs)</label>
                            <div class="grid grid-cols-3 gap-1.5">
                                <button class="btn-select py-2 rounded-xl text-xs font-mono-display" onclick="selectWork(30, this)">30</button>
                                <button class="btn-select py-2 rounded-xl text-xs font-mono-display" onclick="selectWork(45, this)">45</button>
                                <button class="btn-select active py-2 rounded-xl text-xs font-mono-display" onclick="selectWork(60, this)">60</button>
                            </div>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase tracking-widest block ml-1">Surprise Rounds</label>
                            <div class="grid grid-cols-3 gap-1.5" id="grid-surprise">
                                <button class="btn-select active py-2 rounded-xl text-xs font-bold" onclick="selectSurprise(1, this)">1</button>
                                <button class="btn-select py-2 rounded-xl text-xs font-bold" onclick="selectSurprise(2, this)">2</button>
                                <button class="btn-select py-2 rounded-xl text-xs font-bold" onclick="selectSurprise(3, this)">3</button>
                            </div>
                        </div>
                        <hr class="border-slate-700/50">
                        <div class="grid grid-cols-3 gap-2">
                            <button id="btn-quick-rest" class="col-span-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-2xl text-[10px] sm:text-xs shadow-lg active:scale-[0.98] transition-all flex flex-col items-center justify-center leading-tight"><span>Quick Rest</span><span class="opacity-70 text-[9px]">(120s)</span></button>
                            <button id="btn-start" class="col-span-2 bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-2xl text-sm sm:text-lg shadow-[0_0_20px_rgba(59,130,246,0.4)] active:scale-[0.98] transition-all">Begin Session</button>
                        </div>
                    </div>
                </div>
                <!-- RIGHT: Randomise + Rounds -->
                <div class="w-[140px] sm:w-[180px] md:w-[220px] flex-shrink-0 flex flex-col">
                    <div class="glass-card p-2 sm:p-3 rounded-2xl flex flex-col flex-1 min-h-0 space-y-2">
                        <div class="flex-shrink-0">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-[10px] sm:text-xs font-bold text-white">Randomise</span>
                                <label class="relative inline-flex items-center cursor-pointer flex-shrink-0">
                                    <input type="checkbox" id="in-random" class="sr-only peer">
                                    <div id="toggle-bg" class="w-9 sm:w-10 h-5 bg-slate-800 rounded-full peer peer-checked:bg-green-600 peer-checked:after:translate-x-4 sm:peer-checked:after:translate-x-5 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
                                </label>
                            </div>
                            <p id="random-desc" class="text-[8px] sm:text-[9px] text-slate-400 leading-tight">Randomises middle rounds (2 to 11)</p>
                            <hr class="border-slate-700/50 mt-2">
                        </div>
                        <h3 class="font-bold text-white text-[9px] sm:text-xs uppercase tracking-widest ml-1 opacity-70 flex-shrink-0">Rounds</h3>
                        <div id="preview-scroll" class="flex-1 min-h-0 space-y-1 pr-1 custom-scrollbar"><div id="round-preview"></div></div>
                    </div>
                </div>
            </div>

            <button id="btn-boxing-back" class="w-full py-2 rounded-xl text-xs font-bold text-slate-400 hover:text-white transition-colors flex-shrink-0 mt-1">&larr; Back</button>
        </div>

        <!-- ==================== BOXING: TIMER SCREEN ==================== -->
        <div id="timer-screen" class="hidden w-full max-w-md flex-col py-4">
            <!-- TOP -->
            <div class="w-full px-6 flex justify-between items-start flex-shrink-0">
                <div class="space-y-1">
                    <p class="text-[10px] font-bold text-white/60 uppercase tracking-[0.2em] t-stroke" id="round-label">Round</p>
                    <div class="flex items-baseline space-x-2">
                        <span id="current-round" class="text-5xl font-black font-mono-display text-white drop-shadow-md t-stroke-heavy">1</span>
                        <span class="text-white/60 text-xl font-bold t-stroke">/</span>
                        <span id="total-rounds" class="text-white/60 text-xl font-bold t-stroke">12</span>
                    </div>
                </div>
                <div class="flex flex-col items-end space-y-1.5 mt-1">
                    <!-- HR displays (shown during session if connected) -->
                    <div id="hr-live-you" class="hidden hr-badge flex items-center space-x-1.5 px-3 py-1.5 rounded-full bg-red-600/20 border border-red-500/30">
                        <svg class="w-4 h-4 text-red-400 hr-pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span id="hr-you-bpm" class="text-sm font-black font-mono-display text-red-300">--</span>
                    </div>
                    <div id="hr-live-partner" class="hidden hr-badge flex items-center space-x-1.5 px-3 py-1.5 rounded-full bg-purple-600/20 border border-purple-500/30">
                        <svg class="w-4 h-4 text-purple-400 hr-pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span id="hr-partner-bpm" class="text-sm font-black font-mono-display text-purple-300">--</span>
                    </div>
                    <!-- Audio controls -->
                    <button id="btn-mute-voice" class="flex items-center space-x-2 px-3 py-1.5 rounded-full backdrop-blur-md bg-black/20 border border-white/10 active:scale-95 transition-all">
                        <svg id="icon-voice-on" class="hidden w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072M11 5L6 9H2v6h4l5 4V5z"/></svg>
                        <svg id="icon-voice-off" class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6"/></svg>
                        <span id="voice-label" class="text-[10px] font-bold uppercase tracking-wider text-red-400">Voice</span>
                    </button>
                    <button id="btn-mute-sound" class="flex items-center space-x-2 px-3 py-1.5 rounded-full backdrop-blur-md bg-black/20 border border-white/10 active:scale-95 transition-all">
                        <svg id="icon-sound-on" class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M11 5L6 9H2v6h4l5 4V5z"/></svg>
                        <svg id="icon-sound-off" class="hidden w-4 h-4 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6"/></svg>
                        <span id="sound-label" class="text-[10px] font-bold uppercase tracking-wider text-white/70">Sound</span>
                    </button>
                </div>
            </div>
            <!-- MIDDLE -->
            <div id="timer-middle" class="flex-grow flex flex-col items-center justify-center w-full overflow-hidden px-4">
                <div id="focus-container" class="text-center w-full flex-shrink-0 mb-4"><div id="round-focus" class="font-black text-white uppercase leading-tight drop-shadow-lg t-stroke-heavy text-4xl">Warm Up</div></div>
                <div id="timer-display" class="text-9xl font-black font-mono-display text-white tracking-tighter drop-shadow-2xl t-stroke-heavy flex-shrink-0">0</div>
                <div id="next-up" class="text-sm font-bold text-white/60 uppercase tracking-widest text-center t-stroke mt-4 flex-shrink-0 h-6"></div>
            </div>
            <!-- BOTTOM -->
            <div class="w-full px-4 space-y-3 flex-shrink-0">
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-prev" class="bg-slate-700/50 hover:bg-slate-700/70 backdrop-blur-md border border-white/5 text-white/80 font-bold py-3 rounded-xl transition-all active:scale-95 text-xs uppercase tracking-wider t-stroke-btn">&larr; Prev Round</button>
                    <button id="btn-next" class="bg-slate-700/50 hover:bg-slate-700/70 backdrop-blur-md border border-white/5 text-white/80 font-bold py-3 rounded-xl transition-all active:scale-95 text-xs uppercase tracking-wider t-stroke-btn">Next Round &rarr;</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-pause" class="bg-black/30 hover:bg-black/40 backdrop-blur-md border border-white/10 text-white font-bold py-5 rounded-2xl transition-all active:scale-95 t-stroke-btn">Pause</button>
                    <button id="btn-end" class="bg-red-500/20 hover:bg-red-500/30 backdrop-blur-md border border-red-500/30 text-red-100 font-bold py-5 rounded-2xl transition-all active:scale-95 t-stroke-btn">End</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const GYM_EXERCISES = {

                session.phase=phase;session.halfwayPlayed=false;session.last10Played=false;setSurpriseStrokes(false);ui.roundFocus.classList.remove('text-red-600');ui.timerDisplay.classList.remove('text-black');ui.timerDisplay.classList.add('text-white');
                if(phase==='ready'){session.time=20;session.total=20;ui.timerBg.className="bg-orange-600";autoSizeFocus("Gloves On");ui.roundFocus.innerText="Gloves On";ui.nextUp.innerText="Next: "+session.plan[0].name;}
                else if(phase==='work'){session.time=settings.work;session.total=settings.work;playBell();const planIdx=settings.mode==='wife'?Math.floor((session.round-1)/2):session.round-1;const roundData=session.plan[planIdx];autoSizeFocus(roundData.name);ui.roundFocus.innerText=roundData.name;ui.roundCur.innerText=session.round;ui.nextUp.innerText="";if(settings.mode==='wife'){ui.timerBg.className=(session.round%2!==0)?"bg-green-600":"bg-purple-600";}else{ui.timerBg.className="bg-green-600";}speak(roundData.name);}
                else if(phase==='rest'){const restDuration=settings.restBase+((session.round-1)*5);session.time=restDuration;session.total=restDuration;ui.timerBg.className="bg-red-600";autoSizeFocus("Rest");ui.roundFocus.innerText="Rest";const maxRounds=settings.mode==='wife'?settings.rounds*2:settings.rounds;if(session.round<maxRounds){const planIdx=settings.mode==='wife'?Math.floor(session.round/2):session.round;ui.nextUp.innerText=`Up Next: ${session.plan[planIdx].name}`;}else ui.nextUp.innerText="Final Round Complete";playBell();}
                else if(phase==='change'){session.time=10;session.total=10;ui.timerBg.className="bg-yellow-600";autoSizeFocus("Change");ui.roundFocus.innerText="Change";const maxRounds=settings.rounds*2;if(session.round<maxRounds){const nextIsYou=((session.round+1)%2!==0);const nextName=session.plan[Math.floor(session.round/2)].name;ui.nextUp.innerText=`Up Next: ${nextIsYou?'YOU':'PARTNER'} - ${nextName}`;}playBell();}
                else if(phase==='quick-rest'){ui.timerBg.className="bg-red-600";autoSizeFocus("Full Rest");ui.roundFocus.innerText="Full Rest";ui.nextUp.innerText="";playBell();}
                else if(phase==='surprise'){session.time=30;session.total=30;ui.timerBg.className="bg-white";ui.roundFocus.classList.add('text-red-600');ui.timerDisplay.classList.remove('text-white');ui.timerDisplay.classList.add('text-black');setSurpriseStrokes(true);const task=Math.random()>0.5?"NON-STOP STRAIGHTS":"NON-STOP HOOKS";autoSizeFocus(task);ui.roundFocus.innerText=task;if(settings.mode==='wife'){ui.nextUp.innerText=((session.round%2!==0)?"YOU":"PARTNER")+" - GO GO GO!";}else{ui.nextUp.innerText="GO GO GO!";}playBell();speak("Surprise Round! "+task);}
                updateUI();
            };

            function updateUI(){ui.timerDisplay.innerText=format(session.time);ui.timerBg.style.height=`${(session.time/session.total)*100}%`;if(settings.mode==='quick-rest'){ui.btnPrev.innerText="-10s";ui.btnNext.innerText="+10s";}else{ui.btnPrev.innerText="\u2190 Prev Round";ui.btnNext.innerText="Next Round \u2192";}}

            function run(){session.timer=setInterval(()=>{if(session.paused)return;session.time--;if(session.phase==='work'||session.phase==='surprise'){if(session.time===Math.floor(session.total/2)&&!session.halfwayPlayed){session.halfwayPlayed=true;playDoubleBeep();}if(session.time===10&&!session.last10Played){session.last10Played=true;playWarningTone();}}if(session.time<=3&&session.time>0)playBeep(session.time===1);if(session.time<0){if(settings.mode==='quick-rest'){end();return;}stepPhase(1);}updateUI();},1000);}

            function stepPhase(dir){
                if(settings.mode==='quick-rest'){if(dir===1){session.time+=10;session.total=Math.max(session.total,session.time);}else{session.time=Math.max(0,session.time-10);}updateUI();return;}
                const maxRounds=settings.mode==='wife'?settings.rounds*2:settings.rounds;const isWife=settings.mode==='wife';
                if(dir===1){if(session.phase==='ready'){setPhase('work');}else if(session.phase==='work'){const planIdx=isWife?Math.floor((session.round-1)/2):session.round-1;const isYouTurn=!isWife||(session.round%2!==0),isPartnerTurn=isWife&&(session.round%2===0);let triggerSurprise=false;if(isYouTurn&&session.surpriseRoundsYou.has(planIdx)&&!session.surpriseTriggeredYou.has(planIdx)){session.surpriseTriggeredYou.add(planIdx);triggerSurprise=true;}else if(isPartnerTurn&&session.surpriseRoundsPartner.has(planIdx)&&!session.surpriseTriggeredPartner.has(planIdx)){session.surpriseTriggeredPartner.add(planIdx);triggerSurprise=true;}if(triggerSurprise)setPhase('surprise');else{if(session.round>=maxRounds)end();else setPhase(isWife?'change':'rest');}}else if(session.phase==='change'||session.phase==='rest'){session.round++;setPhase('work');}else if(session.phase==='surprise'){if(session.round>=maxRounds)end();else setPhase(isWife?'change':'rest');}}
                else{if(session.phase==='work'){if(session.round>1){session.round--;setPhase(isWife?'change':'rest');}else setPhase('ready');}else if(session.phase==='rest'||session.phase==='change'||session.phase==='surprise'){setPhase('work');}}
            }

            function end(){session.active=false;clearInterval(session.timer);if(wakeLock)wakeLock.release();window.speechSynthesis.cancel();screens.timer.classList.add('hidden');screens.timer.classList.remove('flex');showScreen('setup');ui.timerBg.style.height='0%';document.body.classList.remove('timer-running');setSurpriseStrokes(false);setMode(ui.modeSolo.classList.contains('bg-green-600')?'solo':'wife');}

            ui.btnStart.onclick=async()=>{initAudio();try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}document.body.classList.add('timer-running');showScreen('timer');ui.roundTot.innerText=settings.mode==='wife'?settings.rounds*2:settings.rounds;session.round=1;session.active=true;session.surpriseRoundsYou=pickSurpriseIndices(settings.surpriseCount,settings.rounds);session.surpriseTriggeredYou=new Set();if(settings.mode==='wife'){session.surpriseRoundsPartner=pickSurpriseIndices(settings.surpriseCount,settings.rounds);session.surpriseTriggeredPartner=new Set();}else{session.surpriseRoundsPartner=new Set();session.surpriseTriggeredPartner=new Set();}setPhase('ready');run();};
            ui.btnQuickRest.onclick=async()=>{initAudio();try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}document.body.classList.add('timer-running');settings.mode='quick-rest';showScreen('timer');session.time=120;session.total=120;session.round=1;ui.roundTot.innerText="-";ui.roundCur.innerText="-";session.active=true;setPhase('quick-rest');run();};

            ui.btnEnd.onclick=end;
            ui.btnPause.onclick=()=>{session.paused=!session.paused;ui.btnPause.innerText=session.paused?"Resume":"Pause";ui.btnPause.classList.toggle('bg-white/10');};
            ui.btnNext.onclick=()=>stepPhase(1);
            ui.btnPrev.onclick=()=>stepPhase(-1);

            showScreen('home');
        });
    </script>
</body>
</html>
